<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Vida AA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nueva Vida AA">
    <meta name="theme-color" content="#0f172a">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-app: #0f172a; --bg-body: #020617; --card-bg: #1e293b;
            --border-color: #334155; --input-bg: #0f172a; --input-border: #475569;
            --text-main: #f8fafc; --text-muted: #cbd5e1;
            --primary: #2563eb; --accent: #16a34a; --warning: #d97706; --danger: #dc2626;
        }
        .light-theme {
            --bg-app: #f8fafc; --bg-body: #e2e8f0; --card-bg: #ffffff;
            --border-color: #cbd5e1; --input-bg: #f1f5f9; --input-border: #94a3b8;
            --text-main: #0f172a; --text-muted: #475569;
            --primary: #1d4ed8; --accent: #15803d; --warning: #b45309; --danger: #b91c1c;
        }
        body { margin: 0; padding: 0; background-color: var(--bg-body); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 19px; transition: background-color 0.3s, color 0.3s; }
        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; background-color: var(--bg-app); display: flex; flex-direction: column; position: relative; box-shadow: 0 0 25px rgba(0,0,0,0.3); padding-bottom: 95px; box-sizing: border-box; }
        .header { padding: 16px 24px; background-color: var(--card-bg); border-bottom: 2px solid var(--border-color); text-align: center; position: relative; }
        .header h1 { margin: 2px 0 0 0; font-size: 20px; letter-spacing: 1px; }
        .header-logo { font-size: 28px; font-weight: 900; color: var(--primary); letter-spacing: -1px; }
        .theme-btn { position: absolute; top: 14px; right: 14px; background: var(--bg-app); border: 2px solid var(--border-color); color: var(--text-main); padding: 6px 10px; border-radius: 10px; cursor: pointer; font-size: 15px; }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .card { background-color: var(--card-bg); border-radius: 20px; padding: 24px; margin-bottom: 20px; border: 2px solid var(--border-color); }
        .input-field, .select-field { width: 100%; padding: 16px; background-color: var(--input-bg); border: 2px solid var(--input-border); border-radius: 14px; color: var(--text-main); font-size: 18px; margin-top: 6px; margin-bottom: 18px; box-sizing: border-box; }
        .input-error { border-color: #dc2626 !important; }
        .error-msg { color: #ef4444; font-size: 14px; margin-top: -14px; margin-bottom: 12px; display: block; background: rgba(220,38,38,0.1); padding: 8px 12px; border-radius: 8px; border-left: 3px solid #dc2626; line-height: 1.5; }
        .btn { background-color: var(--primary); color: white; border: none; padding: 18px; border-radius: 16px; font-size: 20px; font-weight: bold; cursor: pointer; width: 100%; display: block; text-align: center; text-decoration: none; box-sizing: border-box; }
        .btn-danger { background-color: var(--danger); }
        .btn-success { background-color: var(--accent); }
        .btn-secondary { background-color: var(--input-border); color: var(--text-main); }
        .btn-warning { background-color: var(--warning); }
        .btn-sm { padding: 10px 16px; font-size: 16px; width: auto; border-radius: 12px; display: inline-block; }
        .checkbox-group { background: var(--input-bg); padding: 14px; border-radius: 14px; margin-bottom: 15px; border: 2px solid var(--border-color); }
        .checkbox-label { display: flex; align-items: center; font-size: 21px; cursor: pointer; }
        .checkbox-custom { width: 28px; height: 28px; margin-right: 15px; }
        .progress-container { margin-bottom: 20px; }
        .progress-label { display: flex; justify-content: space-between; font-weight: bold; font-size: 20px; margin-bottom: 8px; }
        .progress-bar-bg { background-color: var(--bg-body); border-radius: 15px; height: 32px; width: 100%; overflow: hidden; border: 1px solid var(--input-border); }
        .progress-bar-fill { background: linear-gradient(90deg, #16a34a, #4ade80); height: 100%; transition: width 0.5s ease; }

        /* Pasos */
        .paso-row { display: flex; align-items: center; padding: 14px 12px; background: var(--input-bg); border-radius: 14px; margin-bottom: 10px; border: 2px solid var(--border-color); gap: 10px; }
        .paso-row.es-actual { border-color: var(--warning); background: var(--card-bg); }
        .paso-row.es-completado { border-color: var(--accent); }
        .paso-row.es-actual.es-completado { border-color: var(--accent); background: var(--card-bg); }
        .paso-numero { font-size: 24px; font-weight: bold; min-width: 32px; color: var(--text-muted); text-align: center; }
        .paso-row.es-actual .paso-numero { color: var(--warning); }
        .paso-row.es-completado .paso-numero { color: var(--accent); }
        .paso-texto { flex: 1; font-size: 16px; line-height: 1.4; }
        .paso-iconos { display: flex; flex-direction: column; gap: 6px; align-items: center; }
        .paso-btn { background: none; border: none; cursor: pointer; font-size: 22px; padding: 4px; line-height: 1; filter: grayscale(1) opacity(0.4); transition: all 0.2s; }
        .paso-btn.activo { filter: none; opacity: 1; }
        .paso-progreso { font-size: 14px; font-weight: bold; color: var(--accent); margin-bottom: 12px; text-align: right; }

        .popup-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 999; overflow-y: auto; }
        .popup-card { background: var(--card-bg); border-radius: 24px; padding: 30px; text-align: center; max-width: 410px; width: 100%; border: 3px solid var(--warning); }
        .biblioteca-item { background: var(--input-bg); padding: 18px; border-radius: 14px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; border: 2px solid var(--border-color); }
        .evento-card { background: var(--input-bg); border: 2px solid var(--primary); border-radius: 16px; padding: 18px; margin-bottom: 14px; }
        .navbar { position: absolute; bottom: 0; left: 0; right: 0; height: 90px; background-color: var(--card-bg); border-top: 2px solid var(--border-color); display: flex; justify-content: space-around; align-items: center; }
        .nav-item { color: var(--text-muted); cursor: pointer; text-align: center; font-size: 12px; font-weight: bold; flex: 1; padding: 5px 0; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 22px; margin-bottom: 2px; }
        .solicitud-box { background: var(--input-bg); border: 2px solid var(--warning); padding: 14px; border-radius: 14px; margin-bottom: 10px; }
        .solicitud-acciones { display: flex; gap: 10px; margin-top: 10px; }
        .btn-small { padding: 10px 14px; font-size: 15px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; flex: 1; text-align: center; color: white; }
        .admin-toggle-link { display: block; text-align: right; color: var(--text-muted); font-size: 15px; text-decoration: underline; cursor: pointer; margin-top: -10px; margin-bottom: 20px; }
        .add-adiccion-card { border: 2px dashed var(--input-border); border-radius: 16px; padding: 18px; margin-bottom: 20px; background: var(--input-bg); }

        /* Toggle URL / Archivo */
        .modo-toggle { display: flex; gap: 10px; margin-bottom: 16px; }
        .modo-btn { flex: 1; padding: 12px; border-radius: 12px; border: 2px solid var(--input-border); background: var(--input-bg); color: var(--text-muted); font-size: 16px; font-weight: bold; cursor: pointer; text-align: center; }
        .modo-btn.activo { border-color: var(--primary); color: var(--primary); background: var(--card-bg); }

        /* Upload progress */
        .upload-progress { height: 8px; background: var(--input-border); border-radius: 4px; margin-top: -10px; margin-bottom: 16px; overflow: hidden; }
        .upload-progress-fill { height: 100%; background: var(--primary); transition: width 0.3s; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
    const SUPABASE_URL = "https://xzkuywsitdwikzksiesf.supabase.co";
    const SUPABASE_KEY = "sb_publishable_8NSIOBCEbc4_mM9KWMKJvA_MPWW5Cv3";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const CLAVE_ADMIN = "felices24";
    const GRUPOS = [
        { id: "san-jose-renca", nombre: "SAN JOSE DE RENCA" },
        { id: "grupo-esperanza", nombre: "GRUPO ESPERANZA" }
    ];
    const ADICCIONES = ["Alcohol", "Marihuana", "Cocaina", "Tabaco", "Juego Compulsivo"];
    const PASOS_AA = [
        "Admitimos que eramos impotentes ante el alcohol y nuestras vidas se habian vuelto ingobernables.",
        "Llegamos a creer que un Poder superior a nosotros mismos podria devolvernos el sano juicio.",
        "Decidimos poner nuestra voluntad y nuestras vidas al cuidado de Dios, tal como nosotros lo entendiamos.",
        "Sin miedo, hicimos un minucioso examen de conciencia de nosotros mismos.",
        "Admitimos ante Dios, ante nosotros mismos y ante otro ser humano la naturaleza exacta de nuestros defectos.",
        "Estuvimos enteramente dispuestos a dejar que Dios nos liberase de todos estos defectos de caracter.",
        "Humildemente le pedimos que nos librase de nuestros defectos.",
        "Hicimos una lista de todas aquellas personas a quienes habiamos ofendido y estuvimos dispuestos a reparar el dano.",
        "Reparamos directamente a cuantos nos fue posible el dano causado, excepto cuando el hacerlo implicaba perjuicio.",
        "Continuamos con nuestro examen de conciencia, admitiendo inmediatamente nuestros errores cuando los descubriamos.",
        "Buscamos a traves de la oracion y la meditacion mejorar nuestro contacto con Dios.",
        "Habiendo experimentado un despertar espiritual, tratamos de llevar este mensaje a otros alcoholicos."
    ];
    const LECTURAS = [
        "Libro Grande de AA - Capitulo 5: Como funciona",
        "Viviendo Sobrio - Evitar el primer trago",
        "Folleto: El miembro de mas edad en AA",
        "Reflexiones Diarias - Un dia a la vez"
    ];

    function App() {
        const [user, setUser] = React.useState(null);
        const [activeTab, setActiveTab] = React.useState("inicio");
        const [isDark, setIsDark] = React.useState(true);
        const [misAdicciones, setMisAdicciones] = React.useState({});
        const [pasoActual, setPasoActual] = React.useState(1);
        const [pasosCompletados, setPasosCompletados] = React.useState([]);
        const [biblioteca, setBiblioteca] = React.useState([]);
        const [eventos, setEventos] = React.useState([]);
        const [solicitudes, setSolicitudes] = React.useState([]);
        const [mostrarAliento, setMostrarAliento] = React.useState(false);
        const [lecturaRec, setLecturaRec] = React.useState("");

        // Registro
        const [nombre, setNombre] = React.useState("");
        const [sede, setSede] = React.useState("");
        const [whatsapp, setWhatsapp] = React.useState("+569");
        const [errTel, setErrTel] = React.useState("");
        const [mostrarAdmin, setMostrarAdmin] = React.useState(false);
        const [claveAdmin, setClaveAdmin] = React.useState("");
        const [checks, setChecks] = React.useState({});
        const [fechas, setFechas] = React.useState({});
        const [loginId, setLoginId] = React.useState("");

        // Biblioteca
        const [modoLib, setModoLib] = React.useState("url"); // "url" | "archivo"
        const [libTitulo, setLibTitulo] = React.useState("");
        const [libTipo, setLibTipo] = React.useState("Documento");
        const [libUrl, setLibUrl] = React.useState("");
        const [libArchivo, setLibArchivo] = React.useState(null);
        const [uploadPct, setUploadPct] = React.useState(0);
        const [subiendo, setSubiendo] = React.useState(false);

        // Eventos
        const [evTitulo, setEvTitulo] = React.useState("");
        const [evFecha, setEvFecha] = React.useState("");
        const [evHora, setEvHora] = React.useState("");
        const [evLugar, setEvLugar] = React.useState("");
        const [evNota, setEvNota] = React.useState("");
        const [errHora, setErrHora] = React.useState("");

        // Agregar adiccion
        const [nuevaAd, setNuevaAd] = React.useState("");

        React.useEffect(() => {
            const t = localStorage.getItem("tema");
            if (t === "light") setIsDark(false);
            const s = localStorage.getItem("sesion_nv");
            if (s) { try { setUser(JSON.parse(s)); } catch(e) { localStorage.removeItem("sesion_nv"); } }
        }, []);

        React.useEffect(() => {
            if (!user) return;
            cargar();
            const iv = setInterval(cargar, 20000);
            return () => clearInterval(iv);
        }, [user]);

        async function cargar() {
            try {
                const { data: u } = await supabase.from('usuarios').select('*').eq('username', user.username).single();
                if (u) {
                    setMisAdicciones(u.adicciones || {});
                    setPasoActual(u.paso_actual || 1);
                    setPasosCompletados(u.pasos_completados || []);
                    setUser(prev => { const a = {...prev, estado: u.estado}; localStorage.setItem("sesion_nv", JSON.stringify(a)); return a; });
                }
                const { data: b } = await supabase.from('biblioteca').select('*').eq('grupo_id', user.grupoId).order('id', { ascending: false });
                if (b) setBiblioteca(b);
                const { data: e } = await supabase.from('eventos').select('*').eq('grupo_id', user.grupoId).order('fecha', { ascending: true });
                if (e) setEventos(e);
                if (user.rol === 'admin') {
                    const { data: p } = await supabase.from('usuarios').select('*').eq('grupo_id', user.grupoId).eq('estado', 'pendiente');
                    if (p) setSolicitudes(p);
                }
            } catch(e) {}
        }

        const toggleTema = () => {
            setIsDark(p => { localStorage.setItem("tema", !p ? "dark" : "light"); return !p; });
        };

        const validarTel = (v) => {
            setWhatsapp(v);
            if (!v || v === "+569" || v.trim() === "") { setErrTel(""); return; }
            const l = v.replace(/\s/g, "");
            if (!l.startsWith("+")) setErrTel("Debe comenzar con el codigo de pais.\n📌 Ejemplos: +56912345678 (Chile) · +1234567890 (EEUU) · +5491123456789 (Argentina)");
            else if (!/^\+[0-9]{8,14}$/.test(l)) setErrTel("Formato incorrecto. Solo numeros despues del '+'.\n📌 Ejemplo Chile: +56912345678 · Otro pais: +[codigo][numero]");
            else setErrTel("");
        };

        const validarHora = (v) => {
            setEvHora(v);
            if (!v) { setErrHora(""); return; }
            if (!/^([01]\d|2[0-3]):([0-5]\d)$/.test(v)) setErrHora("Hora invalida. El selector muestra horas de 00:00 a 23:59.");
            else setErrHora("");
        };

        // Toggle paso completado
        const toggleCompletado = async (num) => {
            const nuevos = pasosCompletados.includes(num)
                ? pasosCompletados.filter(p => p !== num)
                : [...pasosCompletados, num];
            const { error } = await supabase.from('usuarios').update({ pasos_completados: nuevos }).eq('username', user.username);
            if (!error) setPasosCompletados(nuevos);
        };

        // Set paso actual (el que estoy trabajando ahora)
        const setearPasoActual = async (num) => {
            const nuevo = pasoActual === num ? 0 : num;
            const { error } = await supabase.from('usuarios').update({ paso_actual: nuevo }).eq('username', user.username);
            if (!error) setPasoActual(nuevo);
        };

        const registrarRecaida = async (ad) => {
            const hoy = new Date().toISOString().split('T')[0];
            const nuevas = { ...misAdicciones, [ad]: hoy };
            const { error } = await supabase.from('usuarios').update({ adicciones: nuevas }).eq('username', user.username);
            if (!error) { setMisAdicciones(nuevas); setLecturaRec(LECTURAS[Math.floor(Math.random() * LECTURAS.length)]); setMostrarAliento(true); }
        };

        const agregarAdiccion = async () => {
            if (!nuevaAd) return;
            const hoy = new Date().toISOString().split('T')[0];
            const nuevas = { ...misAdicciones, [nuevaAd]: hoy };
            const { error } = await supabase.from('usuarios').update({ adicciones: nuevas }).eq('username', user.username);
            if (!error) { setMisAdicciones(nuevas); setNuevaAd(""); alert("Padecimiento agregado. Contador parte desde hoy."); }
            else alert("Error: " + error.message);
        };

        const registrarCuenta = async (e) => {
            e.preventDefault();
            if (!nombre || !sede) return alert("Completa nombre y sede.");
            if (errTel) return alert("Corrige el numero de telefono antes de continuar.");
            let rol = "basico", estado = "pendiente";
            if (mostrarAdmin) {
                if (claveAdmin !== CLAVE_ADMIN) return alert("Clave de administrador incorrecta.");
                rol = "admin"; estado = "autorizado";
            }
            const g = GRUPOS.find(x => x.id === sede);
            const uid = nombre.replace(/\s+/g, "") + "_" + g.id;
            try {
                const { data: ex } = await supabase.from('usuarios').select('username').eq('username', uid).maybeSingle();
                if (ex) return alert("El nombre \"" + nombre + "\" ya existe en esta sede.");
                const ads = {};
                ADICCIONES.forEach(a => { if (checks[a]) ads[a] = fechas[a] || new Date().toISOString().split('T')[0]; });
                const tel = whatsapp.trim();
                const tels = (tel && tel !== "+569") ? [tel] : [];
                const { error } = await supabase.from('usuarios').insert([{ username: uid, nombre_real: nombre, grupo_id: sede, grupo_nombre: g.nombre, rol, estado, adicciones: ads, telefonos: tels, paso_actual: 0, pasos_completados: [] }]);
                if (error) { alert("Error: " + error.message); return; }
                const s = { username: uid, nombreReal: nombre, grupoId: sede, grupoNombre: g.nombre, rol, estado };
                localStorage.setItem("sesion_nv", JSON.stringify(s));
                setUser(s); setMisAdicciones(ads);
            } catch(err) { alert("Error: " + err.message); }
        };

        const entrar = async (e) => {
            e.preventDefault();
            if (!loginId) return;
            const { data } = await supabase.from('usuarios').select('*').eq('username', loginId).maybeSingle();
            if (data) {
                const s = { username: data.username, nombreReal: data.nombre_real, grupoId: data.grupo_id, grupoNombre: data.grupo_nombre, rol: data.rol, estado: data.estado };
                localStorage.setItem("sesion_nv", JSON.stringify(s));
                setUser(s); setMisAdicciones(data.adicciones || {}); setPasoActual(data.paso_actual || 0); setPasosCompletados(data.pasos_completados || []);
            } else alert("Identificador no encontrado.");
        };

        const salir = () => { localStorage.removeItem("sesion_nv"); setUser(null); };

        const subirMaterial = async (e) => {
            e.preventDefault();
            if (!libTitulo) return alert("Escribe un titulo.");
            let urlFinal = "";
            if (modoLib === "url") {
                if (!libUrl) return alert("Pega el enlace URL.");
                urlFinal = libUrl;
            } else {
                if (!libArchivo) return alert("Selecciona un archivo.");
                setSubiendo(true); setUploadPct(10);
                try {
                    const fn = Date.now() + "_" + libArchivo.name.replace(/\s/g, "_");
                    setUploadPct(40);
                    const { data: up, error: upErr } = await supabase.storage.from('archivos').upload(fn, libArchivo);
                    if (upErr) { alert("Error al subir: " + upErr.message); setSubiendo(false); return; }
                    setUploadPct(80);
                    const { data: pub } = supabase.storage.from('archivos').getPublicUrl(fn);
                    urlFinal = pub.publicUrl;
                    setUploadPct(100);
                } catch(err) { alert("Error: " + err.message); setSubiendo(false); return; }
                setSubiendo(false); setUploadPct(0);
            }
            const { error } = await supabase.from('biblioteca').insert([{ grupo_id: user.grupoId, titulo: libTitulo, tipo: libTipo, link: urlFinal }]);
            if (!error) { setLibTitulo(""); setLibUrl(""); setLibArchivo(null); cargar(); alert("Publicado con exito."); }
        };

        const crearEvento = async (e) => {
            e.preventDefault();
            if (!evTitulo || !evFecha || !evHora || !evLugar) return alert("Completa titulo, fecha, hora y direccion.");
            if (errHora) return alert("Corrige la hora antes de continuar.");
            const { error } = await supabase.from('eventos').insert([{ grupo_id: user.grupoId, titulo: evTitulo, fecha: evFecha, hora: evHora, lugar: evLugar, nota: evNota }]);
            if (!error) { alert("Evento publicado."); setEvTitulo(""); setEvFecha(""); setEvHora(""); setEvLugar(""); setEvNota(""); cargar(); }
            else alert("Error: " + error.message);
        };

        const eliminarEvento = async (id) => { if (!confirm("Eliminar evento?")) return; await supabase.from('eventos').delete().eq('id', id); cargar(); };

        const gestionarSol = async (username, aprobar) => {
            if (aprobar) {
                const { error } = await supabase.from('usuarios').update({ estado: 'autorizado' }).eq('username', username);
                if (!error) { alert("Usuario autorizado."); cargar(); }
            } else {
                if (!confirm("Rechazar y eliminar a " + username + "?")) return;
                const { error } = await supabase.from('usuarios').delete().eq('username', username);
                if (!error) { alert("Solicitud eliminada."); cargar(); }
            }
        };

        const calcDias = (f) => { if (!f) return 0; const d = Math.floor((new Date() - new Date(f)) / 86400000); return d < 0 ? 0 : d; };
        const mapsLink = (dir) => "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(dir);
        const adsPendientes = ADICCIONES.filter(a => !misAdicciones[a]);

        // LOGIN
        if (!user) return (
            <div className={"app-container" + (!isDark ? " light-theme" : "")} style={{padding:'20px', justifyContent:'center'}}>
                <div className="card">
                    <button className="theme-btn" onClick={toggleTema}>{isDark ? "☀️" : "🌙"}</button>
                    <div className="header-logo" style={{textAlign:'center', marginTop:'10px', marginBottom:'4px'}}>AA</div>
                    <h2 style={{color:'var(--primary)', fontSize:'26px', textAlign:'center', margin:'0 0 20px 0'}}>Nueva Vida</h2>
                    <form onSubmit={registrarCuenta}>
                        <h4 style={{color:'var(--accent)', marginBottom:'5px'}}>1. Registrarse</h4>
                        <input type="text" className="input-field" placeholder="Su Nombre o Alias (Obligatorio)" value={nombre} onChange={e=>setNombre(e.target.value)} />
                        <select className="select-field" value={sede} onChange={e=>setSede(e.target.value)}>
                            <option value="">-- Seleccionar Sede --</option>
                            {GRUPOS.map(g=><option key={g.id} value={g.id}>{g.nombre}</option>)}
                        </select>
                        <label style={{fontSize:'15px', fontWeight:'bold', color:'var(--text-muted)'}}>WhatsApp (Opcional):</label>
                        <input type="tel" className={"input-field"+(errTel?" input-error":"")} placeholder="+56912345678" value={whatsapp} onChange={e=>validarTel(e.target.value)} />
                        {errTel && <span className="error-msg">⚠️ {errTel}</span>}
                        <span className="admin-toggle-link" onClick={()=>{setMostrarAdmin(!mostrarAdmin); setClaveAdmin("");}}>¿Soy administrador autorizado?</span>
                        {mostrarAdmin && (
                            <div style={{background:'var(--input-bg)', padding:'15px', borderRadius:'14px', marginBottom:'20px', border:'2px solid #7c3aed'}}>
                                <label style={{fontSize:'15px', color:'#a78bfa', fontWeight:'bold'}}>Clave de Administrador:</label>
                                <input type="password" className="input-field" style={{marginBottom:'5px'}} placeholder="Codigo secreto" value={claveAdmin} onChange={e=>setClaveAdmin(e.target.value)} />
                            </div>
                        )}
                        <h4 style={{color:'var(--warning)', fontSize:'18px', marginBottom:'12px'}}>Padecimientos iniciales:</h4>
                        {ADICCIONES.map(ad=>(
                            <div key={ad} className="checkbox-group">
                                <label className="checkbox-label">
                                    <input type="checkbox" className="checkbox-custom" checked={!!checks[ad]} onChange={e=>setChecks({...checks,[ad]:e.target.checked})} />{ad}
                                </label>
                                {checks[ad] && <input type="date" className="input-field" style={{marginBottom:0,marginTop:'8px'}} value={fechas[ad]||""} onChange={e=>setFechas({...fechas,[ad]:e.target.value})} />}
                            </div>
                        ))}
                        <button type="submit" className="btn btn-success" style={{marginTop:'15px'}}>Registrar e Ingresar</button>
                    </form>
                    <hr style={{borderColor:'var(--border-color)', margin:'30px 0'}} />
                    <form onSubmit={entrar}>
                        <h4 style={{marginBottom:'5px'}}>2. Ya tengo cuenta</h4>
                        <input type="text" className="input-field" placeholder="Ej: Pedro_san-jose-renca" value={loginId} onChange={e=>setLoginId(e.target.value)} />
                        <button type="submit" className="btn btn-secondary">Entrar</button>
                    </form>
                </div>
            </div>
        );

        if (user.estado === 'pendiente') return (
            <div className={"app-container"+ (!isDark?" light-theme":"")} style={{padding:'20px', justifyContent:'center', textAlign:'center'}}>
                <div className="card">
                    <div style={{fontSize:'55px'}}>⏳</div>
                    <h2>Cuenta en Revision</h2>
                    <p style={{color:'var(--text-muted)'}}>Tu identificador:</p>
                    <p style={{background:'var(--bg-body)', padding:'14px', borderRadius:'10px', color:'var(--primary)', fontFamily:'monospace', fontWeight:'bold', fontSize:'17px'}}>{user.username}</p>
                    <p style={{color:'var(--warning)', fontSize:'16px'}}>El administrador de tu sede debe aprobar tu solicitud.</p>
                    <button className="btn btn-secondary" style={{marginTop:'15px'}} onClick={salir}>Volver</button>
                </div>
            </div>
        );

        // APP PRINCIPAL
        return (
            <div className={"app-container"+(!isDark?" light-theme":"")}>
                {mostrarAliento && (
                    <div className="popup-overlay">
                        <div className="popup-card">
                            <div style={{fontSize:'55px'}}>❤️</div>
                            <h2>Un paso a la vez</h2>
                            <p style={{lineHeight:'1.6'}}>Hoy es un nuevo comienzo. Mantente fuerte las proximas 24 horas.</p>
                            <div style={{background:'var(--bg-body)', padding:'14px', borderRadius:'12px', textAlign:'left', margin:'15px 0'}}>
                                <strong style={{color:'var(--warning)'}}>Sugerencia:</strong>
                                <p style={{margin:'4px 0 0 0', fontSize:'17px'}}>{lecturaRec}</p>
                            </div>
                            <button className="btn btn-success" onClick={()=>setMostrarAliento(false)}>Aceptar y Continuar</button>
                        </div>
                    </div>
                )}

                <div className="header">
                    <button className="theme-btn" onClick={toggleTema}>{isDark?"☀️":"🌙"}</button>
                    <div className="header-logo">AA</div>
                    <h1>{user.grupoNombre}</h1>
                    <span style={{color:'var(--accent)', fontWeight:'bold', fontSize:'16px'}}>{user.nombreReal} {user.rol==='admin'?'(Admin)':''}</span>
                    {user.rol==='admin' && solicitudes.length>0 && (
                        <div style={{background:'#dc2626', color:'white', fontSize:'13px', fontWeight:'bold', padding:'3px 12px', borderRadius:'20px', display:'inline-block', marginTop:'4px'}}>
                            {solicitudes.length} solicitud{solicitudes.length>1?'es':''} pendiente{solicitudes.length>1?'s':''}
                        </div>
                    )}
                </div>

                <div className="main-content">

                    {/* INICIO */}
                    {activeTab==="inicio" && (
                        <div>
                            <div className="card" style={{textAlign:'center', borderColor:'var(--warning)'}}>
                                <h3 style={{margin:0, color:'var(--warning)'}}>Mi Meta de Hoy</h3>
                                <p style={{fontSize:'32px', fontWeight:'bold', color:'#10b981', margin:'5px 0'}}>¡Solo por Hoy!</p>
                            </div>
                            <h3>Mis Indicadores</h3>
                            {Object.keys(misAdicciones).length===0
                                ? <p style={{color:'var(--text-muted)'}}>No tienes contadores activos.</p>
                                : Object.keys(misAdicciones).map(ad=>{
                                    const dias=calcDias(misAdicciones[ad]);
                                    const pct=Math.min((dias/90)*100,100);
                                    return (
                                        <div key={ad} className="card">
                                            <div className="progress-container">
                                                <div className="progress-label">
                                                    <span>Libre de {ad}</span>
                                                    <span style={{color:'var(--accent)', fontSize:'24px'}}>{dias} Dias</span>
                                                </div>
                                                <div className="progress-bar-bg">
                                                    <div className="progress-bar-fill" style={{width:(pct||4)+"%"}}></div>
                                                </div>
                                            </div>
                                            <button className="btn btn-danger" style={{padding:'12px', fontSize:'16px'}} onClick={()=>registrarRecaida(ad)}>Reiniciar Contador</button>
                                        </div>
                                    );
                                })
                            }
                            {adsPendientes.length>0 && (
                                <div className="add-adiccion-card">
                                    <h4 style={{margin:'0 0 12px 0', fontSize:'17px', color:'var(--text-muted)'}}>+ Agregar otro padecimiento</h4>
                                    <select className="select-field" style={{marginBottom:'12px'}} value={nuevaAd} onChange={e=>setNuevaAd(e.target.value)}>
                                        <option value="">-- Seleccionar --</option>
                                        {adsPendientes.map(a=><option key={a} value={a}>{a}</option>)}
                                    </select>
                                    <button className="btn btn-warning" style={{fontSize:'17px', padding:'14px'}} onClick={agregarAdiccion}>Agregar y empezar contador desde hoy</button>
                                </div>
                            )}
                        </div>
                    )}

                    {/* PASOS */}
                    {activeTab==="pasos" && (
                        <div>
                            <h3 style={{marginBottom:'4px'}}>Los 12 Pasos</h3>
                            <div className="paso-progreso">
                                {pasosCompletados.length}/12 completados
                                {pasosCompletados.length===12 && " 🎉"}
                            </div>
                            <div style={{display:'flex', gap:'12px', fontSize:'13px', color:'var(--text-muted)', marginBottom:'16px', flexWrap:'wrap'}}>
                                <span>✅ = Completado</span>
                                <span>⭐ = En progreso</span>
                            </div>
                            {PASOS_AA.map((texto,i)=>{
                                const num=i+1;
                                const completado=pasosCompletados.includes(num);
                                const actual=pasoActual===num;
                                return (
                                    <div key={num} className={"paso-row"+(actual?" es-actual":"")+(completado?" es-completado":"")}>
                                        <div className="paso-numero">{num}</div>
                                        <div className="paso-texto">{texto}</div>
                                        <div className="paso-iconos">
                                            <button
                                                className={"paso-btn"+(completado?" activo":"")}
                                                onClick={()=>toggleCompletado(num)}
                                                title={completado?"Quitar completado":"Marcar como completado"}
                                            >✅</button>
                                            <button
                                                className={"paso-btn"+(actual?" activo":"")}
                                                onClick={()=>setearPasoActual(num)}
                                                title={actual?"Quitar paso actual":"Marcar como mi paso actual"}
                                            >⭐</button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {/* EVENTOS */}
                    {activeTab==="eventos" && (
                        <div>
                            <h3>Proximos Eventos</h3>
                            {user.rol==='admin' && (
                                <div className="card" style={{borderColor:'var(--primary)'}}>
                                    <h4 style={{color:'var(--primary)', margin:'0 0 15px 0'}}>Crear Evento</h4>
                                    <form onSubmit={crearEvento}>
                                        <input type="text" className="input-field" placeholder="Titulo del evento" value={evTitulo} onChange={e=>setEvTitulo(e.target.value)} />
                                        <label style={{fontSize:'15px', color:'var(--text-muted)', fontWeight:'bold'}}>Fecha:</label>
                                        <input type="date" className="input-field" value={evFecha} onChange={e=>setEvFecha(e.target.value)} />
                                        <label style={{fontSize:'15px', color:'var(--text-muted)', fontWeight:'bold'}}>Hora:</label>
                                        <input type="time" className={"input-field"+(errHora?" input-error":"")} value={evHora} onChange={e=>validarHora(e.target.value)} />
                                        {errHora && <span className="error-msg">⚠️ {errHora}</span>}
                                        <label style={{fontSize:'15px', color:'var(--text-muted)', fontWeight:'bold'}}>Direccion:</label>
                                        <input type="text" className="input-field" placeholder="Ej: Av. Principal 1234, Renca" value={evLugar} onChange={e=>setEvLugar(e.target.value)} />
                                        <label style={{fontSize:'15px', color:'var(--text-muted)', fontWeight:'bold'}}>Nota (Opcional):</label>
                                        <input type="text" className="input-field" placeholder="Ej: Traer libreta" value={evNota} onChange={e=>setEvNota(e.target.value)} />
                                        <button type="submit" className="btn btn-success">Publicar Evento</button>
                                    </form>
                                </div>
                            )}
                            {eventos.length===0
                                ? <div className="card" style={{textAlign:'center', color:'var(--text-muted)'}}><div style={{fontSize:'40px'}}>📅</div><p>No hay eventos programados.</p></div>
                                : eventos.map(ev=>(
                                    <div key={ev.id} className="evento-card">
                                        <div style={{fontWeight:'bold', fontSize:'20px', marginBottom:'6px'}}>{ev.titulo}</div>
                                        <div style={{color:'var(--warning)', fontSize:'15px', fontWeight:'bold', marginBottom:'4px'}}>📅 {ev.fecha} — {ev.hora} hrs</div>
                                        <div style={{color:'var(--text-muted)', fontSize:'15px', marginBottom:'4px'}}>📍 {ev.lugar}</div>
                                        {ev.nota && <div style={{fontSize:'14px', color:'var(--text-muted)', fontStyle:'italic', marginBottom:'8px'}}>{ev.nota}</div>}
                                        <div style={{display:'flex', gap:'10px', flexWrap:'wrap', marginTop:'10px'}}>
                                            {ev.lugar && <a href={mapsLink(ev.lugar)} target="_blank" rel="noreferrer" className="btn btn-secondary btn-sm" style={{textDecoration:'none', fontSize:'15px'}}>🗺️ Google Maps</a>}
                                            {user.rol==='admin' && <button className="btn btn-danger btn-sm" style={{fontSize:'14px'}} onClick={()=>eliminarEvento(ev.id)}>Eliminar</button>}
                                        </div>
                                    </div>
                                ))
                            }
                        </div>
                    )}

                    {/* BIBLIOTECA */}
                    {activeTab==="biblioteca" && (
                        <div>
                            <h3>Biblioteca del Grupo</h3>
                            {user.rol==='admin' && (
                                <div className="card" style={{borderColor:'var(--primary)'}}>
                                    <h4 style={{color:'var(--primary)', margin:'0 0 14px 0'}}>Subir Recurso</h4>
                                    <form onSubmit={subirMaterial}>
                                        <input type="text" className="input-field" placeholder="Titulo del recurso" value={libTitulo} onChange={e=>setLibTitulo(e.target.value)} />
                                        <select className="select-field" value={libTipo} onChange={e=>setLibTipo(e.target.value)}>
                                            <option value="Documento">Documento / PDF</option>
                                            <option value="Audio">Audio / Reunion</option>
                                            <option value="Video">Video Motivacional</option>
                                        </select>
                                        {/* Toggle URL / Archivo */}
                                        <div className="modo-toggle">
                                            <div className={"modo-btn"+(modoLib==="url"?" activo":"")} onClick={()=>setModoLib("url")}>🔗 Enlace URL</div>
                                            <div className={"modo-btn"+(modoLib==="archivo"?" activo":"")} onClick={()=>setModoLib("archivo")}>📁 Subir Archivo</div>
                                        </div>
                                        {modoLib==="url"
                                            ? <input type="text" className="input-field" placeholder="https://drive.google.com/..." value={libUrl} onChange={e=>setLibUrl(e.target.value)} />
                                            : (
                                                <div>
                                                    <input type="file" className="input-field" style={{padding:'10px'}} accept=".pdf,.mp3,.mp4,.doc,.docx,.jpg,.png" onChange={e=>setLibArchivo(e.target.files[0])} />
                                                    {libArchivo && <div style={{fontSize:'14px', color:'var(--accent)', marginTop:'-14px', marginBottom:'12px'}}>📎 {libArchivo.name} ({(libArchivo.size/1024/1024).toFixed(1)} MB)</div>}
                                                    {subiendo && (
                                                        <div>
                                                            <div style={{fontSize:'14px', color:'var(--primary)', marginBottom:'6px'}}>Subiendo... {uploadPct}%</div>
                                                            <div className="upload-progress"><div className="upload-progress-fill" style={{width:uploadPct+"%"}}></div></div>
                                                        </div>
                                                    )}
                                                </div>
                                            )
                                        }
                                        <button type="submit" className="btn btn-success" disabled={subiendo}>{subiendo?"Subiendo...":"Publicar Material"}</button>
                                    </form>
                                </div>
                            )}
                            {biblioteca.length===0
                                ? <p style={{color:'var(--text-muted)'}}>No hay material publicado.</p>
                                : biblioteca.map(b=>(
                                    <div key={b.id} className="biblioteca-item">
                                        <div>
                                            <strong>{b.titulo}</strong>
                                            <div style={{fontSize:'14px', color:'var(--text-muted)'}}>{b.tipo}</div>
                                        </div>
                                        <a href={b.link} target="_blank" rel="noreferrer" className="btn btn-sm btn-success" style={{textDecoration:'none'}}>Abrir</a>
                                    </div>
                                ))
                            }
                        </div>
                    )}

                    {/* PERFIL */}
                    {activeTab==="perfil" && (
                        <div>
                            <div className="card" style={{textAlign:'center'}}>
                                <h3>Mi Informacion</h3>
                                <p style={{color:'var(--text-muted)', fontSize:'15px'}}>Tu identificador de acceso:</p>
                                <p style={{background:'var(--bg-body)', padding:'14px', borderRadius:'10px', color:'var(--primary)', fontFamily:'monospace', fontWeight:'bold', fontSize:'16px'}}>{user.username}</p>
                                <p style={{fontSize:'14px', color:'var(--text-muted)'}}>Guarda este codigo para entrar desde cualquier dispositivo.</p>
                                <button className="btn btn-danger" style={{marginTop:'15px'}} onClick={salir}>Cerrar Sesion</button>
                            </div>
                            {user.rol==='admin' && (
                                <div className="card" style={{borderColor:'var(--warning)'}}>
                                    <h3 style={{color:'var(--warning)', margin:'0 0 15px 0'}}>Solicitudes Pendientes ({solicitudes.length})</h3>
                                    {solicitudes.length===0
                                        ? <p style={{color:'var(--text-muted)', fontSize:'16px'}}>No hay solicitudes nuevas.</p>
                                        : solicitudes.map(s=>(
                                            <div key={s.username} className="solicitud-box">
                                                <strong>👤 {s.nombre_real}</strong>
                                                <div style={{fontSize:'14px', color:'var(--text-muted)', marginTop:'4px'}}>ID: {s.username}</div>
                                                {s.telefonos && s.telefonos.length>0 && <div style={{fontSize:'14px', color:'var(--text-muted)'}}>Tel: {s.telefonos[0]}</div>}
                                                <div className="solicitud-acciones">
                                                    <button className="btn-small" style={{backgroundColor:'var(--accent)'}} onClick={()=>gestionarSol(s.username,true)}>Aceptar</button>
                                                    <button className="btn-small" style={{backgroundColor:'var(--danger)'}} onClick={()=>gestionarSol(s.username,false)}>Rechazar</button>
                                                </div>
                                            </div>
                                        ))
                                    }
                                </div>
                            )}
                        </div>
                    )}
                </div>

                <div className="navbar">
                    <div className={"nav-item"+(activeTab==='inicio'?' active':'')} onClick={()=>setActiveTab("inicio")}><div className="nav-icon">📊</div><span>Progreso</span></div>
                    <div className={"nav-item"+(activeTab==='pasos'?' active':'')} onClick={()=>setActiveTab("pasos")}><div className="nav-icon">⭐</div><span>12 Pasos</span></div>
                    <div className={"nav-item"+(activeTab==='eventos'?' active':'')} onClick={()=>setActiveTab("eventos")}><div className="nav-icon">📅</div><span>Eventos</span></div>
                    <div className={"nav-item"+(activeTab==='biblioteca'?' active':'')} onClick={()=>setActiveTab("biblioteca")}><div className="nav-icon">📚</div><span>Biblioteca</span></div>
                    <div className={"nav-item"+(activeTab==='perfil'?' active':'')} onClick={()=>setActiveTab("perfil")}><div className="nav-icon">👤</div><span>Perfil</span></div>
                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(()=>{});
    }
</script>
</body>
</html>
