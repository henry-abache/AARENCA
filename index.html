<link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1d4ed8">
  <meta name="mobile-web-app-capable" content="yes">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nueva Vida">
  <link rel="apple-touch-icon" href="1-192.png">

  <script>
    // Registro automático del Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => {
            console.log('¡Aplicación lista para ser instalada en el teléfono!', reg);
          })
          .catch(err => {
            console.error('Error al configurar modo app:', err);
          });
      });
    }
  </script>
