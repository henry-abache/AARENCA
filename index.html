        .sol-box{background:var(--input-bg);border:2px solid var(--warn);padding:10px;border-radius:10px;margin-bottom:7px;}

        .daily-day{font-size:10px;color:rgba(255,255,255,.7);margin-bottom:2px;font-weight:bold;text-transform:uppercase;}
        .navbar{position:absolute;bottom:0;left:0;right:0;height:86px;background:var(--card-bg);border-top:2px solid var(--border);display:flex;justify-content:space-around;align-items:center;}
        .nav-i{color:var(--muted);cursor:pointer;text-align:center;font-size:10px;font-weight:bold;flex:1;padding:4px 2px;line-height:1.2;}
        .nav-i.on{color:var(--primary);}
        .nav-ico{font-size:18px;margin-bottom:2px;}
        .up-bar-bg{height:5px;background:var(--input-border);border-radius:3px;margin-bottom:10px;overflow:hidden;}
        .up-bar-fill{height:100%;background:var(--primary);transition:width .3s;}
        .add-ad{border:2px dashed var(--input-border);border-radius:12px;padding:13px;margin-bottom:14px;background:var(--input-bg);}
        .admin-tgl{display:block;text-align:right;color:var(--muted);font-size:13px;text-decoration:underline;cursor:pointer;margin-top:-8px;margin-bottom:14px;}
        .dot{display:inline-block;width:7px;height:7px;background:#dc2626;border-radius:50%;margin-left:2px;vertical-align:middle;}
    </style>
</head>

    const hoyStr = diasSem[new Date().getDay()] + " " + new Date().getDate();

    React.useEffect(() => {
        const t = localStorage.getItem("tema_nv");

        const s = localStorage.getItem("sesion_nv");
        if (s) { try { setUser(JSON.parse(s)); } catch(e) { localStorage.removeItem("sesion_nv"); } }
    }, []);

    React.useEffect(() => {
        if (!user) return;
        cargar();
        const iv = setInterval(cargar, 20000);
        return () => clearInterval(iv);
    }, [user]);

    async function cargar() {
        try {
            const { data: u } = await supabase.from('usuarios').select('*').eq('username', user.username).single();
            if (u) {
                setMisAds(u.adicciones || {});
                setPasoActual(u.paso_actual || 0);
                setPasosComp(u.pasos_completados || []);
                setMiTel((u.telefonos && u.telefonos.length > 0) ? u.telefonos[0] : "");

            const { data: b } = await supabase.from('biblioteca').select('*').eq('grupo_id', user.grupoId).order('id',{ascending:false});

        e.preventDefault();
        if (!nombre || !sede) return alert("Completa nombre y sede.");
        if (errTelReg) return alert("Corrige el numero de telefono.");
        let rol="basico", estado="pendiente";
        if (showAdmin) { if (claveAdm!==CLAVE_ADMIN) return alert("Clave de administrador incorrecta."); rol="admin"; estado="autorizado"; }
        const g = GRUPOS.find(x=>x.id===sede);
        const uid = nombre.replace(/\s+/g,"") + "_" + g.id;
        try {
            const { data: ex } = await supabase.from('usuarios').select('username').eq('username',uid).maybeSingle();
            if (ex) return alert("El nombre \"" + nombre + "\" ya existe en esta sede.");
            const ads = {};
            ADICCIONES.forEach(a => { if (checks[a]) ads[a] = fechas[a] || new Date().toISOString().split('T')[0]; });
            const tel = telReg.trim();
            const tels = (tel && tel!=="+569") ? [tel] : [];
            const { error } = await supabase.from('usuarios').insert([{username:uid, nombre_real:nombre, grupo_id:sede, grupo_nombre:g.nombre, rol, estado, adicciones:ads, telefonos:tels, paso_actual:0, pasos_completados:[]}]);
            if (error) { alert("Error: " + error.message); return; }
            const s = {username:uid, nombreReal:nombre, grupoId:sede, grupoNombre:g.nombre, rol, estado};
            localStorage.setItem("sesion_nv", JSON.stringify(s));
            setUser(s); setMisAds(ads);
        } catch(err) { alert("Error: " + err.message); }
    };
    const entrar = async (e) => {
        e.preventDefault();
        if (!loginId) return;
        const { data } = await supabase.from('usuarios').select('*').eq('username',loginId).maybeSingle();
        if (data) {
            const s = {username:data.username, nombreReal:data.nombre_real, grupoId:data.grupo_id, grupoNombre:data.grupo_nombre, rol:data.rol, estado:data.estado};
            localStorage.setItem("sesion_nv", JSON.stringify(s));
            setUser(s); setMisAds(data.adicciones||{}); setPasoActual(data.paso_actual||0);
            setPasosComp(data.pasos_completados||[]);
            setMiTel((data.telefonos&&data.telefonos.length>0) ? data.telefonos[0] : "");
        } else alert("Identificador no encontrado.");
    };
    const salir = () => { if (!confirm("Cerrar sesion?")) return; localStorage.removeItem("sesion_nv"); setUser(null); };
    const subirBib = async (e) => {
        e.preventDefault();
        if (!libTit) return alert("Escribe un titulo.");
        let url="";
        if (modoLib==="url") { if (!libUrl) return alert("Pega el enlace URL."); url=libUrl.trim(); }
        else {
            if (!libFile) return alert("Selecciona un archivo.");
            if (libFile.size > 10*1024*1024) return alert("El archivo supera los 10MB.");
            setSubiendo(true); setUpPct(15);
            try {
                const fn = Date.now()+"_"+libFile.name.replace(/[^a-zA-Z0-9._-]/g,"_");
                setUpPct(40);
                const { error: upErr } = await supabase.storage.from('archivos').upload(fn, libFile, {upsert:true, contentType:libFile.type});
                if (upErr) { setSubiendo(false); return alert("Error al subir: " + upErr.message); }
                setUpPct(85);
                const { data: pub } = supabase.storage.from('archivos').getPublicUrl(fn);
                if (!pub?.publicUrl) { setSubiendo(false); return alert("Error obteniendo URL."); }
                url=pub.publicUrl; setUpPct(100);
            } catch(err) { setSubiendo(false); return alert("Error: " + err.message); }
            setSubiendo(false); setUpPct(0);
        }
        const { error } = await supabase.from('biblioteca').insert([{grupo_id:user.grupoId, titulo:libTit, tipo:libTipo, link:url}]);
        if (!error) { setLibTit(""); setLibUrl(""); setLibFile(null); cargar(); alert("Publicado."); }
        else alert("Error: " + error.message);
    };
    const crearEv = async (e) => {
        e.preventDefault();
        if (!evTit||!evFecha||!evHora||!evLugar) return alert("Completa todos los campos requeridos.");
        if (errHora) return alert("Corrige la hora.");
        const { error } = await supabase.from('eventos').insert([{grupo_id:user.grupoId, titulo:evTit, fecha:evFecha, hora:evHora, lugar:evLugar, nota:evNota}]);
        if (!error) { alert("Evento publicado."); setEvTit(""); setEvFecha(""); setEvHora(""); setEvLugar(""); setEvNota(""); cargar(); }
        else alert("Error: " + error.message);
    };
    const elimEv = async (id) => { if (!confirm("Eliminar evento?")) return; await supabase.from('eventos').delete().eq('id',id); cargar(); };
    const gestionarSol = async (username, aprobar) => {
        if (aprobar) { const { error } = await supabase.from('usuarios').update({estado:'autorizado'}).eq('username',username); if (!error) { alert("Usuario autorizado."); cargar(); } }
        else { if (!confirm("Rechazar a " + username + "?")) return; await supabase.from('usuarios').delete().eq('username',username); alert("Eliminado."); cargar(); }
    };
    const elimMiembro = async (username, nombreReal) => {
        if (!confirm("ATENCION: Eliminar permanentemente a \"" + nombreReal + "\"?")) return;
        const { error } = await supabase.from('usuarios').delete().eq('username',username);

    };
    const dias = f => { if (!f) return 0; const d=Math.floor((new Date()-new Date(f))/86400000); return d<0?0:d; };
    const mapsUrl = dir => "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(dir);
    const dirAgrupado = GRUPOS.map(g => {

    const adsPendientes = ADICCIONES.filter(a=>!misAds[a]);

    const LogoHeader = () => logoErr

                    : <img src="logo-aa.png" alt="AA" style={{width:'64px',height:'64px',objectFit:'contain',borderRadius:'12px',marginBottom:'6px'}} onError={()=>setLogoErr(true)} />
                }
                <h2 style={{color:'var(--primary)',fontSize:'20px',margin:'4px 0 0'}}>Nueva Vida AA</h2>

                    <input type="tel" className={"field"+(errTelReg?" err":"")} placeholder="+56912345678" value={telReg} onChange={e=>validTel(e.target.value,setTelReg,setErrTelReg)} />

                    <button type="submit" className="btn btn-s" style={{marginTop:'11px'}}>Registrar e Ingresar</button>
                </form>

                <form onSubmit={entrar}>

                </form>
            </div>
        </div>

                                    <span style={{color:'var(--primary)',fontSize:'20px'}}>›</span>
                                </div>
                            </div>

                                <span style={{fontSize:'12px',color:'var(--muted)',cursor:'pointer',textDecoration:'underline'}} onClick={()=>setElimAdMode(!elimAdMode)}>
                                    {elimAdMode?"Ocultar":"Gestionar"}

                                            <div style={{display:'flex',alignItems:'center',gap:'6px'}}>

                                                        <div style={{display:'flex',alignItems:'center',gap:'3px',flexWrap:'wrap'}}>
                                                            <span style={{fontWeight:'bold',fontSize:'15px',color:'var(--text)'}}>{m.nombre_real}</span>

                                </div>

                    </div>
                )}

                {tab==="eventos" && (
                    <div>
                        <h3 style={{color:'var(--text)',fontSize:'17px'}}>Proximos Eventos</h3>

                                    <input type="text" className="field" placeholder="Nombre del evento o reunion" value={evTit} onChange={e=>setEvTit(e.target.value)} />

                                        <input type="date" className="field" style={{flex:1}} value={evFecha} onChange={e=>setEvFecha(e.target.value)} />

                                    <input type="text" className="field" placeholder="Nota adicional (opcional)" value={evNota} onChange={e=>setEvNota(e.target.value)} />

                        <h3 style={{color:'var(--text)',fontSize:'17px'}}>Biblioteca de Recursos</h3>
                        {user.rol==='admin' && (
                            <div className="card" style={{borderColor:'var(--primary)'}}>
                                <h4 style={{color:'var(--primary)',margin:'0 0 10px',fontSize:'15px'}}>Subir Recurso</h4>
                                <form onSubmit={subirBib}>
                                    <input type="text" className="field" placeholder="Titulo del documento o folleto" value={libTit} onChange={e=>setLibTit(e.target.value)} />
                                    <select className="field" value={libTipo} onChange={e=>setLibTipo(e.target.value)}>
                                        <option value="Documento">📄 Documento / PDF</option>
                                        <option value="Audio">🎵 Audio / Grabacion</option>
                                        <option value="Libro">📘 Libro completo</option>
                                        <option value="Video">🎥 Video</option>
                                    </select>
                                    <div className="modo-toggle">
                                        <div className={"modo-btn"+(modoLib==="url"?" on":"")} onClick={()=>setModoLib("url")}>🔗 Enlace URL</div>
                                        <div className={"modo-btn"+(modoLib==="archivo"?" on":"")} onClick={()=>setModoLib("archivo")}>📁 Subir Archivo</div>
                                    </div>
                                    {modoLib==="url"
                                        ? <input type="url" className="field" placeholder="https://enlace-al-recurso.com" value={libUrl} onChange={e=>setLibUrl(e.target.value)} />
                                        : <div style={{marginBottom:'12px'}}>
                                            <input type="file" accept="*/*" style={{color:'var(--text)',fontSize:'13px',width:'100%'}} onChange={e=>setLibFile(e.target.files[0])} />
                                            <p style={{fontSize:'11px',color:'var(--muted)',margin:'4px 0 0'}}>Maximo 10MB. Archivos grandes: sube a Google Drive y pega el enlace.</p>
                                            {libFile && <div style={{fontSize:'11px',color:'var(--accent)',marginTop:'3px'}}>📎 {libFile.name} ({(libFile.size/1024/1024).toFixed(1)} MB)</div>}
                                          </div>
                                    }
                                    {subiendo && <div><div className="up-bar-bg"><div className="up-bar-fill" style={{width:upPct+"%"}}></div></div><span style={{fontSize:'11px',color:'var(--primary)',display:'block',marginBottom:'8px'}}>Subiendo... {upPct}%</span></div>}
                                    <button type="submit" className="btn btn-s" disabled={subiendo}>{subiendo?"Subiendo...":"Publicar Recurso"}</button>
                                </form>
                            </div>
                        )}
                        {biblioteca.length===0
                            ? <p style={{color:'var(--muted)',textAlign:'center'}}>No hay lecturas disponibles.</p>
                            : biblioteca.map(b=>(
                                <div key={b.id} className="bib-item">
                                    <div>
                                        <span style={{fontSize:'10px',color:'var(--accent)',fontWeight:'bold',display:'block',textTransform:'uppercase'}}>{b.tipo}</span>
                                        <span style={{fontWeight:'bold',color:'var(--text)',fontSize:'14px'}}>{b.titulo}</span>
                                    </div>
                                    <a href={b.link} target="_blank" rel="noreferrer" className="btn btn-sm" style={{textDecoration:'none',fontSize:'13px'}}>Abrir</a>
                                </div>
                            ))
                        }
                    </div>
                )}

                {tab==="admin" && user.rol==='admin' && (
                    <div>
                        <h3 style={{color:'var(--text)',fontSize:'17px'}}>Panel de Administracion</h3>
                        <div className="card" style={{borderColor:'var(--warn)'}}>
                            <h4 style={{color:'var(--warn)',margin:'0 0 8px',fontSize:'15px'}}>Solicitudes Pendientes ({solicitudes.length})</h4>
                            {solicitudes.length===0
                                ? <p style={{color:'var(--muted)',fontSize:'13px',margin:0}}>No hay solicitudes pendientes.</p>
                                : solicitudes.map(s=>(
                                    <div key={s.username} className="sol-box">
                                        <div style={{fontSize:'13px',color:'var(--text)'}}>
                                            <strong>{s.nombre_real}</strong>
                                            <div style={{fontSize:'11px',color:'var(--muted)',marginTop:'2px'}}>ID: {s.username}</div>
                                            <div style={{fontSize:'11px',color:'var(--muted)'}}>Tel: {(s.telefonos&&s.telefonos[0])||"No ingresado"}</div>
                                        </div>
                                        <div className="sol-acc">
                                            <button className="btn-xs" style={{background:'var(--accent)'}} onClick={()=>gestionarSol(s.username,true)}>Autorizar</button>
                                            <button className="btn-xs" style={{background:'var(--danger)'}} onClick={()=>gestionarSol(s.username,false)}>Rechazar</button>
                                        </div>
                                    </div>
                                ))
                            }
                        </div>
                        <div className="card">
                            <h4 style={{color:'var(--text)',margin:'0 0 10px',fontSize:'15px'}}>Miembros de mi Sede</h4>
                            <p style={{fontSize:'11px',color:'var(--muted)',margin:'0 0 11px'}}>Puedes eliminar registros de personas que ya no pertenecen.</p>
                            {miembrosSede.length===0
                                ? <p style={{color:'var(--muted)',fontSize:'13px'}}>No hay miembros.</p>
                                : miembrosSede.map(m=>(
                                    <div key={m.username} className="miembro-row">
                                        <div>
                                            <div style={{fontWeight:'bold',color:'var(--text)',fontSize:'14px'}}>
                                                {m.nombre_real}{m.rol==='admin'&&<span style={{color:'#a78bfa',fontSize:'11px',marginLeft:'4px'}}>(Admin)</span>}
                                            </div>
                                            <div style={{fontSize:'11px',color:'var(--muted)'}}>ID: {m.username}</div>
                                            <div style={{fontSize:'11px',color:m.estado==='autorizado'?'var(--accent)':'var(--warn)'}}>{m.estado==='autorizado'?'✅ Autorizado':'⏳ Pendiente'}</div>
                                        </div>
                                        {m.username!==user.username && <button className="btn btn-d btn-sm" style={{fontSize:'11px',padding:'4px 8px'}} onClick={()=>elimMiembro(m.username,m.nombre_real)}>Eliminar</button>}
                                    </div>
                                ))
                            }
                        </div>
                    </div>
                )}
            </div>

            <div className="navbar">
                <div className={"nav-i"+(tab==="inicio"?" on":"")} onClick={()=>setTab("inicio")}><div className="nav-ico">🏠</div>Inicio</div>
                <div className={"nav-i"+(tab==="pasos"?" on":"")} onClick={()=>setTab("pasos")}><div className="nav-ico">📋</div>12 Pasos</div>
                <div className={"nav-i"+(tab==="directorio"?" on":"")} onClick={()=>setTab("directorio")}><div className="nav-ico">📇</div>Contac.</div>
                <div className={"nav-i"+(tab==="eventos"?" on":"")} onClick={()=>setTab("eventos")}><div className="nav-ico">📅</div>Eventos</div>
                <div className={"nav-i"+(tab==="biblioteca"?" on":"")} onClick={()=>setTab("biblioteca")}><div className="nav-ico">📚</div>Libros</div>
                {user.rol==='admin' && <div className={"nav-i"+(tab==="admin"?" on":"")} onClick={()=>setTab("admin")}><div className="nav-ico">⚙️{solicitudes.length>0?<span className="dot"></span>:''}</div>Admin</div>}
            </div>
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});</script>
</body>
</html>
