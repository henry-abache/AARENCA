function calcularDias(fechaStr) {
  if (!fechaStr) return 0;
  const d = Math.floor((new Date() - new Date(fechaStr)) / (1000 * 60 * 60 * 24));
  return d < 0 ? 0 : d;
}
function formatFecha(dateStr) {
  if (!dateStr) return "";
  const [y, m, d] = dateStr.split("-");
  return `${d}/${m}/${y}`;
}
function formatHora(timeStr) {
  if (!timeStr) return "";
  const [h, m] = timeStr.split(":");
  const hh = parseInt(h);
  const ampm = hh >= 12 ? "PM" : "AM";
  const h12 = hh % 12 || 12;
  return `${h12}:${m} ${ampm}`;
}
function tiempoDesde(ts) {
  if (!ts) return "";
  const diff = Date.now() - new Date(ts).getTime();
  const min = Math.floor(diff / 60000);
  if (min < 1) return "Ahora";
  if (min < 60) return `Hace ${min} min`;
  const h = Math.floor(min / 60);
  if (h < 24) return `Hace ${h} h`;
  return `Hace ${Math.floor(h/24)} días`;
}
function limpiarTelefono(tel) {

  async function aprobarUsuario(username) {
    const { error } = await supabase.from('usuarios').update({ estado: 'aprobado' }).eq('username', username);
    if (!error) { alert("✅ Usuario aprobado."); cargarDatos(); }
    else alert("Error: " + error.message);
  }

  async function rechazarUsuario(username, nombre_real) {
    if (!confirm(`¿Rechazar la solicitud de ${nombre_real}?`)) return;
    const { error } = await supabase.from('usuarios').update({ estado: 'rechazado' }).eq('username', username);
    if (!error) { alert("❌ Solicitud rechazada."); cargarDatos(); }
    else alert("Error: " + error.message);
  }

  async function registrarRecaida(adiccion) {
    if (!confirm(`¿Desea reiniciar el contador de "${adiccion}"?`)) return;
    const hoy = new Date().toISOString().split('T')[0];
    const nuevas = { ...misAdicciones, [adiccion]: hoy };
    const { error } = await supabase.from('usuarios').update({ adicciones: nuevas }).eq('username', user.username);
    if (!error) {
      setMisAdicciones(nuevas);
      setLecturaRecomendada(LECTURAS[Math.floor(Math.random() * LECTURAS.length)]);
      setMostrarAliento(true);
    }
  }

  async function cambiarPaso(n) {
    const yaCompletado = pasosCompletados.includes(n);
    let nuevosPasos;
    if (yaCompletado) {
      nuevosPasos = pasosCompletados.filter(p => p < n);
    } else {
      nuevosPasos = Array.from({length: n}, (_, i) => i + 1);
    }
    const nuevoActual = nuevosPasos.length > 0 ? Math.max(...nuevosPasos) : 0;
    const { error } = await supabase.from('usuarios').update({
      paso_actual: nuevoActual,
      pasos_completados: nuevosPasos
    }).eq('username', user.username);
    if (!error) {
      setPasoActual(nuevoActual);
      setPasosCompletados(nuevosPasos);
    }
  }

  async function subirMaterial() {
    if (!nuevoTitulo) return alert("Escribe un título para el material.");
    let linkFinal = nuevoLink;
    if (modoSubida === 'archivo') {
      if (!archivoLocal) return alert("Selecciona un archivo.");
      setSubiendoArchivo(true);
      const nombreArchivo = `${user.grupoId}/${Date.now()}_${archivoLocal.name.replace(/\s+/g, '_')}`;
      const { error: upError } = await supabase.storage
        .from('biblioteca-archivos')
        .upload(nombreArchivo, archivoLocal, { cacheControl: '3600', upsert: false });
      if (upError) {
        setSubiendoArchivo(false);
        return alert("Error al subir archivo: " + upError.message);
      }
      const { data: urlData } = supabase.storage.from('biblioteca-archivos').getPublicUrl(nombreArchivo);
      linkFinal = urlData.publicUrl;
    } else {
      if (!nuevoLink) return alert("Pega un enlace válido.");
    }
    const { error } = await supabase.from('biblioteca').insert([{
      grupo_id: user.grupoId, titulo: nuevoTitulo, tipo: nuevoTipo, link: linkFinal
    }]);
    setSubiendoArchivo(false);
    if (!error) {
      setNuevoTitulo(""); setNuevoLink(""); setArchivoLocal(null); setModoSubida('enlace');
      cargarDatos(); alert("✅ Publicado.");
    } else alert("Error: " + error.message);
  }

  async function eliminarMaterial(id) {
    if (!confirm("¿Eliminar este material?")) return;
    await supabase.from('biblioteca').delete().eq('id', id);
    cargarDatos();
  }

  async function crearEvento() {
    if (!evTitulo || !evFecha || !evHora) return alert("Título, fecha y hora son obligatorios.");
    setGuardandoEvento(true);
    const grupoSel = GRUPOS.find(g => g.id === user.grupoId);
    const lugar = evLugar.trim() || grupoSel.nombre;
    const nuevoEv = {
      grupo_id: user.grupoId,
      titulo: evTitulo.trim(),
      descripcion: evDesc.trim(),
      fecha: evFecha,
      hora: evHora,
      lugar,
      direccion: evDireccion.trim(),
      imagen_url: evImagenUrl.trim(),
      creado_por: user.username,
      creado_por_nombre: user.nombreReal
    };
    const { data: evInserted, error } = await supabase.from('eventos').insert([nuevoEv]).select().single();
    if (error) { alert("Error al crear evento: " + error.message); setGuardandoEvento(false); return; }

    const { data: miembros } = await supabase.from('usuarios').select('username').eq('grupo_id', user.grupoId).eq('estado', 'aprobado');
    if (miembros && miembros.length > 0) {
      const notifs = miembros.map(m => ({
        grupo_id: user.grupoId,
        username_destinatario: m.username,
        tipo: 'evento',
        titulo: `📅 Nuevo Evento: ${evTitulo.trim()}`,
        mensaje: `${user.nombreReal} agregó un evento para el ${formatFecha(evFecha)} a las ${formatHora(evHora)} en ${lugar}.`,
        evento_id: evInserted.id,
        leida: false
      }));
      await supabase.from('notificaciones').insert(notifs);
    }
    setEvTitulo(""); setEvDesc(""); setEvFecha(""); setEvHora(""); setEvLugar(""); setEvDireccion(""); setEvImagenUrl("");
    setGuardandoEvento(false);
    alert("✅ Evento creado y notificaciones enviadas.");
    cargarDatos();
  }

  async function eliminarEvento(id) {
    if (!confirm("¿Eliminar este evento?")) return;
    await supabase.from('eventos').delete().eq('id', id);
    cargarDatos();
  }

  async function marcarLeida(id) {
    await supabase.from('notificaciones').update({ leida: true }).eq('id', id);
    setNotificaciones(prev => prev.map(n => n.id === id ? {...n, leida: true} : n));
    setNotifNuevas(prev => Math.max(0, prev - 1));
  }

  async function marcarTodasLeidas() {
    const ids = notificaciones.filter(n => !n.leida).map(n => n.id);
    if (ids.length === 0) return;
    await supabase.from('notificaciones').update({ leida: true }).in('id', ids);
    setNotificaciones(prev => prev.map(n => ({...n, leida: true})));
    setNotifNuevas(0);
  }

      if (d.rol === 'admin') grupos[d.grupo_id].admins.push(d);

                <button className="btn btn-success" onClick={crearEvento} disabled={guardandoEvento}>
                  {guardandoEvento ? "Guardando..." : "📅 Publicar Evento y Notificar"}
                </button>
              </div>
            )}
            {eventosProximos.length > 0 && (
              <div>
                <h4 style={{color: 'var(--accent)'}}>Próximos</h4>
                {eventosProximos.map(ev => (
                  <div key={ev.id} className="evento-card" style={{borderColor: 'var(--primary)'}}>
                    <div className="evento-titulo">{ev.titulo}</div>
                    <div className="evento-meta">📆 {formatFecha(ev.fecha)} · ⏰ {formatHora(ev.hora)}</div>
                    <div className="evento-meta">📍 {ev.lugar}{ev.direccion && ` — ${ev.direccion}`}</div>
                    {ev.descripcion && <div className="evento-desc">{ev.descripcion}</div>}
                    <div className="evento-meta" style={{fontSize: '13px'}}>Organizado por: {ev.creado_por_nombre}</div>
                    {ev.imagen_url && <img src={ev.imagen_url} alt="Evento" className="evento-imagen" onError={e => e.target.style.display='none'} />}
                    {user.rol === 'admin' && (
                      <button className="btn btn-danger btn-sm" style={{marginTop: '12px'}} onClick={() => eliminarEvento(ev.id)}>Eliminar evento</button>
                    )}
                  </div>
                ))}
              </div>
            )}
            {eventosPasados.length > 0 && (
              <div>
                <h4 style={{color: 'var(--text-muted)'}}>Anteriores</h4>
                {eventosPasados.slice().reverse().map(ev => (
                  <div key={ev.id} className="evento-card" style={{opacity: 0.65}}>
                    <div className="evento-titulo">{ev.titulo}</div>
                    <div className="evento-meta">📆 {formatFecha(ev.fecha)} · ⏰ {formatHora(ev.hora)}</div>
                    <div className="evento-meta">📍 {ev.lugar}</div>
                    {ev.imagen_url && <img src={ev.imagen_url} alt="Evento" className="evento-imagen" onError={e => e.target.style.display='none'} />}
                    {user.rol === 'admin' && (
                      <button className="btn btn-danger btn-sm" style={{marginTop: '10px'}} onClick={() => eliminarEvento(ev.id)}>Eliminar evento</button>
                    )}
                  </div>
                ))}
              </div>
            )}
            {eventos.length === 0 && <p style={{color: 'var(--text-muted)', textAlign: 'center', marginTop: '30px'}}>No hay eventos programados aún.</p>}
          </div>
        )}

        {/* ===== DIRECTORIO ===== */}
        {activeTab === "directorio" && (
          <div>
            <h3 className="section-title">📞 Directorio</h3>
            <p style={{color: 'var(--text-muted)', fontSize: '15px', marginBottom: '20px'}}>
              Toca el botón verde para abrir WhatsApp. Los administradores aparecen primero.
            </p>
            {GRUPOS.map(g => {
              const grupo = gruposDir[g.id];
              const todos = [...(grupo?.admins || []), ...(grupo?.miembros || [])];
              if (todos.length === 0) return null;
              return (
                <div key={g.id} className="directorio-sede">
                  <div className="directorio-sede-titulo">{g.nombre}</div>
                  {todos.map((m, i) => (
                    <div key={i} className={`directorio-item${m.rol === 'admin' ? ' es-admin' : ''}`}>
                      <div>
                        <div className="directorio-nombre">
                          {m.nombre_real}
                          {m.rol === 'admin' && <span className="tag-admin">ADMIN</span>}
                        </div>
                        <div style={{fontSize: '14px', color: 'var(--text-muted)'}}>{limpiarTelefono(m.telefono)}</div>
                      </div>
                      
                        href={`https://wa.me/${limpiarTelefono(m.telefono).replace('+', '')}`}
                        target="_blank"
                        rel="noreferrer"
                        className="whatsapp-btn"
                      >
                        <span style={{fontSize: '20px'}}>💬</span> WhatsApp
                      </a>
                    </div>
                  ))}
                </div>
              );
            })}
            {directorio.length === 0 && <p style={{color: 'var(--text-muted)', textAlign: 'center', marginTop: '30px'}}>Ningún miembro ha compartido su número aún.</p>}
          </div>
        )}

        {/* ===== BIBLIOTECA ===== */}
        {activeTab === "biblioteca" && (
          <div>
            <h3 className="section-title">📚 Biblioteca</h3>
            {user.rol === 'admin' && (
              <div className="card" style={{borderColor: 'var(--accent)'}}>
                <h4 style={{color: 'var(--accent)', marginTop: 0}}>➕ Agregar Material</h4>
                <label>Título</label>
                <input type="text" className="input-field" placeholder="Nombre del material" value={nuevoTitulo} onChange={e => setNuevoTitulo(e.target.value)} />
                <label>Tipo</label>
                <select className="select-field" value={nuevoTipo} onChange={e => setNuevoTipo(e.target.value)}>
                  <option>Documento</option>
                  <option>Video</option>
                  <option>Audio</option>
                  <option>Enlace</option>
                </select>
                <div style={{display: 'flex', gap: '10px', marginBottom: '14px'}}>
                  <button type="button"
                    className={"btn btn-sm" + (modoSubida === 'enlace' ? '' : ' btn-secondary')}
                    onClick={() => { setModoSubida('enlace'); setNuevoLink(''); setArchivoLocal(null); }}>
                    🔗 Pegar enlace
                  </button>
                  <button type="button"
                    className={"btn btn-sm" + (modoSubida === 'archivo' ? '' : ' btn-secondary')}
                    onClick={() => { setModoSubida('archivo'); setNuevoLink(''); setArchivoLocal(null); }}>
                    📁 Subir archivo
                  </button>
                </div>
                {modoSubida === 'enlace' && (
                  <div>
                    <label>Enlace (URL)</label>
                    <input type="url" className="input-field" placeholder="https://..." value={nuevoLink} onChange={e => setNuevoLink(e.target.value)} />
                  </div>
                )}
                {modoSubida === 'archivo' && (
                  <div>
                    <label>Seleccionar archivo del teléfono</label>
                    <input type="file" className="input-field" style={{padding: '12px'}}
                      accept=".pdf,.doc,.docx,.mp3,.mp4,.jpg,.jpeg,.png,.gif"
                      onChange={e => setArchivoLocal(e.target.files[0])} />
                    {archivoLocal && <p style={{color: 'var(--accent)', fontSize: '14px', margin: '-8px 0 8px'}}>📎 {archivoLocal.name}</p>}
                    <p style={{color: 'var(--text-muted)', fontSize: '13px', margin: '0 0 12px'}}>Formatos: PDF, Word, MP3, MP4, imágenes</p>
                  </div>
                )}
                <button className="btn btn-success" onClick={subirMaterial} disabled={subiendoArchivo}>
                  {subiendoArchivo ? "Subiendo..." : "Publicar"}
                </button>
              </div>
            )}
            {biblioteca.length === 0 && <p style={{color: 'var(--text-muted)', textAlign: 'center', marginTop: '20px'}}>No hay material publicado aún.</p>}
            {biblioteca.map(b => (
              <div key={b.id} className="biblioteca-item">
                <div>
                  <div style={{fontWeight: 'bold', fontSize: '17px'}}>{b.titulo}</div>
                  <div style={{fontSize: '13px', color: 'var(--text-muted)'}}>{b.tipo}</div>
                </div>
                <div style={{display: 'flex', gap: '8px', alignItems: 'center'}}>
                  <a href={b.link} target="_blank" rel="noreferrer" className="btn btn-sm">Abrir</a>
                  {user.rol === 'admin' && <button className="btn btn-sm btn-danger" onClick={() => eliminarMaterial(b.id)}>🗑️</button>}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* ===== ADMIN ===== */}
        {activeTab === "admin" && user.rol === 'admin' && (
          <div>
            <h3 className="section-title">👥 Administración de Sede</h3>
            <h4 style={{color: 'var(--warning)'}}>⏳ Solicitudes Pendientes ({solicitudesPendientes.length})</h4>
            {solicitudesPendientes.length === 0 && <p style={{color: 'var(--text-muted)'}}>No hay solicitudes pendientes.</p>}
            {solicitudesPendientes.map(sol => (
              <div key={sol.username} className="solicitud-card">
                <span className="badge badge-pendiente">PENDIENTE</span>
                <div className="solicitud-nombre">{sol.nombre_real}</div>
                <div className="solicitud-info">🆔 {sol.username}</div>
                {sol.telefono && <div className="solicitud-info">📞 {sol.telefono}</div>}
                <div className="solicitud-info">📅 {sol.created_at ? new Date(sol.created_at).toLocaleDateString('es-CL') : '—'}</div>
                <div className="solicitud-actions">
                  <button className="btn btn-success btn-sm" onClick={() => aprobarUsuario(sol.username)}>✅ Aprobar</button>
                  <button className="btn btn-danger btn-sm" onClick={() => rechazarUsuario(sol.username, sol.nombre_real)}>❌ Rechazar</button>
                </div>
              </div>
            ))}
            <hr className="divider" />
            <h4 style={{color: 'var(--text-muted)', cursor: 'pointer'}} onClick={() => setMostrarRechazados(!mostrarRechazados)}>
              🚫 Rechazados ({solicitudesRechazadas.length}) {mostrarRechazados ? '▲' : '▼'}
            </h4>
            {mostrarRechazados && (
              <div>
                {solicitudesRechazadas.length === 0 && <p style={{color: 'var(--text-muted)'}}>No hay rechazados.</p>}
                {solicitudesRechazadas.map(sol => (
                  <div key={sol.username} className="solicitud-card rechazada">
                    <span className="badge badge-rechazado">RECHAZADO</span>
                    <div className="solicitud-nombre">{sol.nombre_real}</div>
                    <div className="solicitud-info">🆔 {sol.username}</div>
                    {sol.telefono && <div className="solicitud-info">📞 {sol.telefono}</div>}
                    <div className="solicitud-actions">
                      <button className="btn btn-success btn-sm" onClick={() => aprobarUsuario(sol.username)}>✅ Aprobar ahora</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

      </div>

      {/* NAVBAR */}
      <div className="navbar">
        <div className={"nav-item" + (activeTab === "inicio" ? " active" : "")} onClick={() => setActiveTab("inicio")}>
          <div className="nav-icon">🏠</div>Inicio
        </div>
        <div className={"nav-item" + (activeTab === "pasos" ? " active" : "")} onClick={() => setActiveTab("pasos")}>
          <div className="nav-icon">✨</div>Pasos
        </div>
        <div className={"nav-item" + (activeTab === "eventos" ? " active" : "")} onClick={() => setActiveTab("eventos")}>
          <div className="nav-icon">📅</div>Eventos
        </div>
        <div className={"nav-item" + (activeTab === "directorio" ? " active" : "")} onClick={() => setActiveTab("directorio")}>
          <div className="nav-icon">📞</div>Directorio
        </div>
        <div className={"nav-item" + (activeTab === "biblioteca" ? " active" : "")} onClick={() => setActiveTab("biblioteca")}>
          <div className="nav-icon">📚</div>Biblio
        </div>
        {user.rol === 'admin' && (
          <div className={"nav-item" + (activeTab === "admin" ? " active" : "")} onClick={() => setActiveTab("admin")}>
            <div className="nav-icon">⚙️</div>Admin
          </div>
        )}
      </div>

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
