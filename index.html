<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Vida - Alcohólicos Anónimos</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/thumb/8/84/AA_logo.svg/240px-AA_logo.svg.png">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-app: #0f172a; --bg-body: #020617; --card-bg: #1e293b;
            --border-color: #334155; --input-bg: #0f172a; --input-border: #475569;
            --text-main: #f8fafc; --text-muted: #cbd5e1;
            --primary: #2563eb; --accent: #16a34a; --warning: #d97706; --danger: #dc2626;
        }
        .light-theme {
            --bg-app: #f8fafc; --bg-body: #e2e8f0; --card-bg: #ffffff;
            --border-color: #cbd5e1; --input-bg: #f1f5f9; --input-border: #94a3b8;
            --text-main: #0f172a; --text-muted: #475569;
            --primary: #1d4ed8; --accent: #15803d; --warning: #b45309; --danger: #b91c1c;
        }
        body { margin: 0; padding: 0; background-color: var(--bg-body); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 19px; transition: background-color 0.3s, color 0.3s; }
        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; background-color: var(--bg-app); display: flex; flex-direction: column; position: relative; box-shadow: 0 0 25px rgba(0,0,0,0.3); padding-bottom: 95px; box-sizing: border-box; transition: background-color 0.3s; }
        .header { padding: 18px 24px; background-color: var(--card-bg); border-bottom: 2px solid var(--border-color); text-align: center; position: relative; }
        .header h1 { margin: 4px 0 0 0; font-size: 22px; }
        .theme-toggle-btn { position: absolute; top: 16px; right: 16px; background: var(--bg-app); border: 2px solid var(--border-color); color: var(--text-main); padding: 7px 11px; border-radius: 12px; cursor: pointer; font-size: 15px; font-weight: bold; }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .card { background-color: var(--card-bg); border-radius: 20px; padding: 24px; margin-bottom: 20px; border: 2px solid var(--border-color); }
        .input-field, .select-field { width: 100%; padding: 16px; background-color: var(--input-bg); border: 2px solid var(--input-border); border-radius: 14px; color: var(--text-main); font-size: 18px; margin-top: 8px; margin-bottom: 20px; box-sizing: border-box; }
        .input-error { border-color: #dc2626 !important; }
        .error-msg { color: #ef4444; font-size: 14px; margin-top: -16px; margin-bottom: 14px; display: block; background: #1a0a0a; padding: 8px 12px; border-radius: 8px; border-left: 3px solid #dc2626; }
        .btn { background-color: var(--primary); color: white; border: none; padding: 18px; border-radius: 16px; font-size: 20px; font-weight: bold; cursor: pointer; width: 100%; display: block; text-align: center; text-decoration: none; box-sizing: border-box; }
        .btn-danger { background-color: var(--danger); }
        .btn-success { background-color: var(--accent); }
        .btn-secondary { background-color: var(--input-border); color: var(--text-main); }
        .btn-warning { background-color: var(--warning); }
        .btn-sm { padding: 10px 16px; font-size: 16px; width: auto; border-radius: 12px; display: inline-block; }
        .checkbox-group { background: var(--input-bg); padding: 14px; border-radius: 14px; margin-bottom: 15px; border: 2px solid var(--border-color); }
        .checkbox-label { display: flex; align-items: center; font-size: 21px; cursor: pointer; }
        .checkbox-custom { width: 28px; height: 28px; margin-right: 15px; }
        .progress-container { margin-bottom: 20px; }
        .progress-label { display: flex; justify-content: space-between; font-weight: bold; font-size: 20px; margin-bottom: 8px; }
        .progress-bar-bg { background-color: var(--bg-body); border-radius: 15px; height: 32px; width: 100%; overflow: hidden; border: 1px solid var(--input-border); }
        .progress-bar-fill { background: linear-gradient(90deg, #16a34a, #4ade80); height: 100%; transition: width 0.5s ease; }
        .paso-row { display: flex; align-items: center; padding: 16px; background: var(--input-bg); border-radius: 14px; margin-bottom: 12px; cursor: pointer; border: 2px solid var(--border-color); }
        .paso-row.completado { border-color: var(--warning); background: var(--card-bg); }
        .paso-numero { font-size: 26px; font-weight: bold; margin-right: 15px; min-width: 35px; color: var(--text-muted); }
        .paso-row.completado .paso-numero { color: var(--warning); }
        .star-icon { font-size: 28px; margin-left: auto; color: var(--input-border); }
        .star-icon.active { color: var(--warning); }
        .popup-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 999; }
        .popup-card { background: var(--card-bg); border-radius: 24px; padding: 30px; text-align: center; max-width: 410px; border: 3px solid var(--warning); }
        .biblioteca-item { background: var(--input-bg); padding: 18px; border-radius: 14px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; border: 2px solid var(--border-color); }
        .evento-card { background: var(--input-bg); border: 2px solid var(--primary); border-radius: 16px; padding: 18px; margin-bottom: 14px; }
        .navbar { position: absolute; bottom: 0; left: 0; right: 0; height: 90px; background-color: var(--card-bg); border-top: 2px solid var(--border-color); display: flex; justify-content: space-around; align-items: center; }
        .nav-item { color: var(--text-muted); cursor: pointer; text-align: center; font-size: 13px; font-weight: bold; flex: 1; padding: 5px 0; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 22px; margin-bottom: 2px; }
        .solicitud-box { background: var(--input-bg); border: 2px solid var(--warning); padding: 14px; border-radius: 14px; margin-bottom: 10px; }
        .solicitud-acciones { display: flex; gap: 10px; margin-top: 10px; }
        .btn-small { padding: 10px 14px; font-size: 15px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; flex: 1; text-align: center; color: white; }
        .admin-toggle-link { display: block; text-align: right; color: var(--text-muted); font-size: 15px; text-decoration: underline; cursor: pointer; margin-top: -10px; margin-bottom: 20px; }
        /* Agregar adiccion */
        .add-adiccion-card { border: 2px dashed var(--input-border); border-radius: 16px; padding: 18px; margin-bottom: 20px; background: var(--input-bg); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const SUPABASE_URL = "https://xzkuywsitdwikzksiesf.supabase.co";
        const SUPABASE_KEY = "sb_publishable_8NSIOBCEbc4_mM9KWMKJvA_MPWW5Cv3";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const CLAVE_SECRETA_ADMIN = "felices24";
        const GRUPOS = [
            { id: "san-jose-renca", nombre: "SAN JOSE DE RENCA" },
            { id: "grupo-esperanza", nombre: "GRUPO ESPERANZA" }
        ];
        const ADICCIONES_DISPONIBLES = ["Alcohol", "Marihuana", "Cocaina", "Tabaco", "Juego Compulsivo"];
        const PASOS_AA = [
            "Admitimos que eramos impotentes ante el alcohol y nuestras vidas se habian vuelto ingobernables.",
            "Llegamos a creer que un Poder superior a nosotros mismos podria devolvernos el sano juicio.",
            "Decidimos poner nuestra voluntad y nuestras vidas al cuidado de Dios, tal como nosotros lo entendiamos.",
            "Sin miedo, hicimos un minucioso examen de conciencia de nosotros mismos.",
            "Admitimos ante Dios, ante nosotros mismos y ante otro ser humano la naturaleza exacta de nuestros defectos.",
            "Estuvimos enteramente dispuestos a dejar que Dios nos liberase de todos estos defectos de caracter.",
            "Humildemente le pedimos que nos librase de nuestros defectos.",
            "Hicimos una lista de todas aquellas personas a quienes habiamos ofendido y estuvimos dispuestos a reparar el dano.",
            "Reparamos directamente a cuantos nos fue posible el dano causado, excepto cuando el hacerlo implicaba perjuicio.",
            "Continuamos con nuestro examen de conciencia, admitiendo inmediatamente nuestros errores cuando los descubriamos.",
            "Buscamos a traves de la oracion y la meditacion mejorar nuestro contacto con Dios.",
            "Habiendo experimentado un despertar espiritual, tratamos de llevar este mensaje a otros alcoholicos."
        ];
        const LECTURAS = [
            "Libro Grande de AA - Capitulo 5: Como funciona",
            "Viviendo Sobrio - Evitar el primer trago",
            "Folleto: El miembro de mas edad en AA",
            "Reflexiones Diarias - Un dia a la vez"
        ];

        function App() {
            const [user, setUser] = React.useState(null);
            const [activeTab, setActiveTab] = React.useState("inicio");
            const [isDarkMode, setIsDarkMode] = React.useState(true);
            const [misAdicciones, setMisAdicciones] = React.useState({});
            const [pasoActual, setPasoActual] = React.useState(1);
            const [biblioteca, setBiblioteca] = React.useState([]);
            const [eventos, setEventos] = React.useState([]);
            const [solicitudesPendientes, setSolicitudesPendientes] = React.useState([]);
            const [mostrarAliento, setMostrarAliento] = React.useState(false);
            const [lecturaRecomendada, setLecturaRecomendada] = React.useState("");

            // Registro
            const [nombre, setNombre] = React.useState("");
            const [sede, setSede] = React.useState("");
            const [whatsapp, setWhatsapp] = React.useState("");
            const [errorTelefono, setErrorTelefono] = React.useState("");
            const [mostrarCampoAdmin, setMostrarCampoAdmin] = React.useState(false);
            const [claveAdminIngresada, setClaveAdminIngresada] = React.useState("");
            const [checks, setChecks] = React.useState({});
            const [fechas, setFechas] = React.useState({});
            const [loginUsername, setLoginUsername] = React.useState("");

            // Biblioteca
            const [nuevoTitulo, setNuevoTitulo] = React.useState("");
            const [nuevoTipo, setNuevoTipo] = React.useState("Documento");
            const [nuevoLink, setNuevoLink] = React.useState("");

            // Eventos
            const [evTitulo, setEvTitulo] = React.useState("");
            const [evFecha, setEvFecha] = React.useState("");
            const [evHora, setEvHora] = React.useState("");
            const [evLugar, setEvLugar] = React.useState("");
            const [evNota, setEvNota] = React.useState("");
            const [errorHora, setErrorHora] = React.useState("");

            // Agregar adiccion desde inicio
            const [nuevaAdiccion, setNuevaAdiccion] = React.useState("");

            React.useEffect(() => {
                const themeGuardado = localStorage.getItem("theme_preference");
                if (themeGuardado === "light") setIsDarkMode(false);
                const sesionGuardada = localStorage.getItem("sesion_nueva_vida");
                if (sesionGuardada) {
                    try { setUser(JSON.parse(sesionGuardada)); }
                    catch(e) { localStorage.removeItem("sesion_nueva_vida"); }
                }
            }, []);

            React.useEffect(() => {
                if (!user) return;
                cargarDatosNube();
                const interval = setInterval(cargarDatosNube, 20000);
                return () => clearInterval(interval);
            }, [user]);

            async function cargarDatosNube() {
                try {
                    const { data: uData } = await supabase.from('usuarios').select('*').eq('username', user.username).single();
                    if (uData) {
                        setMisAdicciones(uData.adicciones || {});
                        setPasoActual(uData.paso_actual || 1);
                        setUser(prev => {
                            const act = { ...prev, estado: uData.estado };
                            localStorage.setItem("sesion_nueva_vida", JSON.stringify(act));
                            return act;
                        });
                    }
                    const { data: bData } = await supabase.from('biblioteca').select('*').eq('grupo_id', user.grupoId).order('id', { ascending: false });
                    if (bData) setBiblioteca(bData);
                    const { data: eData } = await supabase.from('eventos').select('*').eq('grupo_id', user.grupoId).order('fecha', { ascending: true });
                    if (eData) setEventos(eData);
                    if (user.rol === 'admin') {
                        const { data: pData } = await supabase.from('usuarios').select('*').eq('grupo_id', user.grupoId).eq('estado', 'pendiente');
                        if (pData) setSolicitudesPendientes(pData);
                    }
                } catch(e) {}
            }

            const toggleTheme = () => {
                setIsDarkMode(p => {
                    localStorage.setItem("theme_preference", !p ? "dark" : "light");
                    return !p;
                });
            };

            // VALIDAR TELÉFONO
            const validarTelefono = (valor) => {
                setWhatsapp(valor);
                if (!valor || valor.trim() === "") { setErrorTelefono(""); return; }
                const limpio = valor.replace(/\s+/g, "");
                if (!limpio.startsWith("+")) {
                    setErrorTelefono("Debe comenzar con '+' y el codigo del pais. Ejemplo: +56912345678");
                } else if (limpio.length < 10 || limpio.length > 15) {
                    setErrorTelefono("Numero invalido. Ejemplo correcto: +56912345678 (entre 10 y 15 digitos)");
                } else if (!/^\+[0-9]+$/.test(limpio)) {
                    setErrorTelefono("Solo se permiten numeros despues del '+'. Ejemplo: +56912345678");
                } else {
                    setErrorTelefono("");
                }
            };

            // VALIDAR HORA
            const validarHora = (valor) => {
                setEvHora(valor);
                if (!valor) { setErrorHora(""); return; }
                // type="time" ya garantiza HH:MM pero validamos por si acaso
                const regex = /^([01]\d|2[0-3]):([0-5]\d)$/;
                if (!regex.test(valor)) {
                    setErrorHora("Hora invalida. Selecciona una hora valida del selector (formato 24h, ej: 19:30)");
                } else {
                    setErrorHora("");
                }
            };

            const registrarCuenta = async (e) => {
                e.preventDefault();
                if (!nombre || !sede) return alert("Por favor complete nombre y sede.");
                if (errorTelefono) return alert("Corrige el numero de WhatsApp antes de continuar.\nEjemplo: +56912345678");
                let rolFinal = "basico";
                let estadoFinal = "pendiente";
                if (mostrarCampoAdmin) {
                    if (claveAdminIngresada !== CLAVE_SECRETA_ADMIN) return alert("La clave de administrador es incorrecta.");
                    rolFinal = "admin";
                    estadoFinal = "autorizado";
                }
                const grupoSel = GRUPOS.find(g => g.id === sede);
                const uid = nombre.replace(/\s+/g, "") + "_" + grupoSel.id;
                try {
                    const { data: existe } = await supabase.from('usuarios').select('username').eq('username', uid).maybeSingle();
                    if (existe) return alert("El nombre \"" + nombre + "\" ya existe en esta sede. Usa otro alias.");
                    const adiccionesConfig = {};
                    ADICCIONES_DISPONIBLES.forEach(ad => {
                        if (checks[ad]) adiccionesConfig[ad] = fechas[ad] || new Date().toISOString().split('T')[0];
                    });
                    const tlfLimpio = whatsapp.trim();
                    const telefonosArr = tlfLimpio ? [tlfLimpio] : [];
                    const nuevoUsuario = { username: uid, nombre_real: nombre, grupo_id: sede, grupo_nombre: grupoSel.nombre, rol: rolFinal, estado: estadoFinal, adicciones: adiccionesConfig, telefonos: telefonosArr, paso_actual: 1 };
                    const { error } = await supabase.from('usuarios').insert([nuevoUsuario]);
                    if (error) { alert("Error: " + error.message); return; }
                    const datosSesion = { username: uid, nombreReal: nombre, grupoId: sede, grupoNombre: grupoSel.nombre, rol: rolFinal, estado: estadoFinal };
                    localStorage.setItem("sesion_nueva_vida", JSON.stringify(datosSesion));
                    setUser(datosSesion);
                    setMisAdicciones(adiccionesConfig);
                } catch(err) { alert("Error de conexion: " + err.message); }
            };

            const entrarCuenta = async (e) => {
                e.preventDefault();
                if (!loginUsername) return;
                const { data } = await supabase.from('usuarios').select('*').eq('username', loginUsername).maybeSingle();
                if (data) {
                    const datosSesion = { username: data.username, nombreReal: data.nombre_real, grupoId: data.grupo_id, grupoNombre: data.grupo_nombre, rol: data.rol, estado: data.estado };
                    localStorage.setItem("sesion_nueva_vida", JSON.stringify(datosSesion));
                    setUser(datosSesion);
                    setMisAdicciones(data.adicciones || {});
                    setPasoActual(data.paso_actual || 1);
                } else { alert("Identificador no encontrado."); }
            };

            const cerrarSesionApp = () => {
                localStorage.removeItem("sesion_nueva_vida");
                setUser(null);
            };

            const registrarRecaida = async (adiccion) => {
                const hoy = new Date().toISOString().split('T')[0];
                const nuevas = { ...misAdicciones, [adiccion]: hoy };
                const { error } = await supabase.from('usuarios').update({ adicciones: nuevas }).eq('username', user.username);
                if (!error) { setMisAdicciones(nuevas); setLecturaRecomendada(LECTURAS[Math.floor(Math.random() * LECTURAS.length)]); setMostrarAliento(true); }
            };

            // AGREGAR NUEVA ADICCION DESDE INICIO
            const agregarAdiccion = async () => {
                if (!nuevaAdiccion) return alert("Selecciona una adiccion de la lista.");
                const hoy = new Date().toISOString().split('T')[0];
                const nuevas = { ...misAdicciones, [nuevaAdiccion]: hoy };
                const { error } = await supabase.from('usuarios').update({ adicciones: nuevas }).eq('username', user.username);
                if (!error) {
                    setMisAdicciones(nuevas);
                    setNuevaAdiccion("");
                    alert("Adiccion agregada. El contador parte desde hoy.");
                } else { alert("Error: " + error.message); }
            };

            const cambiarPaso = async (n) => {
                const { error } = await supabase.from('usuarios').update({ paso_actual: n }).eq('username', user.username);
                if (!error) setPasoActual(n);
            };

            const subirMaterial = async (e) => {
                e.preventDefault();
                if (!nuevoTitulo || !nuevoLink) return alert("Completa titulo y enlace.");
                const { error } = await supabase.from('biblioteca').insert([{ grupo_id: user.grupoId, titulo: nuevoTitulo, tipo: nuevoTipo, link: nuevoLink }]);
                if (!error) { setNuevoTitulo(""); setNuevoLink(""); cargarDatosNube(); alert("Publicado con exito."); }
            };

            const crearEventoAdmin = async (e) => {
                e.preventDefault();
                if (!evTitulo || !evFecha || !evHora || !evLugar) return alert("Completa titulo, fecha, hora y direccion.");
                if (errorHora) return alert("La hora ingresada no es valida.\nUsa el selector y elige una hora correcta.");
                const { error } = await supabase.from('eventos').insert([{
                    grupo_id: user.grupoId, titulo: evTitulo, fecha: evFecha,
                    hora: evHora, lugar: evLugar, nota: evNota
                }]);
                if (!error) {
                    alert("Evento publicado correctamente.");
                    setEvTitulo(""); setEvFecha(""); setEvHora(""); setEvLugar(""); setEvNota("");
                    cargarDatosNube();
                } else { alert("Error al crear evento: " + error.message); }
            };

            const eliminarEvento = async (id) => {
                if (!confirm("Eliminar este evento?")) return;
                await supabase.from('eventos').delete().eq('id', id);
                cargarDatosNube();
            };

            const gestionarSolicitud = async (username, aprobar) => {
                if (aprobar) {
                    const { error } = await supabase.from('usuarios').update({ estado: 'autorizado' }).eq('username', username);
                    if (!error) { alert("Usuario autorizado."); cargarDatosNube(); }
                } else {
                    if (!confirm("Rechazar y eliminar la solicitud de " + username + "?")) return;
                    const { error } = await supabase.from('usuarios').delete().eq('username', username);
                    if (!error) { alert("Solicitud eliminada."); cargarDatosNube(); }
                }
            };

            const calcularDias = (fechaStr) => {
                if (!fechaStr) return 0;
                const dias = Math.floor((new Date() - new Date(fechaStr)) / (1000 * 60 * 60 * 24));
                return dias < 0 ? 0 : dias;
            };

            const linkMaps = (dir) => "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(dir);

            const adiccionesParaAgregar = ADICCIONES_DISPONIBLES.filter(ad => !misAdicciones[ad]);

            // ── LOGIN ─────────────────────────────────────────────────────
            if (!user) {
                return (
                    <div className={"app-container" + (!isDarkMode ? " light-theme" : "")} style={{padding: '20px', justifyContent: 'center'}}>
                        <div className="card">
                            <button className="theme-toggle-btn" onClick={toggleTheme}>{isDarkMode ? "☀️ Claro" : "🌙 Oscuro"}</button>
                            <h2 style={{color: 'var(--primary)', fontSize: '28px', textAlign: 'center', marginTop: '20px'}}>Nueva Vida AA</h2>
                            <form onSubmit={registrarCuenta}>
                                <h4 style={{color: 'var(--accent)', marginBottom: '5px'}}>1. Registrarse</h4>
                                <input type="text" className="input-field" placeholder="Su Nombre o Alias (Obligatorio)" value={nombre} onChange={e => setNombre(e.target.value)} />
                                <select className="select-field" value={sede} onChange={e => setSede(e.target.value)}>
                                    <option value="">-- Seleccionar Sede (Obligatorio) --</option>
                                    {GRUPOS.map(g => <option key={g.id} value={g.id}>{g.nombre}</option>)}
                                </select>

                                <label style={{fontSize: '15px', fontWeight: 'bold', color: 'var(--text-muted)'}}>WhatsApp (Opcional):</label>
                                <input
                                    type="tel"
                                    className={"input-field" + (errorTelefono ? " input-error" : "")}
                                    placeholder="+56912345678"
                                    value={whatsapp}
                                    onChange={e => validarTelefono(e.target.value)}
                                />
                                {errorTelefono && <span className="error-msg">⚠️ {errorTelefono}</span>}

                                <span className="admin-toggle-link" onClick={() => { setMostrarCampoAdmin(!mostrarCampoAdmin); setClaveAdminIngresada(""); }}>
                                    ¿Soy administrador autorizado?
                                </span>
                                {mostrarCampoAdmin && (
                                    <div style={{background: 'var(--input-bg)', padding: '15px', borderRadius: '14px', marginBottom: '20px', border: '2px solid #7c3aed'}}>
                                        <label style={{fontSize: '15px', color: '#a78bfa', fontWeight: 'bold'}}>Clave de Administrador:</label>
                                        <input type="password" className="input-field" style={{marginBottom: '5px'}} placeholder="Codigo secreto" value={claveAdminIngresada} onChange={e => setClaveAdminIngresada(e.target.value)} />
                                    </div>
                                )}

                                <h4 style={{color: 'var(--warning)', fontSize: '18px', marginBottom: '12px'}}>Padecimientos iniciales:</h4>
                                {ADICCIONES_DISPONIBLES.map(ad => (
                                    <div key={ad} className="checkbox-group">
                                        <label className="checkbox-label">
                                            <input type="checkbox" className="checkbox-custom" checked={!!checks[ad]} onChange={e => setChecks({...checks, [ad]: e.target.checked})} />
                                            {ad}
                                        </label>
                                        {checks[ad] && <input type="date" className="input-field" style={{marginBottom:0, marginTop:'8px'}} value={fechas[ad] || ""} onChange={e => setFechas({...fechas, [ad]: e.target.value})} />}
                                    </div>
                                ))}
                                <button type="submit" className="btn btn-success" style={{marginTop: '15px'}}>Registrar e Ingresar</button>
                            </form>
                            <hr style={{borderColor: 'var(--border-color)', margin: '30px 0'}} />
                            <form onSubmit={entrarCuenta}>
                                <h4 style={{marginBottom: '5px'}}>2. Ya tengo cuenta (Identificador)</h4>
                                <input type="text" className="input-field" placeholder="Ej: Pedro_san-jose-renca" value={loginUsername} onChange={e => setLoginUsername(e.target.value)} />
                                <button type="submit" className="btn btn-secondary">Entrar</button>
                            </form>
                        </div>
                    </div>
                );
            }

            // ── PENDIENTE ─────────────────────────────────────────────────
            if (user.estado === 'pendiente') {
                return (
                    <div className={"app-container" + (!isDarkMode ? " light-theme" : "")} style={{padding: '20px', justifyContent: 'center', textAlign: 'center'}}>
                        <div className="card">
                            <div style={{fontSize: '55px'}}>⏳</div>
                            <h2>Cuenta en Revision</h2>
                            <p style={{color: 'var(--text-muted)'}}>Tu identificador para entrar es:</p>
                            <p style={{background: 'var(--bg-body)', padding: '15px', borderRadius: '10px', color: 'var(--primary)', fontFamily: 'monospace', fontWeight: 'bold', fontSize: '18px'}}>{user.username}</p>
                            <p style={{color: 'var(--warning)', fontSize: '16px'}}>Pidele al administrador de tu sede que apruebe tu solicitud.</p>
                            <button className="btn btn-secondary" style={{marginTop: '15px'}} onClick={cerrarSesionApp}>Volver</button>
                        </div>
                    </div>
                );
            }

            // ── APP PRINCIPAL ─────────────────────────────────────────────
            return (
                <div className={"app-container" + (!isDarkMode ? " light-theme" : "")}>
                    {mostrarAliento && (
                        <div className="popup-overlay">
                            <div className="popup-card">
                                <div style={{fontSize: '55px'}}>❤️</div>
                                <h2>Un paso a la vez</h2>
                                <p style={{lineHeight: '1.6'}}>Hoy es un nuevo comienzo. Mantente fuerte por las proximas 24 horas.</p>
                                <div style={{background: 'var(--bg-body)', padding: '14px', borderRadius: '12px', textAlign: 'left', margin: '15px 0'}}>
                                    <strong style={{color: 'var(--warning)'}}>Sugerencia de lectura:</strong>
                                    <p style={{margin: '4px 0 0 0', fontSize: '17px'}}>{lecturaRecomendada}</p>
                                </div>
                                <button className="btn btn-success" onClick={() => setMostrarAliento(false)}>Aceptar y Continuar</button>
                            </div>
                        </div>
                    )}

                    <div className="header">
                        <button className="theme-toggle-btn" onClick={toggleTheme}>{isDarkMode ? "☀️" : "🌙"}</button>
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/84/AA_logo.svg/80px-AA_logo.svg.png" alt="AA" style={{width: '42px', height: '42px', marginBottom: '4px', filter: 'drop-shadow(0 0 5px rgba(255,200,0,0.4))'}} />
                        <h1>{user.grupoNombre}</h1>
                        <span style={{color: 'var(--accent)', fontWeight: 'bold', fontSize: '16px'}}>{user.nombreReal} {user.rol === 'admin' ? '(Admin)' : ''}</span>
                        {user.rol === 'admin' && solicitudesPendientes.length > 0 && (
                            <div style={{background: '#dc2626', color: 'white', fontSize: '13px', fontWeight: 'bold', padding: '3px 12px', borderRadius: '20px', display: 'inline-block', marginTop: '4px'}}>
                                {solicitudesPendientes.length} solicitud{solicitudesPendientes.length > 1 ? 'es' : ''} pendiente{solicitudesPendientes.length > 1 ? 's' : ''}
                            </div>
                        )}
                    </div>

                    <div className="main-content">

                        {/* ── INICIO ── */}
                        {activeTab === "inicio" && (
                            <div>
                                <div className="card" style={{textAlign: 'center', borderColor: 'var(--warning)'}}>
                                    <h3 style={{margin: 0, color: 'var(--warning)'}}>Mi Meta de Hoy</h3>
                                    <p style={{fontSize: '32px', fontWeight: 'bold', color: '#10b981', margin: '5px 0'}}>¡Solo por Hoy!</p>
                                </div>

                                <h3>Mis Indicadores de Progreso</h3>
                                {Object.keys(misAdicciones).length === 0
                                    ? <p style={{color: 'var(--text-muted)'}}>No tienes contadores activos.</p>
                                    : Object.keys(misAdicciones).map(ad => {
                                        const dias = calcularDias(misAdicciones[ad]);
                                        const porcentaje = Math.min((dias / 90) * 100, 100);
                                        return (
                                            <div key={ad} className="card">
                                                <div className="progress-container">
                                                    <div className="progress-label">
                                                        <span>Libre de {ad}</span>
                                                        <span style={{color: 'var(--accent)', fontSize: '24px'}}>{dias} Dias</span>
                                                    </div>
                                                    <div className="progress-bar-bg">
                                                        <div className="progress-bar-fill" style={{width: (porcentaje || 4) + "%"}}></div>
                                                    </div>
                                                </div>
                                                <button className="btn btn-danger" style={{padding: '12px', fontSize: '16px'}} onClick={() => registrarRecaida(ad)}>
                                                    Reiniciar Contador
                                                </button>
                                            </div>
                                        );
                                    })
                                }

                                {/* ── AGREGAR ADICCION ── */}
                                {adiccionesParaAgregar.length > 0 && (
                                    <div className="add-adiccion-card">
                                        <h4 style={{margin: '0 0 12px 0', fontSize: '17px', color: 'var(--text-muted)'}}>+ Agregar otro padecimiento al seguimiento</h4>
                                        <select className="select-field" style={{marginBottom: '12px'}} value={nuevaAdiccion} onChange={e => setNuevaAdiccion(e.target.value)}>
                                            <option value="">-- Seleccionar --</option>
                                            {adiccionesParaAgregar.map(ad => <option key={ad} value={ad}>{ad}</option>)}
                                        </select>
                                        <button className="btn btn-warning" style={{fontSize: '17px', padding: '14px'}} onClick={agregarAdiccion}>
                                            Agregar y empezar contador desde hoy
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ── PASOS ── */}
                        {activeTab === "pasos" && (
                            <div>
                                <h3>Los 12 Pasos</h3>
                                <p style={{fontSize: '15px', color: 'var(--text-muted)', marginBottom: '15px'}}>Toca el paso en el que te encuentras trabajando:</p>
                                {PASOS_AA.map((texto, i) => {
                                    const num = i + 1;
                                    const activo = pasoActual === num;
                                    return (
                                        <div key={num} className={"paso-row" + (activo ? " completado" : "")} onClick={() => cambiarPaso(num)}>
                                            <div className="paso-numero">{num}</div>
                                            <div style={{fontSize: '17px', lineHeight: '1.4'}}>{texto}</div>
                                            <div className={"star-icon" + (activo ? " active" : "")}>★</div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {/* ── EVENTOS ── */}
                        {activeTab === "eventos" && (
                            <div>
                                <h3>Proximos Eventos y Reuniones</h3>
                                {user.rol === 'admin' && (
                                    <div className="card" style={{borderColor: 'var(--primary)'}}>
                                        <h4 style={{color: 'var(--primary)', margin: '0 0 15px 0'}}>Crear Evento (Admin)</h4>
                                        <form onSubmit={crearEventoAdmin}>
                                            <input type="text" className="input-field" placeholder="Titulo del evento" value={evTitulo} onChange={e => setEvTitulo(e.target.value)} />

                                            <label style={{fontSize: '15px', color: 'var(--text-muted)', fontWeight: 'bold'}}>Fecha del evento:</label>
                                            <input type="date" className="input-field" value={evFecha} onChange={e => setEvFecha(e.target.value)} />

                                            {/* HORA CON SELECTOR NATIVO */}
                                            <label style={{fontSize: '15px', color: 'var(--text-muted)', fontWeight: 'bold'}}>Hora del evento:</label>
                                            <input
                                                type="time"
                                                className={"input-field" + (errorHora ? " input-error" : "")}
                                                value={evHora}
                                                onChange={e => validarHora(e.target.value)}
                                            />
                                            {errorHora && <span className="error-msg">⚠️ {errorHora}</span>}

                                            <label style={{fontSize: '15px', color: 'var(--text-muted)', fontWeight: 'bold'}}>Direccion del lugar:</label>
                                            <input type="text" className="input-field" placeholder="Ej: Av. Principal 1234, Renca, Santiago" value={evLugar} onChange={e => setEvLugar(e.target.value)} />

                                            <label style={{fontSize: '15px', color: 'var(--text-muted)', fontWeight: 'bold'}}>Nota adicional (Opcional):</label>
                                            <input type="text" className="input-field" placeholder="Ej: Traer libreta y lapiz" value={evNota} onChange={e => setEvNota(e.target.value)} />

                                            <button type="submit" className="btn btn-success">Publicar Evento</button>
                                        </form>
                                    </div>
                                )}
                                {eventos.length === 0
                                    ? <div className="card" style={{textAlign: 'center', color: 'var(--text-muted)'}}>
                                        <div style={{fontSize: '40px'}}>📅</div>
                                        <p>No hay eventos programados para tu sede.</p>
                                      </div>
                                    : eventos.map(ev => (
                                        <div key={ev.id} className="evento-card">
                                            <div style={{fontWeight: 'bold', fontSize: '20px', marginBottom: '6px'}}>{ev.titulo}</div>
                                            <div style={{color: 'var(--warning)', fontSize: '15px', fontWeight: 'bold', marginBottom: '4px'}}>
                                                📅 {ev.fecha} — {ev.hora} hrs
                                            </div>
                                            <div style={{color: 'var(--text-muted)', fontSize: '15px', marginBottom: '4px'}}>
                                                📍 {ev.lugar}
                                            </div>
                                            {ev.nota && <div style={{fontSize: '14px', color: 'var(--text-muted)', marginBottom: '8px', fontStyle: 'italic'}}>{ev.nota}</div>}
                                            <div style={{display: 'flex', gap: '10px', flexWrap: 'wrap', marginTop: '10px'}}>
                                                {ev.lugar && (
                                                    <a href={linkMaps(ev.lugar)} target="_blank" rel="noreferrer" className="btn btn-secondary btn-sm" style={{textDecoration: 'none', fontSize: '15px'}}>
                                                        🗺️ Ver en Google Maps
                                                    </a>
                                                )}
                                                {user.rol === 'admin' && (
                                                    <button className="btn btn-danger btn-sm" style={{fontSize: '14px'}} onClick={() => eliminarEvento(ev.id)}>
                                                        Eliminar
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    ))
                                }
                            </div>
                        )}

                        {/* ── BIBLIOTECA ── */}
                        {activeTab === "biblioteca" && (
                            <div>
                                <h3>Biblioteca del Grupo</h3>
                                {user.rol === 'admin' && (
                                    <div className="card" style={{borderColor: 'var(--primary)'}}>
                                        <h4 style={{color: 'var(--primary)', margin: '0 0 10px 0'}}>Subir Recurso</h4>
                                        <form onSubmit={subirMaterial}>
                                            <input type="text" className="input-field" placeholder="Titulo" value={nuevoTitulo} onChange={e => setNuevoTitulo(e.target.value)} />
                                            <select className="select-field" value={nuevoTipo} onChange={e => setNuevoTipo(e.target.value)}>
                                                <option value="Documento">Documento / PDF</option>
                                                <option value="Audio">Audio / Reunion</option>
                                                <option value="Video">Video Motivacional</option>
                                            </select>
                                            <input type="text" className="input-field" placeholder="Enlace URL" value={nuevoLink} onChange={e => setNuevoLink(e.target.value)} />
                                            <button type="submit" className="btn btn-success">Publicar Material</button>
                                        </form>
                                    </div>
                                )}
                                {biblioteca.length === 0
                                    ? <p style={{color: 'var(--text-muted)'}}>No hay material publicado.</p>
                                    : biblioteca.map(b => (
                                        <div key={b.id} className="biblioteca-item">
                                            <div>
                                                <strong>{b.titulo}</strong>
                                                <div style={{fontSize: '14px', color: 'var(--text-muted)'}}>{b.tipo}</div>
                                            </div>
                                            <a href={b.link} target="_blank" rel="noreferrer" className="btn btn-sm btn-success" style={{textDecoration: 'none'}}>Abrir</a>
                                        </div>
                                    ))
                                }
                            </div>
                        )}

                        {/* ── PERFIL ── */}
                        {activeTab === "perfil" && (
                            <div>
                                <div className="card" style={{textAlign: 'center'}}>
                                    <h3>Mi Informacion</h3>
                                    <p style={{color: 'var(--text-muted)', fontSize: '15px'}}>Tu identificador de acceso:</p>
                                    <p style={{background: 'var(--bg-body)', padding: '14px', borderRadius: '10px', color: 'var(--primary)', fontFamily: 'monospace', fontWeight: 'bold', fontSize: '17px'}}>{user.username}</p>
                                    <p style={{fontSize: '14px', color: 'var(--text-muted)'}}>Guarda este codigo. Te sirve para volver a entrar desde cualquier dispositivo.</p>
                                    <button className="btn btn-danger" style={{marginTop: '15px'}} onClick={cerrarSesionApp}>Cerrar Sesion</button>
                                </div>

                                {user.rol === 'admin' && (
                                    <div className="card" style={{borderColor: 'var(--warning)'}}>
                                        <h3 style={{color: 'var(--warning)', margin: '0 0 15px 0'}}>
                                            Solicitudes Pendientes ({solicitudesPendientes.length})
                                        </h3>
                                        {solicitudesPendientes.length === 0
                                            ? <p style={{color: 'var(--text-muted)', fontSize: '16px'}}>No hay solicitudes nuevas.</p>
                                            : solicitudesPendientes.map(sol => (
                                                <div key={sol.username} className="solicitud-box">
                                                    <strong>👤 {sol.nombre_real}</strong>
                                                    <div style={{fontSize: '14px', color: 'var(--text-muted)', marginTop: '4px'}}>ID: {sol.username}</div>
                                                    {sol.telefonos && sol.telefonos.length > 0 && (
                                                        <div style={{fontSize: '14px', color: 'var(--text-muted)'}}>Tel: {sol.telefonos[0]}</div>
                                                    )}
                                                    <div className="solicitud-acciones">
                                                        <button className="btn-small" style={{backgroundColor: 'var(--accent)'}} onClick={() => gestionarSolicitud(sol.username, true)}>Aceptar</button>
                                                        <button className="btn-small" style={{backgroundColor: 'var(--danger)'}} onClick={() => gestionarSolicitud(sol.username, false)}>Rechazar</button>
                                                    </div>
                                                </div>
                                            ))
                                        }
                                    </div>
                                )}
                            </div>
                        )}

                    </div>

                    <div className="navbar">
                        <div className={"nav-item" + (activeTab === 'inicio' ? ' active' : '')} onClick={() => setActiveTab("inicio")}>
                            <div className="nav-icon">📊</div><span>Progreso</span>
                        </div>
                        <div className={"nav-item" + (activeTab === 'pasos' ? ' active' : '')} onClick={() => setActiveTab("pasos")}>
                            <div className="nav-icon">⭐</div><span>12 Pasos</span>
                        </div>
                        <div className={"nav-item" + (activeTab === 'eventos' ? ' active' : '')} onClick={() => setActiveTab("eventos")}>
                            <div className="nav-icon">📅</div><span>Eventos</span>
                        </div>
                        <div className={"nav-item" + (activeTab === 'biblioteca' ? ' active' : '')} onClick={() => setActiveTab("biblioteca")}>
                            <div className="nav-icon">📚</div><span>Biblioteca</span>
                        </div>
                        <div className={"nav-item" + (activeTab === 'perfil' ? ' active' : '')} onClick={() => setActiveTab("perfil")}>
                            <div className="nav-icon">👤</div><span>Perfil</span>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
