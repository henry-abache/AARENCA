<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="manifest" href="./manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nueva Vida - Alcohólicos Anónimos</title>
  <link rel="icon" type="image/png" href="./1-192.png">
  <link rel="apple-touch-icon" href="./1-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nueva Vida AA">
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f1f5f9" media="(prefers-color-scheme: light)">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    /* ===== TEMA CLARO (light) ===== */
    :root, :root[data-theme="light"] {
      --bg-main: #e8ecf0;
      --bg-app: #f2f4f7;
      --card: #ffffff;
      --border: #d1d9e0;
      --input-bg: #f8fafc;
      --primary: #2563eb;
      --accent: #16a34a;
      --warning: #d97706;
      --danger: #dc2626;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --text-secondary: #334155;
      --navbar-bg: #ffffff;
      --badge-pending-bg: #fef3c7;
      --badge-pending-text: #92400e;
      --overlay: rgba(0,0,0,0.5);
      --popup-border: #d97706;
      --notif-bg: #dbeafe;
      --notif-border: #2563eb;
      --btn-radius: 16px;
      --card-radius: 20px;
      --motivacion-bg: linear-gradient(135deg, #1e3a8a, #1e40af);
      --share-bg: linear-gradient(135deg, #1e3a8a, #1e40af);
    }
    /* ===== TEMA OSCURO (dark) ===== */
    :root[data-theme="dark"] {
      --bg-main: #020617;
      --bg-app: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --input-bg: #0f172a;
      --primary: #3b82f6;
      --accent: #16a34a;
      --warning: #d97706;
      --danger: #dc2626;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --text-secondary: #cbd5e1;
      --navbar-bg: #1e293b;
      --badge-pending-bg: #92400e;
      --badge-pending-text: #fde68a;
      --overlay: rgba(0,0,0,0.85);
      --popup-border: #d97706;
      --notif-bg: #1e3a5f;
      --notif-border: #3b82f6;
      --btn-radius: 16px;
      --card-radius: 20px;
      --motivacion-bg: linear-gradient(135deg, #1e3a8a, #0f172a);
      --share-bg: linear-gradient(135deg, #1e3a5f, #0f172a);
    }
    /* ===== TEMA MINIMAL estilo Apple/macOS ===== */
    :root[data-theme="minimal"] {
      --bg-main: #f5f5f7;
      --bg-app: #ffffff;
      --card: #ffffff;
      --border: rgba(0,0,0,0.08);
      --input-bg: #f5f5f7;
      --primary: #0071e3;
      --accent: #30d158;
      --warning: #ff9f0a;
      --danger: #ff3b30;
      --text-main: #1d1d1f;
      --text-muted: #6e6e73;
      --text-secondary: #3a3a3c;
      --navbar-bg: rgba(255,255,255,0.85);
      --badge-pending-bg: #fff3cd;
      --badge-pending-text: #6d3a00;
      --overlay: rgba(0,0,0,0.4);
      --popup-border: rgba(0,0,0,0.12);
      --notif-bg: #f0f8ff;
      --notif-border: #0071e3;
      --btn-radius: 980px;
      --card-radius: 18px;
      --motivacion-bg: linear-gradient(135deg, #0071e3, #005bb5);
      --share-bg: linear-gradient(135deg, #0071e3, #005bb5);
    }
    /* Estilos especiales tema minimal */
    :root[data-theme="minimal"] .card {
      border: 1px solid rgba(0,0,0,0.08) !important;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06) !important;
      border-radius: 18px !important;
    }
    :root[data-theme="minimal"] .btn {
      border-radius: 980px !important;
      letter-spacing: -0.2px;
      font-weight: 600;
    }
    :root[data-theme="minimal"] .input-field,
    :root[data-theme="minimal"] .select-field {
      border-radius: 12px !important;
      border: 1px solid rgba(0,0,0,0.12) !important;
      background: #f5f5f7 !important;
    }
    :root[data-theme="minimal"] .navbar {
      background: rgba(255,255,255,0.85) !important;
      backdrop-filter: blur(20px) !important;
      -webkit-backdrop-filter: blur(20px) !important;
      border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    :root[data-theme="minimal"] .header {
      background: rgba(255,255,255,0.85) !important;
      backdrop-filter: blur(20px) !important;
      -webkit-backdrop-filter: blur(20px) !important;
      border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    :root[data-theme="minimal"] .popup-card {
      border-radius: 22px !important;
      border: 1px solid rgba(0,0,0,0.1) !important;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15) !important;
    }
    :root[data-theme="minimal"] .progress-bar-bg {
      background: #e5e5ea !important;
      border-radius: 980px !important;
      border: none !important;
    }
    :root[data-theme="minimal"] .progress-bar-fill {
      border-radius: 980px !important;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 18px;
    }
    .app-container {
      max-width: 500px; margin: 0 auto; min-height: 100vh;
      background-color: var(--bg-app);
      display: flex; flex-direction: column; position: relative;
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
      padding-bottom: 100px;
    }
    .header {
      padding: 18px 20px;
      background-color: var(--card);
      border-bottom: 2px solid var(--border);
      text-align: center;
      position: sticky; top: 0; z-index: 10;
    }
    .header h1 { margin: 0; font-size: 22px; }
    .main-content { flex: 1; padding: 18px; overflow-y: auto; }
    .card {
      background-color: var(--card);
      border-radius: var(--card-radius, 20px); padding: 22px;
      border: 2px solid var(--border);
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }
    .btn {
      border-radius: var(--btn-radius, 16px);
      border: none;
      padding: 12px 20px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-block;
    }
    .btn-primary {
      background-color: var(--primary);
      color: white;
    }
    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }
    .btn-secondary {
      background-color: var(--text-muted);
      color: white;
    }
    .btn-success {
      background-color: var(--accent);
      color: white;
    }
    .btn-danger {
      background-color: var(--danger);
      color: white;
    }
    .btn-warning {
      background-color: var(--warning);
      color: white;
    }
    .btn-sm {
      padding: 8px 14px;
      font-size: 14px;
    }
    .input-field, .select-field {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background-color: var(--input-bg);
      color: var(--text-main);
      font-size: 16px;
      margin-bottom: 10px;
    }
    .input-field:focus, .select-field:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .navbar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 500px;
      background-color: var(--navbar-bg);
      border-top: 2px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      z-index: 20;
      box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.08);
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 0;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s ease;
    }
    .nav-item.active {
      color: var(--primary);
    }
    .nav-item:hover {
      color: var(--primary);
    }
    .nav-icon {
      font-size: 24px;
      margin-bottom: 4px;
    }
    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #1e3a8a, #0f172a);
      color: white;
      font-size: 18px;
    }
    .logo-aa {
      font-size: 48px;
      margin-bottom: 20px;
      font-weight: bold;
      letter-spacing: 2px;
    }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      margin-right: 8px;
    }
    .badge-pendiente {
      background-color: var(--badge-pending-bg);
      color: var(--badge-pending-text);
    }
    .badge-rechazado {
      background-color: rgba(220, 38, 38, 0.2);
      color: var(--danger);
    }
  </style>
</head>
<body>
  <!-- ELEMENTO ROOT DONDE REACT RENDERIZA LA APLICACIÓN -->
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { createClient } = window.supabase;

    // Configuración de Supabase
    const SUPABASE_URL = 'https://xzkuywsitdwikzksiesf.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_8NSIOBCEbc4_mM9KWMKJvA_MPWW5Cv3';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    function App() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [theme, setTheme] = useState('dark');

      useEffect(() => {
        // Cargar tema guardado
        const savedTheme = localStorage.getItem('theme') || 'dark';
        setTheme(savedTheme);
        document.documentElement.setAttribute('data-theme', savedTheme);

        // Registrar service worker
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('./sw.js').catch(err => {
            console.log('SW registration failed:', err);
          });
        }

        // Verificar sesión
        supabase.auth.getSession().then(({ data: { session } }) => {
          setUser(session?.user || null);
          setLoading(false);
        });

        const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
          setUser(session?.user || null);
        });

        return () => subscription?.unsubscribe();
      }, []);

      const toggleTheme = () => {
        const newTheme = theme === 'dark' ? 'light' : 'dark';
        setTheme(newTheme);
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
      };

      const cerrarSesion = async () => {
        await supabase.auth.signOut();
        setUser(null);
      };

      if (loading) {
        return (
          <div className="loading-screen">
            <div className="logo-aa">AA</div>
            <p>Cargando Nueva Vida...</p>
          </div>
        );
      }

      if (!user) {
        return (
          <div className="app-container">
            <div className="header">
              <h1>Nueva Vida AA</h1>
            </div>
            <div className="main-content">
              <div className="card" style={{textAlign: 'center'}}>
                <div className="logo-aa" style={{fontSize: '64px', marginBottom: '20px'}}>AA</div>
                <h2>Bienvenido</h2>
                <p style={{color: 'var(--text-muted)'}}>Inicia sesión o regístrate para acceder a Nueva Vida</p>
                <button className="btn btn-primary" onClick={() => alert('Función de login por implementar')}>
                  Iniciar Sesión
                </button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="app-container">
          <div className="header">
            <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
              <h1 style={{margin: 0}}>Nueva Vida AA</h1>
              <button 
                className="btn btn-sm btn-secondary" 
                onClick={toggleTheme}
                style={{padding: '6px 12px'}}
              >
                {theme === 'dark' ? '☀️' : '🌙'}
              </button>
            </div>
          </div>
          
          <div className="main-content">
            <div className="card">
              <h2>¡Hola! 👋</h2>
              <p>Bienvenido a Nueva Vida, la app de apoyo para Alcohólicos Anónimos.</p>
              <p style={{color: 'var(--text-muted)', fontSize: '14px'}}>
                La aplicación está siendo actualizada con todas las funcionalidades. Regresa pronto.
              </p>
            </div>
          </div>

          <div className="navbar">
            <div className="nav-item">
              <div className="nav-icon">🏠</div>Inicio
            </div>
            <div className="nav-item">
              <div className="nav-icon">🪜</div>12 Pasos
            </div>
            <div className="nav-item">
              <div className="nav-icon">📅</div>Eventos
            </div>
            <div className="nav-item">
              <div className="nav-icon">📚</div>Biblioteca
            </div>
            <div className="nav-item" onClick={cerrarSesion} style={{color: 'var(--danger)'}}>
              <div className="nav-icon">🚪</div>Salir
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
