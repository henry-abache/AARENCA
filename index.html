function calcularDias(fechaStr) {
  if (!fechaStr) return 0;
  const d = Math.floor((new Date() - new Date(fechaStr)) / (1000 * 60 * 60 * 24));
  return d < 0 ? 0 : d;
}
function formatFecha(dateStr) {
  if (!dateStr) return "";
  const [y, m, d] = dateStr.split("-");
  return `${d}/${m}/${y}`;
}
function formatHora(timeStr) {
  if (!timeStr) return "";
  const [h, m] = timeStr.split(":");
  const hh = parseInt(h);
  const ampm = hh >= 12 ? "PM" : "AM";
  const h12 = hh % 12 || 12;
  return `${h12}:${m} ${ampm}`;
}
function tiempoDesde(ts) {
  if (!ts) return "";
  const diff = Date.now() - new Date(ts).getTime();
  const min = Math.floor(diff / 60000);
  if (min < 1) return "Ahora";
  if (min < 60) return `Hace ${min} min`;
  const h = Math.floor(min / 60);
  if (h < 24) return `Hace ${h} h`;
  return `Hace ${Math.floor(h/24)} días`;
}

  async function registrarCuenta(e) {
    e.preventDefault();
    if (!nombre.trim() || !sede) return alert("Por favor complete su nombre y seleccione una sede.");
    
    const grupoSel = GRUPOS.find(g => g.id === sede);
    const uid = nombre.trim().replace(/\s+/g, "_") + "_" + grupoSel.id;
    
    const adiccionesConfig = {};
    adiccionesDisponibles.forEach(ad => {
      if (checks[ad]) adiccionesConfig[ad] = fechas[ad] || new Date().toISOString().split('T')[0];
    });

    let rolAsignado = "basico";
    let estadoAsignado = "pendiente";

    if (mostrarCampoAdmin && codigoAdmin.trim() === CODIGO_SECRETO_ADMIN) {
      // Validar si ya hay un administrador principal en esta sede
      const { data: principalExistente } = await supabase.from('usuarios')
        .select('username')
        .eq('grupo_id', sede)
        .eq('rol', 'admin_principal')
        .maybeSingle();

      if (!principalExistente) {
        rolAsignado = "admin_principal";
        estadoAsignado = "aprobado";
        alert("🎉 Al ser el primer administrador registrado con la palabra clave en esta sede, has sido configurado como Administrador Principal.");
      } else {
        rolAsignado = "admin_adjunto";
        estadoAsignado = "aprobado";
        alert("🔒 Ya existe un Administrador Principal. Has sido configurado como Administrador Adjunto automáticamente.");
      }
    } else if (mostrarCampoAdmin && codigoAdmin.trim() !== CODIGO_SECRETO_ADMIN) {
      return alert("❌ Código de seguridad incorrecto.");
    }

    try {
      const { data: existente } = await supabase.from('usuarios').select('*').eq('username', uid).maybeSingle();
      if (existente) {
        const u = buildUser(existente);
        setUser(u);
        setMisAdicciones(existente.adicciones || {});
        setPasoActual(existente.paso_actual || 0);
        setPasosCompletados(existente.pasos_completados || []);
        localStorage.setItem("nuevavida_session", JSON.stringify(u));
        return;
      }

      const nuevoUsr = {
        username: uid,
        nombre_real: nombre.trim(),
        grupo_id: sede,
        grupo_nombre: grupoSel.nombre,
        rol: rolAsignado,
        estado: estadoAsignado,
        telefono: telefono.trim(),
        adicciones: adiccionesConfig,
        paso_actual: 0,
        pasos_completados: []
      };

      const { error } = await supabase.from('usuarios').insert([nuevoUsr]);
      if (error) {
        alert("Error al registrar: " + error.message);
      } else {
        const u = { username: uid, nombreReal: nombre.trim(), grupoId: sede, grupoNombre: grupoSel.nombre, rol: rolAsignado, estado: estadoAsignado, telefono: telefono.trim() };
        setUser(u);
        setMisAdicciones(adiccionesConfig);
        localStorage.setItem("nuevavida_session", JSON.stringify(u));
      }
    } catch(err) { alert("Error de conexión: " + err.message); }
  }

      const u = buildUser(data);
      setUser(u);

  async function agregarAdiccionSede() {
    if (!nuevaAdiccionSede.trim()) return;
    if (adiccionesDisponibles.includes(nuevaAdiccionSede.trim())) return alert("Esta adicción ya se encuentra en la lista.");
    
    const nuevaLista = [...adiccionesDisponibles, nuevaAdiccionSede.trim()];
    
    const { data: configExistente } = await supabase.from('config_sede').select('id').eq('grupo_id', user.grupoId).maybeSingle();
    
    let error = null;
    if (configExistente) {
      const { error: err } = await supabase.from('config_sede').update({ adicciones_lista: nuevaLista }).eq('grupo_id', user.grupoId);
      error = err;
    } else {
      const { error: err } = await supabase.from('config_sede').insert([{ grupo_id: user.grupoId, adicciones_lista: nuevaLista }]);
      error = err;
    }

    if (!error) {
      setAdiccionesDisponibles(nuevaLista);
      setNuevaAdiccionSede("");
      alert("✅ Nueva adicción agregada al catálogo de la sede.");
    } else {
      alert("Error al guardar: " + error.message);
    }
  }

    const nuevaLista = adiccionesDisponibles.filter(a => a !== item);

  async function subirMaterial() {
    if (!nuevoTitulo) return alert("Escribe un título para el material.");
    let linkFinal = nuevoLink;
    if (modoSubida === 'archivo') {
      if (!archivoLocal) return alert("Selecciona un archivo.");
      setSubiendoArchivo(true);
      const nombreArchivo = `${user.grupoId}/${Date.now()}_${archivoLocal.name.replace(/\s+/g, '_')}`;
      const { error: upError } = await supabase.storage
        .from('biblioteca-archivos')
        .upload(nombreArchivo, archivoLocal, { cacheControl: '3600', upsert: false });
      if (upError) {
        setSubiendoArchivo(false);
        return alert("Error al subir archivo: " + upError.message);
      }
      const { data: urlData } = supabase.storage.from('biblioteca-archivos').getPublicUrl(nombreArchivo);
      linkFinal = urlData.publicUrl;
    } else {
      if (!nuevoLink) return alert("Pega un enlace válido.");
    }
    const { error } = await supabase.from('biblioteca').insert([{
      grupo_id: user.grupoId, titulo: nuevoTitulo, tipo: nuevoTipo, link: linkFinal
    }]);
    setSubiendoArchivo(false);
    if (!error) {
      setNuevoTitulo(""); setNuevoLink(""); setArchivoLocal(null); setModoSubida('enlace');
      cargarDatos(); alert("✅ Publicado.");
    } else alert("Error: " + error.message);
  }

    if (!evTitulo || !evFecha || !evHora) return alert("Título, fecha y hora son obligatorios.");
    setGuardandoEvento(true);
    const grupoSel = GRUPOS.find(g => g.id === user.grupoId);
    const lugar = evLugar.trim() || grupoSel.nombre;
    const nuevoEv = {
      grupo_id: user.grupoId,
      titulo: evTitulo.trim(),
      descripcion: evDesc.trim(),
      fecha: evFecha,
      hora: evHora,
      lugar,
      direccion: evDireccion.trim(),
      imagen_url: evImagenUrl.trim(),
      creado_por: user.username,
      creado_por_nombre: user.nombreReal
    };
    const { data: evInserted, error } = await supabase.from('eventos').insert([nuevoEv]).select().single();
    if (error) { alert("Error al crear evento: " + error.message); setGuardandoEvento(false); return; }

    const { data: miembros } = await supabase.from('usuarios').select('username').eq('grupo_id', user.grupoId).eq('estado', 'aprobado');
    if (miembros && miembros.length > 0) {

        grupo_id: user.grupoId,
        username_destinatario: m.username,
        tipo: 'evento',
        titulo: `📅 Nuevo Evento: ${evTitulo.trim()}`,
        mensaje: `${user.nombreReal} agregó un evento para el ${formatFecha(evFecha)} a las ${formatHora(evHora)} en ${lugar}.`,
        evento_id: evInserted.id,
        leida: false
      }));
      await supabase.from('notificaciones').insert(notifs);
    }
    setEvTitulo(""); setEvDesc(""); setEvFecha(""); setEvHora(""); setEvLugar(""); setEvDireccion(""); setEvImagenUrl("");
    setGuardandoEvento(false);
    alert("✅ Evento creado y notificaciones enviadas.");
    cargarDatos();
  }
