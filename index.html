<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Vida - Alcohólicos Anónimos</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Nueva Vida AA">
    <link rel="apple-touch-icon" href="icon-512.png">
    
    <link rel="manifest" href='data:application/json,{"name":"Nueva Vida AA","short_name":"Nueva Vida","start_url":".","display":"standalone","background_color":"#020617","theme_color":"#1e293b","orientation":"portrait","icons":[{"src":"icon-512.png","sizes":"512x512","type":"image/png"}]}' />

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-main: #020617; --bg-container: #0f172a; --card-bg: #1e293b;
            --primary: #2563eb; --accent: #16a34a; --warning: #d97706; --danger: #dc2626;
            --text-main: #f8fafc; --text-muted: #cbd5e1; --border-color: #334155;
        }
        /* Reglas automáticas para modo claro según la configuración del teléfono */
        @media (prefers-color-scheme: light) {
            :root.auto-theme {
                --bg-main: #f1f5f9; --bg-container: #ffffff; --card-bg: #f8fafc;
                --text-main: #0f172a; --text-muted: #64748b; --border-color: #cbd5e1;
            }
        }
        /* Forzado manual si hacen clic en el sol/luna */
        :root.light-forced {
            --bg-main: #f1f5f9; --bg-container: #ffffff; --card-bg: #f8fafc;
            --text-main: #0f172a; --text-muted: #64748b; --border-color: #cbd5e1;
        }

        body { margin: 0; padding: 0; background-color: var(--bg-main); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 19px; transition: background 0.3s, color 0.3s; }
        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; background-color: var(--bg-container); display: flex; flex-direction: column; position: relative; box-shadow: 0 0 25px rgba(0,0,0,0.5); padding-bottom: 110px; box-sizing: border-box; }
        .header { padding: 20px; background-color: var(--card-bg); border-bottom: 2px solid var(--border-color); text-align: center; position: relative; }
        .header h1 { margin: 0; font-size: 24px; }
        .theme-toggle { position: absolute; top: 18px; right: 20px; background: none; border: none; font-size: 24px; cursor: pointer; }
        
        .main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .card { background-color: var(--card-bg); border-radius: 20px; padding: 22px; margin-bottom: 20px; border: 2px solid var(--border-color); }
        
        .input-field, .select-field, .textarea-field { width: 100%; padding: 16px; background-color: var(--bg-main); border: 2px solid #475569; border-radius: 14px; color: var(--text-main); font-size: 18px; margin-top: 8px; margin-bottom: 18px; box-sizing: border-box; }
        .textarea-field { resize: vertical; min-height: 80px; font-family: inherit; }
        
        .btn { background-color: var(--primary); color: white; border: none; padding: 16px; border-radius: 14px; font-size: 19px; font-weight: bold; cursor: pointer; width: 100%; display: block; text-align: center; box-sizing: border-box; text-decoration: none; }
        .btn-danger { background-color: var(--danger); }
        .btn-success { background-color: var(--accent); }
        .btn-secondary { background-color: #475569; }
        
        .checkbox-group { background: var(--bg-main); padding: 14px; border-radius: 14px; margin-bottom: 15px; border: 2px solid var(--border-color); }
        .checkbox-label { display: flex; align-items: center; font-size: 20px; cursor: pointer; }
        .checkbox-custom { width: 26px; height: 26px; margin-right: 15px; }
        
        /* Estilos del Chat */
        .chat-container { display: flex; flex-direction: column; height: 60vh; background: var(--bg-main); border-radius: 16px; border: 2px solid var(--border-color); overflow: hidden; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .chat-bubble { max-width: 80%; padding: 12px 16px; border-radius: 16px; font-size: 17px; line-height: 1.4; word-wrap: break-word; }
        .chat-bubble.propio { background-color: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .chat-bubble.ajeno { background-color: var(--card-bg); color: var(--text-main); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border-color); }
        .chat-meta { font-size: 12px; opacity: 0.8; margin-top: 4px; display: block; text-align: right; }
        .chat-input-area { display: flex; padding: 10px; background: var(--card-bg); border-top: 2px solid var(--border-color); gap: 8px; }
        
        /* Directorio */
        .directorio-item { background: var(--card-bg); padding: 16px; border-radius: 14px; margin-bottom: 10px; border: 2px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .tel-link { color: var(--accent); font-weight: bold; text-decoration: none; font-size: 18px; }

        /* Buscador Predictivo */
        .autocomplete-container { position: relative; width: 100%; }
        .autocomplete-suggestions { position: absolute; top: 100%; left: 0; right: 0; background: var(--card-bg); border: 2px solid #475569; z-index: 100; max-height: 180px; overflow-y: auto; border-radius: 14px; margin-top: -15px; }
        .suggestion-item { padding: 12px; cursor: pointer; font-size: 16px; border-bottom: 1px solid var(--border-color); }
        .suggestion-item:hover { background: var(--primary); color: white; }

        /* Pasos AA */
        .paso-row { display: flex; align-items: center; padding: 16px; background: var(--bg-main); border-radius: 14px; margin-bottom: 12px; cursor: pointer; border: 2px solid var(--border-color); }
        .paso-row.completado { border-color: var(--warning); background: var(--card-bg); }
        .paso-numero { font-size: 26px; font-weight: bold; margin-right: 15px; min-width: 35px; color: var(--text-muted); }
        .paso-row.completado .paso-numero { color: var(--warning); }
        .star-icon { font-size: 28px; margin-left: auto; color: #475569; }
        .star-icon.active { color: var(--warning); }

        /* Biblioteca */
        .biblioteca-item { background: var(--bg-main); padding: 18px; border-radius: 14px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; border: 2px solid var(--border-color); }

        /* Barra de navegación de 6 items */
        .navbar { position: absolute; bottom: 0; left: 0; right: 0; height: 95px; background-color: var(--card-bg); border-top: 2px solid var(--border-color); display: flex; justify-content: space-around; align-items: center; padding: 0 2px; }
        .nav-item { color: var(--text-muted); cursor: pointer; text-align: center; font-size: 11px; font-weight: bold; flex: 1; min-width: 0; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 24px; margin-bottom: 2px; }
        .nav-item span { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .popup-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 999; }
        .popup-card { background: var(--card-bg); border-radius: 24px; padding: 25px; text-align: center; max-width: 400px; border: 3px solid var(--warning); color: var(--text-main); }
    </style>
</head>
<body class="auto-theme">
    <div id="root"></div>

    <script type="text/babel">
        // Credenciales Oficiales Sincronizadas
        const SUPABASE_URL = "https://xzkuywsitdwikzksiesf.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6a3V5d3NpdGR3aWt6a3NpZXNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMTI0NjksImV4cCI6MjA5NDU4ODQ2OX0.FnVWzAQ1jJXTIR7A4SKEaANyfrbZ8EvuCT-kjhucAg8";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const GRUPOS = [
          { id: "san-jose-renca", nombre: "SAN JOSE DE RENCA" },
          { id: "grupo-esperanza", nombre: "GRUPO ESPERANZA" }
        ];
        
        const PASOS_AA = [
            "Admitimos que éramos impotentes ante el alcohol...", "Llegamos a creer en un Poder Superior...",
            "Decidimos poner nuestra voluntad al cuidado de Dios...", "Sin miedo, hicimos un minucioso examen de conciencia...",
            "Admitimos ante Dios y otro ser humano nuestros defectos...", "Estuvimos enteramente dispuestos a dejar que Dios nos liberase...",
            "Humildemente le pedimos que nos librase de nuestros defectos...", "Hicimos una lista de todas las personas que habíamos ofendido...",
            "Reparamos directamente a cuantos nos fue posible el daño...", "Continuamos con nuestro examen de conciencia constante...",
            "Buscamos a través de la oración y la meditación...", "Habiendo experimentado un despertar espiritual, llevamos el mensaje..."
        ];

        function App() {
            // Estado de Usuario y Sesión
            const [user, setUser] = React.useState(null);
            const [activeTab, setActiveTab] = React.useState("inicio");
            const [forcedLight, setForcedLight] = React.useState(false);
            
            // Datos Sincronizados de la Nube
            const [misAdicciones, setMisAdicciones] = React.useState({});
            const [pasoActual, setPasoActual] = React.useState(1);
            const [eventos, setEventos] = React.useState([]);
            const [biblioteca, setBiblioteca] = React.useState([]);
            const [chatMensajes, setChatMensajes] = React.useState([]);
            const [directorio, setDirectorio] = React.useState([]);
            const [adiccionesDisponibles, setAdiccionesDisponibles] = React.useState([]);

            // Notificaciones internas en pantalla
            const [alertaEvento, setAlertaEvento] = React.useState(null);
            const [ultimoIdEventoConocido, setUltimoIdEventoConocido] = React.useState(0);

            // Formularios Login / Registro
            const [nombre, setNombre] = React.useState("");
            const [sede, setSede] = React.useState("");
            const [rol, setRol] = React.useState("basico");
            const [fraseSeguridad, setFraseSeguridad] = React.useState("");
            const [telefonoRegistro, setTelefonoRegistro] = React.useState("");
            const [visibleDir, setVisibleDir] = React.useState(true);
            const [checks, setChecks] = React.useState({});
            const [fechas, setFechas] = React.useState({});
            const [loginCredencial, setLoginCredencial] = React.useState("");
            const [loginFraseAdmin, setLoginFraseAdmin] = React.useState("");

            // Gestión en Perfil (Modificar Teléfonos y Auto-añadir Adicciones)
            const [nuevoTelPerfil, setNuevoTelPerfil] = React.useState("");
            const [adiccionSeleccionadaPerfil, setAdiccionSeleccionadaPerfil] = React.useState("");

            // Formularios Administrador
            const [evtTitulo, setEvtTitulo] = React.useState("");
            const [evtFecha, setEvtFecha] = React.useState("");
            const [evtHora, setEvtHora] = React.useState("");
            const [evtLugar, setEvtLugar] = React.useState("");
            const [evtLat, setEvtLat] = React.useState(null);
            const [evtLon, setEvtLon] = React.useState(null);
            const [evtNota, setEvtNota] = React.useState("");
            const [suggestions, setSuggestions] = React.useState([]);
            const [nuevoTituloLib, setNuevoTituloLib] = React.useState("");
            const [nuevoTipoLib, setNuevoTipoLib] = React.useState("PDF");
            const [nuevoLinkLib, setNuevoLinkLib] = React.useState("");
            const [nuevaAdiccionAdmin, setNuevaAdiccionAdmin] = React.useState("");
            const [chatTxt, setChatTxt] = React.useState("");

            // Inicializar e instalar Service Worker básico para PWA offline
            React.useEffect(() => {
                document.documentElement.className = forcedLight ? "light-forced" : "auto-theme";
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('data:application/javascript,self.addEventListener("fetch",function(e){});');
                }
            }, [forcedLight]);

            // Carga inicial de catálogo de adicciones mutables
            React.useEffect(() => {
                async function obtenerCatalogo() {
                    const { data } = await supabase.from('lista_adicciones').select('nombre').order('nombre', {ascending: true});
                    if (data) setAdiccionesDisponibles(data.map(d => d.nombre));
                }
                obtenerCatalogo();
            }, []);

            // Polling en tiempo real unificado (Corre cada 4 segundos)
            React.useEffect(() => {
                if (!user) return;
                cargarDatosGrupoYUsuario();
                const interval = setInterval(cargarDatosGrupoYUsuario, 4000);
                return () => clearInterval(interval);
            }, [user, ultimoIdEventoConocido]);

            async function cargarDatosGrupoYUsuario() {
                try {
                    // 1. Estado de usuario
                    const { data: uData } = await supabase.from('usuarios').select('*').eq('username', user.username).single();
                    if (uData) {
                        setMisAdicciones(uData.adicciones || {});
                        setPasoActual(uData.paso_actual || 1);
                        setUser(prev => ({ ...prev, estado: uData.estado, telefonos: uData.telefonos || [] }));
                    }

                    // 2. Chat de la Sede
                    const { data: cData } = await supabase.from('chats').select('*').eq('grupo_id', user.grupoId).order('id', { ascending: true });
                    if (cData) setChatMensajes(cData);

                    // 3. Directorio de la Sede
                    const { data: dData } = await supabase.from('usuarios').select('nombre_real, telefonos').eq('grupo_id', user.grupoId).eq('visible_directorio', true).eq('estado', 'aprobado');
                    if (dData) setDirectorio(dData);

                    // 4. Biblioteca Ordenada Alfabéticamente (Índice Temático)
                    const { data: bData } = await supabase.from('biblioteca').select('*').eq('grupo_id', user.grupoId).order('titulo', { ascending: true });
                    if (bData) setBiblioteca(bData);

                    // 5. Catálogo actualizado de adicciones
                    const { data: adCat } = await supabase.from('lista_adicciones').select('nombre').order('nombre', {ascending: true});
                    if (adCat) setAdiccionesDisponibles(adCat.map(d => d.nombre));

                    // 6. Eventos y Detección de Notificación Interna Emergente
                    const { data: eData } = await supabase.from('eventos').select('*').eq('grupo_id', user.grupoId).order('fecha', { ascending: true });
                    if (eData && eData.length > 0) {
                        setEventos(eData);
                        const maxId = Math.max(...eData.map(ev => ev.id));
                        if (ultimoIdEventoConocido !== 0 && maxId > ultimoIdEventoConocido) {
                            const nuevoEv = eData.find(ev => ev.id === maxId);
                            setAlertaEvento(nuevoEv);
                        }
                        setUltimoIdEventoConocido(maxId);
                    }
                } catch(e) {}
            }

            // Flujo Predictivo de Direcciones de Código Abierto (Nominatim)
            const buscarDireccion = async (txt) => {
                setEvtLugar(txt);
                if (txt.length < 4) { setSuggestions([]); return; }
                try {
                    const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(txt)}&limit=4`);
                    const res = await r.json();
                    setSuggestions(res || []);
                } catch(e){}
            };

            const registrarNuevoUsuario = async (e) => {
                e.preventDefault();
                if (!nombre || !sede || !telefonoRegistro) return alert("Por favor, rellene los campos mandatorios");
                if (rol === 'admin' && !fraseSeguridad) return alert("Los administradores requieren una frase de seguridad para blindar la sede");
                
                const grupoSel = GRUPOS.find(g => g.id === sede);
                const uid = nombre.replace(/\s+/g, "") + "_" + grupoSel.id;
                
                const adConfig = {};
                adiccionesDisponibles.forEach(ad => {
                    if (checks[ad]) adConfig[ad] = fechas[ad] || new Date().toISOString().split('T')[0];
                });

                const nuevoUsuario = {
                    username: uid,
                    nombre_real: nombre.trim(),
                    grupo_id: sede,
                    grupo_nombre: grupoSel.nombre,
                    rol: rol,
                    estado: rol === 'admin' ? 'aprobado' : 'pendiente',
                    frase_seguridad: rol === 'admin' ? fraseSeguridad.trim() : null,
                    telefonos: [telefonoRegistro.trim()],
                    visible_directorio: visibleDir,
                    adicciones: adConfig,
                    paso_actual: 1
                };

                const { error } = await supabase.from('usuarios').insert([nuevoUsuario]);
                if (error) return alert("Error al registrar: " + error.message);
                
                setUser({ username: uid, nombreReal: nuevoUsuario.nombre_real, grupoId: sede, grupoNombre: grupoSel.nombre, rol: rol, estado: nuevoUsuario.estado, telefonos: nuevoUsuario.telefonos });
                setMisAdicciones(adConfig);
                alert("Cuenta creada. Identificador único asignado: " + uid);
            };

            const intentarLoguearse = async (e) => {
                e.preventDefault();
                if (!loginCredencial) return;
                
                // Buscar por Identificador o Teléfono
                let query = supabase.from('usuarios').select('*');
                if (loginCredencial.includes('_')) {
                    query = query.eq('username', loginCredencial.trim());
                } else {
                    query = query.contains('telefonos', JSON.stringify([loginCredencial.trim()]));
                }
                
                const { data, error } = await query.maybeSingle();
                if (!data) return alert("No se encontró ningún registro que coincida con esa credencial o teléfono");
                
                // Validación Estricta de la frase de seguridad para administradores
                if (data.rol === 'admin') {
                    if (!loginFraseAdmin || data.frase_seguridad !== loginFraseAdmin.trim()) {
                        return alert("Frase de seguridad incorrecta. Acceso denegado al rol de administrador.");
                    }
                }

                setUser({ username: data.username, nombreReal: data.nombre_real, grupoId: data.grupo_id, grupoNombre: data.grupo_nombre, rol: data.rol, estado: data.estado, telefonos: data.telefonos || [] });
                setMisAdicciones(data.adicciones || {});
                setPasoActual(data.paso_actual || 1);
            };

            // Enviar mensajes a la sala de chat de la sede
            const enviarMensajeChat = async (e) => {
                e.preventDefault();
                if (!chatTxt.trim()) return;
                const m = { grupo_id: user.grupoId, username: user.username, nombre_real: user.nombreReal, mensaje: chatTxt.trim() };
                setChatTxt("");
                await supabase.from('chats').insert([m]);
                cargarDatosGrupoYUsuario();
            };

            // Acciones del Perfil: Modificar/Agregar Teléfono
            const agregarTelefonoPerfil = async () => {
                if (!nuevoTelPerfil.trim()) return;
                const nuevosTels = [...(user.telefonos || []), nuevoTelPerfil.trim()];
                const { error } = await supabase.from('usuarios').update({ telefonos: nuevosTels }).eq('username', user.username);
                if (!error) {
                    setUser(p => ({ ...p, telefonos: nuevosTels }));
                    setNuevoTelPerfil("");
                    alert("Directorio telefónico de contacto actualizado");
                }
            };

            // Acciones del Perfil: Auto-asignarse una nueva adicción aprobada por el admin
            const autoAgregarAdiccion = async () => {
                if (!adiccionSeleccionadaPerfil || misAdicciones[adiccionSeleccionadaPerfil]) return;
                const nuevasAd = { ...misAdicciones, [adiccionSeleccionadaPerfil]: new Date().toISOString().split('T')[0] };
                const { error } = await supabase.from('usuarios').update({ adicciones: nuevasAd }).eq('username', user.username);
                if (!error) {
                    setMisAdicciones(nuevasAd);
                    alert("Nuevo contador de sobriedad activado para: " + adicionSeleccionadaPerfil);
                }
            };

            // Acciones Administrativas
            const adminCrearAdiccionGlobal = async (e) => {
                e.preventDefault();
                if (!nuevaAdiccionAdmin.trim()) return;
                const { error } = await supabase.from('lista_adicciones').insert([{ nombre: nuevaAdiccionAdmin.trim() }]);
                if (error) return alert("La adicción ya se encuentra en la lista autorizada o hubo un error.");
                alert("Nueva adicción autorizada para toda la plataforma.");
                setNuevaAdiccionAdmin("");
                cargarDatosGrupoYUsuario();
            };

            const adminPublicarEvento = async (e) => {
                e.preventDefault();
                if (!evtTitulo || !evtFecha || !evtHora || !evtLugar) return alert("Rellene los datos obligatorios");
                await supabase.from('eventos').insert([{
                    grupo_id: user.grupoId, titulo: evtTitulo.trim(), fecha: evtFecha, hora: evtHora,
                    lugar: evtLugar, latitud: evtLat, longitud: evtLon, nota: evtNota.trim() || null
                }]);
                setEvtTitulo(""); setEvtFecha(""); setEvtHora(""); setEvtLugar(""); setEvtNota(""); setEvtLat(null); setEvtLon(null);
                alert("Evento publicado. Se notificará a los miembros conectados.");
                cargarDatosGrupoYUsuario();
            };

            const adminIndexarBiblioteca = async (e) => {
                e.preventDefault();
                if (!nuevoTituloLib || !nuevoLinkLib) return alert("Campos incompletos");
                await supabase.from('biblioteca').insert([{ grupo_id: user.grupoId, titulo: nuevoTituloLib.trim(), tipo: nuevoTipoLib, link: nuevoLinkLib.trim() }]);
                setNuevoTituloLib(""); setNuevoLinkLib("");
                alert("Material indexado alfabéticamente.");
                cargarDatosGrupoYUsuario();
            };

            return (
                <div className="app-container">
                    {/* Alerta de notificación interna en pantalla para nuevos eventos de sede */}
                    {alertaEvento && (
                        <div className="popup-overlay">
                            <div className="popup-card" style={{borderColor: 'var(--primary)'}}>
                                <div style={{fontSize: '45px'}}>🔔</div>
                                <h3 style={{color: 'var(--primary)'}}>¡Nueva Actividad en tu Sede!</h3>
                                <p>El administrador acaba de agendar: <strong>{alertaEvento.titulo}</strong></p>
                                <p style={{fontSize: '15px', color: 'var(--text-muted)'}}>Revisa los detalles y la ruta exacta en la pestaña de Eventos.</p>
                                <button className="btn btn-success" onClick={() => setAlertaEvento(null)}>Entendido</button>
                            </div>
                        </div>
                    )}

                    <div className="header">
                        <h1>{user ? user.grupoNombre : "Nueva Vida AA"}</h1>
                        {user && <span style={{color: 'var(--accent)', fontWeight: 'bold'}}>{user.nombreReal}</span>}
                        <button className="theme-toggle" onClick={() => setForcedLight(!forcedLight)}>
                            {forcedLight ? "🌙" : "☀️"}
                        </button>
                    </div>

                    <div className="main-content">
                        {!user ? (
                            <div className="card">
                                <h2 style={{textAlign:'center', color:'var(--primary)'}}>Acceso al Grupo</h2>
                                <form onSubmit={registrarNuevoUsuario}>
                                    <h4 style={{color: 'var(--accent)', marginBottom: '4px'}}>1. Registrarse en una Sede</h4>
                                    <input type="text" className="input-field" placeholder="Su Nombre o Alias" value={nombre} onChange={e => setNombre(e.target.value)} />
                                    <input type="text" className="input-field" placeholder="Número de Teléfono (Ej: +56912345678)" value={telefonoRegistro} onChange={e => setTelefonoRegistro(e.target.value)} />
                                    
                                    <select className="select-field" value={sede} onChange={e => setSede(e.target.value)}>
                                        <option value="">-- Seleccionar Sede --</option>
                                        {GRUPOS.map(g => <option key={g.id} value={g.id}>{g.nombre}</option>)}
                                    </select>
                                    
                                    <select className="select-field" value={rol} onChange={e => setRol(e.target.value)}>
                                        <option value="basico">Miembro de la Sede</option>
                                        <option value="admin">Administrador Autorizado</option>
                                    </select>

                                    {rol === 'admin' && (
                                        <input type="password" className="input-field" style={{borderColor:'var(--warning)'}} placeholder="Frase Secreta de Seguridad (Admin)" value={fraseSeguridad} onChange={e => setFraseSeguridad(e.target.value)} />
                                    )}

                                    <div className="checkbox-group">
                                        <label className="checkbox-label" style={{fontSize:'16px'}}>
                                            <input type="checkbox" className="checkbox-custom" checked={visibleDir} onChange={e => setVisibleDir(e.target.checked)} />
                                            Hacer mi teléfono visible en el directorio de la sede
                                        </label>
                                    </div>

                                    <h4 style={{color: 'var(--warning)', marginBottom: '8px', fontSize:'17px'}}>Seleccione adicciones iniciales:</h4>
                                    {adiccionesDisponibles.map(ad => (
                                        <div key={ad} className="checkbox-group">
                                            <label className="checkbox-label" style={{fontSize: '17px'}}>
                                                <input type="checkbox" className="checkbox-custom" checked={!!checks[ad]} onChange={e => setChecks({...checks, [ad]: e.target.checked})} />
                                                {ad}
                                            </label>
                                            {checks[ad] && (
                                                <input type="date" className="input-field" style={{marginTop:'6px', marginBottom:0}} value={fechas[ad] || ""} onChange={e => setFechas({...fechas, [ad]: e.target.value})} />
                                            )}
                                        </div>
                                    ))}
                                    <button type="submit" className="btn btn-success">Registrar Miembro</button>
                                </form>

                                <hr style={{borderColor: 'var(--border-color)', margin: '25px 0'}} />

                                <form onSubmit={intentarLoguearse}>
                                    <h4 style={{color: '#fff', marginBottom: '4px'}}>2. Ya tengo cuenta</h4>
                                    <input type="text" className="input-field" placeholder="Escriba su Identificador o Teléfono" value={loginCredencial} onChange={e => setLoginCredencial(e.target.value)} />
                                    
                                    {/* Campo condicional para administradores que vuelven a ingresar */}
                                    <input type="password" className="input-field" placeholder="Frase de Seguridad (Solo si es Admin)" value={loginFraseAdmin} onChange={e => setLoginFraseAdmin(e.target.value)} />
                                    
                                    <button type="submit" className="btn btn-secondary">Iniciar Sesión</button>
                                </form>
                            </div>
                        ) : user.estado === 'pendiente' ? (
                            <div className="card" style={{textAlign:'center'}}>
                                <div style={{fontSize:'50px'}}>⏳</div>
                                <h2>Cuenta en Revisión</h2>
                                <p>Tu llave de acceso directo es:</p>
                                <p style={{background: 'var(--bg-main)', padding: '12px', borderRadius: '8px', color: 'var(--primary)', fontFamily: 'monospace', fontWeight: 'bold'}}>{user.username}</p>
                                <p style={{color:'var(--warning)'}}>Pídale al administrador de la sede que apruebe su ficha.</p>
                                <button className="btn btn-secondary" onClick={() => setUser(null)}>Volver</button>
                            </div>
                        ) : (
                            <div>
                                {activeTab === "inicio" && (
                                    <div>
                                        <div className="card" style={{textAlign: 'center', borderColor: 'var(--warning)'}}>
                                            <h3 style={{margin: 0, color: 'var(--warning)'}}>Meta del Día</h3>
                                            <p style={{fontSize: '32px', fontWeight: 'bold', color: '#10b981', margin: '5px 0'}}>¡Solo por Hoy!</p>
                                        </div>
                                        <h3>Mis Contadores de Sobriedad</h3>
                                        {Object.keys(misAdicciones).length === 0 ? (
                                            <p style={{color: 'var(--text-muted)'}}>No tienes contadores configurados.</p>
                                        ) : (
                                            Object.keys(misAdicciones).map(ad => {
                                                const dias = Math.max(0, Math.floor((new Date() - new Date(misAdicciones[ad])) / (1000 * 60 * 60 * 24)));
                                                return (
                                                    <div key={ad} className="card">
                                                        <div style={{display:'flex', justifyBetween:'space-between', alignItems:'center', marginBottom:'10px'}}>
                                                            <strong style={{fontSize:'20px'}}>Libre de {ad}</strong>
                                                            <span style={{color:'var(--accent)', fontSize:'22px', fontWeight:'bold'}}>{dias} Días</span>
                                                        </div>
                                                        <button className="btn btn-danger" style={{padding:'8px', fontSize:'14px'}} onClick={async () => {
                                                            const n = { ...misAdicciones, [ad]: new Date().toISOString().split('T')[0] };
                                                            await supabase.from('usuarios').update({ adicciones: n }).eq('username', user.username);
                                                            setMisAdicciones(n);
                                                        }}>Reiniciar Contador (Recaída)</button>
                                                    </div>
                                                );
                                            })
                                        )}
                                    </div>
                                )}

                                {activeTab === "pasos" && (
                                    <div>
                                        <h3>Trabajando los 12 Pasos</h3>
                                        {PASOS_AA.map((texto, idx) => {
                                            const num = idx + 1;
                                            const esActual = pasoActual === num;
                                            return (
                                                <div key={num} className={"paso-row" + (esActual ? " completado" : "")} onClick={async () => {
                                                    await supabase.from('usuarios').update({ paso_actual: num }).eq('username', user.username);
                                                    setPasoActual(num);
                                                }}>
                                                    <div className="paso-numero">{num}</div>
                                                    <div style={{fontSize: '16px'}}>{texto}</div>
                                                    <div className={"star-icon" + (esActual ? " active" : "")}>★</div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}

                                {activeTab === "chat" && (
                                    <div>
                                        <h3>Sala de la Sede</h3>
                                        <div className="chat-container">
                                            <div className="chat-messages">
                                                {chatMensajes.map(m => {
                                                    const esMio = m.username === user.username;
                                                    return (
                                                        <div key={m.id} className={"chat-bubble " + (esMio ? "propio" : "ajeno")}>
                                                            {!esMio && <strong style={{fontSize:'13px', display:'block', color:'var(--warning)'}}>{m.nombre_real}:</strong>}
                                                            {m.mensaje}
                                                            <span className="chat-meta">{new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                            <form onSubmit={enviarMensajeChat} className="chat-input-area">
                                                <input type="text" className="input-field" style={{margin:0}} placeholder="Escribe un mensaje..." value={chatTxt} onChange={e => setChatTxt(e.target.value)} />
                                                <button type="submit" className="btn btn-success" style={{width:'auto', padding:'0 20px'}}>Enviar</button>
                                            </form>
                                        </div>
                                    </div>
                                )}

                                {activeTab === "eventos" && (
                                    <div>
                                        <h3>Eventos y Cronograma</h3>
                                        {user.rol === 'admin' && (
                                            <div className="card" style={{borderColor:'var(--warning)'}}>
                                                <h4 style={{margin:'0 0 10px 0', color:'var(--warning)'}}>Agendar Evento (Admin)</h4>
                                                <form onSubmit={adminPublicarEvento}>
                                                    <input type="text" className="input-field" placeholder="Título de la reunión" value={evtTitulo} onChange={e => setEvtTitulo(e.target.value)} />
                                                    <input type="date" className="input-field" value={evtFecha} onChange={e => setEvtFecha(e.target.value)} />
                                                    <input type="time" className="input-field" value={evtHora} onChange={e => setEvtHora(e.target.value)} />
                                                    
                                                    <div className="autocomplete-container">
                                                        <input type="text" className="input-field" placeholder="Dirección (Predictivo)" value={evtLugar} onChange={e => buscarDireccion(e.target.value)} />
                                                        {suggestions.length > 0 && (
                                                            <div className="autocomplete-suggestions">
                                                                {suggestions.map((s, i) => (
                                                                    <div key={i} className="suggestion-item" onClick={() => { setEvtLugar(s.display_name); setEvtLat(s.lat); setEvtLon(s.lon); setSuggestions([]); }}>
                                                                        {s.display_name}
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>

                                                    <textarea className="textarea-field" placeholder="Notas adicionales..." value={evtNota} onChange={e => setEvtNota(e.target.value)} />
                                                    <button type="submit" className="btn btn-success">Publicar e Informar</button>
                                                </form>
                                            </div>
                                        )}

                                        {eventos.map(ev => {
                                            const mapUrl = ev.latitud ? `https://www.google.com/maps/dir/?api=1&destination=${ev.latitud},${ev.longitud}` : `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(ev.lugar)}`;
                                            return (
                                                <div key={ev.id} className="card" style={{background:'var(--bg-main)'}}>
                                                    <h4 style={{margin:'0 0 5px 0', color:'var(--warning)'}}>{ev.titulo}</h4>
                                                    <p style={{margin:'2px 0', fontSize:'15px'}}>📅 {ev.fecha} — ⏰ {ev.hora} hrs</p>
                                                    <p style={{margin:'4px 0', fontSize:'14px', color:'var(--text-muted)'}}>📍 {ev.lugar}</p>
                                                    {ev.nota && <p style={{fontSize:'14px', fontStyle:'italic'}}>📝 {ev.nota}</p>}
                                                    <a href={mapUrl} target="_blank" rel="noreferrer" className="btn btn-secondary" style={{fontSize:'15px', padding:'10px', marginTop:'10px'}}>🗺️ Abrir Ruta en Google Maps</a>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}

                                {activeTab === "biblioteca" && (
                                    <div>
                                        <h3>Índice de Materiales</h3>
                                        {user.rol === 'admin' && (
                                            <div className="card" style={{borderColor:'var(--primary)'}}>
                                                <h4 style={{margin:'0 0 10px 0', color:'var(--primary)'}}>Indexar Recurso (Admin)</h4>
                                                <form onSubmit={adminIndexarBiblioteca}>
                                                    <input type="text" className="input-field" placeholder="Título del archivo" value={nuevoTituloLib} onChange={e => setNuevoTituloLib(e.target.value)} />
                                                    <input type="text" className="input-field" placeholder="Enlace URL" value={nuevoLinkLib} onChange={e => setNuevoLinkLib(e.target.value)} />
                                                    <select className="select-field" value={nuevoTipoLib} onChange={e => setNuevoTipoLib(e.target.value)}>
                                                        <option value="PDF">Fichero PDF</option>
                                                        <option value="Imagen">Imagen / Infografía</option>
                                                        <option value="Video">Video Instructivo</option>
                                                        <option value="Enlace Web">Enlace de Utilidad</option>
                                                    </select>
                                                    <button type="submit" className="btn btn-success">Añadir al Índice</button>
                                                </form>
                                            </div>
                                        )}
                                        {biblioteca.map(b => (
                                            <div key={b.id} className="biblioteca-item">
                                                <div>
                                                    <strong>{b.titulo}</strong>
                                                    <div style={{fontSize:'13px', color:'var(--primary)'}}>{b.tipo}</div>
                                                </div>
                                                <a href={b.link} target="_blank" rel="noreferrer" className="btn" style={{width:'auto', padding:'8px 16px', fontSize:'15px'}}>Ver</a>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {activeTab === "perfil" && (
                                    <div>
                                        <div className="card">
                                            <h3>Mi Ficha Médica</h3>
                                            <p style={{fontSize:'15px'}}><strong>ID de Acceso:</strong> <span style={{color:'var(--primary)'}}>{user.username}</span></p>
                                            
                                            <h4 style={{margin:'15px 0 5px 0'}}>Mis Teléfonos Registrados:</h4>
                                            <ul>
                                                {user.telefonos?.map((t, idx) => <li key={idx} style={{fontSize:'16px'}}>{t}</li>)}
                                            </ul>
                                            
                                            <div style={{display:'flex', gap:'8px'}}>
                                                <input type="text" className="input-field" style={{margin:0}} placeholder="Nuevo número" value={nuevoTelPerfil} onChange={e => setNuevoTelPerfil(e.target.value)} />
                                                <button className="btn btn-success" style={{width:'auto'}} onClick={agregarTelefonoPerfil}>Añadir</button>
                                            </div>

                                            <h4 style={{margin:'20px 0 5px 0'}}>Activar nuevo contador aprobado:</h4>
                                            <select className="select-field" value={adiccionSeleccionadaPerfil} onChange={e => setAdiccionSeleccionadaPerfil(e.target.value)}>
                                                <option value="">-- Seleccionar --</option>
                                                {adiccionesDisponibles.filter(a => !misAdicciones[a]).map(a => (
                                                    <option key={a} value={a}>{a}</option>
                                                ))}
                                            </select>
                                            <button className="btn btn-secondary" style={{padding:'12px', fontSize:'15px'}} onClick={autoAgregarAdiccion}>Activar Tratamiento</button>

                                            <button className="btn btn-danger" style={{marginTop:'30px'}} onClick={() => setUser(null)}>Cerrar Sesión</button>
                                        </div>

                                        <div className="card" style={{borderColor:'var(--primary)'}}>
                                            <h3>📞 Directorio de la Sede</h3>
                                            {directorio.map((d, i) => (
                                                <div key={i} className="directorio-item">
                                                    <span>{d.nombre_real}</span>
                                                    <div style={{display:'flex', flexDirection:'column', gap:'4px'}}>
                                                        {d.telefonos?.map((tel, idx) => (
                                                            <a key={idx} href={`tel:${tel}`} className="tel-link">📞 {tel}</a>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        {user.rol === 'admin' && (
                                            <div className="card" style={{borderColor:'var(--warning)'}}>
                                                <h3>Autorizar Nuevas Adicciones</h3>
                                                <form onSubmit={adminCrearAdiccionGlobal}>
                                                    <input type="text" className="input-field" placeholder="Ej: Fármacos, Redes Sociales" value={nuevaAdiccionAdmin} onChange={e => setNuevaAdiccionAdmin(e.target.value)} />
                                                    <button type="submit" className="btn btn-success">Agregar al Catálogo</button>
                                                </form>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {user && user.estado === 'aprobado' && (
                        <div className="navbar">
                            <div className={"nav-item" + (activeTab === 'inicio' ? ' active' : '')} onClick={() => setActiveTab("inicio")}>
                                <div className="nav-icon">📊</div><span>Progreso</span>
                            </div>
                            <div className={"nav-item" + (activeTab === 'pasos' ? ' active' : '')} onClick={() => setActiveTab("pasos")}>
                                <div className="nav-icon">⭐</div><span>12 Pasos</span>
                            </div>
                            <div className={"nav-item" + (activeTab === 'chat' ? ' active' : '')} onClick={() => setActiveTab("chat")}>
                                <div className="nav-icon">💬</div><span>Chat Sede</span>
                            </div>
                            <div className={"nav-item" + (activeTab === 'eventos' ? ' active' : '')} onClick={() => setActiveTab("eventos")}>
                                <div className="nav-icon">📅</div><span>Eventos</span>
                            </div>
                            <div className={"nav-item" + (activeTab === 'biblioteca' ? ' active' : '')} onClick={() => setActiveTab("biblioteca")}>
                                <div className="nav-icon">📚</div><span>Biblioteca</span>
                            </div>
                            <div className={"nav-item" + (activeTab === 'perfil' ? ' active' : '')} onClick={() => setActiveTab("perfil")}>
                                <div className="nav-icon">👤</div><span>Perfil</span>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
