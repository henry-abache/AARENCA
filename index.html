    * { box-sizing: border-box; }
    body {

      display: inline-block;

    .btn:active { transform: scale(0.97); }
    .btn-primary  { background-color: var(--primary); color: white; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary { background-color: var(--text-muted); color: white; }
    .btn-success  { background-color: var(--accent); color: white; }

    .btn-block    { width: 100%; text-align: center; }
    .input-field, .select-field {
      width: 100%; padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background-color: var(--input-bg);
      color: var(--text-main);
      font-size: 16px; margin-bottom: 10px;

    .spinner {
      border: 3px solid var(--border); border-top: 3px solid var(--primary);

    .theme-btn.active { border-color: var(--primary); background: var(--primary); color: white; }

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ── Supabase ──────────────────────────────────────────────────────────────
    // Cliente ya inicializado en script vanilla antes de Babel (evita colisión de nombres)
    const supabase = window._supabaseClient || null;
    console.log('[AA] supabase client en Babel:', supabase ? 'OK' : 'FALLO');

    // ── Constantes ────────────────────────────────────────────────────────────
    const PASOS = [
      { n:1,  titulo:'Admitir la impotencia',    texto:'Admitimos que éramos impotentes ante el alcohol, que nuestras vidas se habían vuelto ingobernables.' },
      { n:2,  titulo:'Poder Superior',           texto:'Llegamos a creer que un Poder Superior a nosotros mismos podría devolvernos el sano juicio.' },
      { n:3,  titulo:'Decisión de entrega',      texto:'Decidimos poner nuestra voluntad y nuestra vida al cuidado de Dios, como nosotros lo concebimos.' },
      { n:4,  titulo:'Inventario moral',         texto:'Sin miedo hicimos un inventario moral de nosotros mismos.' },
      { n:5,  titulo:'Admitir errores',          texto:'Admitimos ante Dios, ante nosotros mismos y ante otro ser humano, la naturaleza exacta de nuestros defectos.' },
      { n:6,  titulo:'Disposición al cambio',    texto:'Estuvimos completamente dispuestos a dejar que Dios eliminase todos estos defectos de carácter.' },
      { n:7,  titulo:'Pedir la eliminación',     texto:'Humildemente le pedimos que nos liberase de nuestros defectos.' },
      { n:8,  titulo:'Lista de agraviados',      texto:'Hicimos una lista de todas aquellas personas a quienes habíamos ofendido y estuvimos dispuestos a reparar el daño.' },
      { n:9,  titulo:'Reparar el daño',          texto:'Reparamos directamente a cuantos nos fue posible el daño causado, excepto cuando implicaba perjuicio para ellos o para otros.' },
      { n:10, titulo:'Inventario continuo',      texto:'Continuamos haciendo nuestro inventario personal y cuando nos equivocábamos lo admitíamos inmediatamente.' },
      { n:11, titulo:'Oración y meditación',     texto:'Buscamos a través de la oración y la meditación mejorar nuestro contacto consciente con Dios, pidiéndole conocer Su voluntad para con nosotros y la fortaleza para cumplirla.' },
      { n:12, titulo:'Despertar espiritual',     texto:'Habiendo obtenido un despertar espiritual como resultado de estos pasos, tratamos de llevar este mensaje a los alcohólicos y de practicar estos principios en todos nuestros asuntos.' },
    ];

    const REFLEXIONES = [
      'Un día a la vez. Cada amanecer es una nueva oportunidad.',
      'La sobriedad no es el fin del camino, es el comienzo de la vida.',
      'Lo que no puedes controlar, suéltalo. Lo que sí puedes, trabájalo.',
      'El valor no es la ausencia de miedo, sino actuar a pesar de él.',
      'Cada día sobrio es una victoria que merece ser celebrada.',
      'La recuperación es posible. Tú eres la prueba viviente.',
      'Comparte tu historia — puede ser la luz que alguien necesita.',
      'La gratitud transforma lo que tenemos en suficiente.',
      'No estás solo/a. Toda la familia AA camina contigo.',
      'Primero lo primero: hoy, solo hoy.',
    ];

    const getReflexion = () => REFLEXIONES[new Date().getDay() % REFLEXIONES.length];
    const calcDias = (f) => f ? Math.max(0, Math.floor((Date.now() - new Date(f)) / 86400000)) : 0;
    const fmtFecha = (s) => s ? new Date(s).toLocaleDateString('es-ES', { day:'numeric', month:'long', year:'numeric' }) : '';

    // ── AuthScreen ────────────────────────────────────────────────────────────
    function AuthScreen() {
      const [modo, setModo]         = useState('login');
      const [email, setEmail]       = useState('');
      const [password, setPassword] = useState('');
      const [nombre, setNombre]     = useState('');
      const [loading, setLoading]   = useState(false);
      const [error, setError]       = useState('');
      const [ok, setOk]             = useState('');

      const limpiar = (m) => { setModo(m); setError(''); setOk(''); };

      const handleLogin = async () => {
        if (!email || !password) { setError('Completa todos los campos.'); return; }
        setLoading(true); setError('');
        const { error: err } = await supabase.auth.signInWithPassword({ email, password });
        if (err) setError(err.message === 'Invalid login credentials' ? 'Correo o contraseña incorrectos.' : err.message);
        setLoading(false);
      };

      const handleRegistro = async () => {
        if (!email || !password || !nombre) { setError('Completa todos los campos.'); return; }
        if (password.length < 6) { setError('La contraseña debe tener al menos 6 caracteres.'); return; }
        setLoading(true); setError('');
        const { data, error: err } = await supabase.auth.signUp({ email, password });
        if (err) { setError(err.message); setLoading(false); return; }
        if (data?.user) {
          await supabase.from('perfiles').upsert({ id: data.user.id, nombre, fecha_sobriedadad: new Date().toISOString().split('T')[0] });
        }
        setOk('¡Registro exitoso! Revisa tu correo para confirmar tu cuenta.');
        limpiar('login');
        setLoading(false);
      };

      return (
        <div className="app-container">
          <div className="header"><h1 style={{textAlign:'center'}}>Nueva Vida AA</h1></div>
          <div className="main-content">
            <div style={{textAlign:'center', padding:'32px 0 24px'}}>
              <div style={{fontSize:'80px', fontWeight:'bold', letterSpacing:'4px',
                background:'linear-gradient(135deg,#2563eb,#16a34a)',
                WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent', backgroundClip:'text'}}>AA</div>
              <p style={{color:'var(--text-muted)', fontSize:'15px', margin:'4px 0 0'}}>Alcohólicos Anónimos · Nueva Vida</p>
            </div>

            <div className="card">
              <div style={{display:'flex', gap:'8px', marginBottom:'18px'}}>
                <button className={`btn btn-sm ${modo==='login'?'btn-primary':'btn-secondary'}`} style={{flex:1}} onClick={()=>limpiar('login')}>Iniciar Sesión</button>
                <button className={`btn btn-sm ${modo==='registro'?'btn-primary':'btn-secondary'}`} style={{flex:1}} onClick={()=>limpiar('registro')}>Registrarse</button>
              </div>

              {error && <div className="error-msg">⚠️ {error}</div>}
              {ok    && <div className="success-msg">✅ {ok}</div>}

              {modo === 'registro' && (
                <input className="input-field" placeholder="Tu nombre" value={nombre} onChange={e=>setNombre(e.target.value)} />
              )}
              <input className="input-field" type="email" placeholder="Correo electrónico" value={email} onChange={e=>setEmail(e.target.value)} />
              <input className="input-field" type="password" placeholder="Contraseña" value={password}
                onChange={e=>setPassword(e.target.value)}
                onKeyDown={e=>e.key==='Enter' && (modo==='login'?handleLogin():handleRegistro())} />

              <button className="btn btn-primary btn-block" style={{marginTop:'4px'}}
                onClick={modo==='login'?handleLogin:handleRegistro} disabled={loading}>
                {loading ? '⏳ Procesando...' : modo==='login' ? '🔐 Iniciar Sesión' : '✨ Crear Cuenta'}
              </button>
            </div>

            <p style={{textAlign:'center', fontSize:'13px', color:'var(--text-muted)'}}>
              "Un día a la vez."
            </p>
          </div>
        </div>
      );
    }

    // ── PantallaInicio ────────────────────────────────────────────────────────
    function PantallaInicio({ user, perfil, setPerfil }) {
      const dias = calcDias(perfil?.fecha_sobriedadad);
      const [editando, setEditando]   = useState(false);
      const [nuevaFecha, setNuevaFecha] = useState(perfil?.fecha_sobriedadad || '');
      const [guardando, setGuardando] = useState(false);

      const guardarFecha = async () => {
        if (!nuevaFecha) return;
        setGuardando(true);
        await supabase.from('perfiles').update({ fecha_sobriedadad: nuevaFecha }).eq('id', user.id);
        setPerfil(p => ({ ...p, fecha_sobriedadad: nuevaFecha }));
        setEditando(false);
        setGuardando(false);
      };

      const medalla = dias >= 365 ? `🏆 ${Math.floor(dias/365)} año(s)`
        : dias >= 30  ? `🥇 ${Math.floor(dias/30)} mes(es)`
        : dias >= 7   ? `🥈 ${Math.floor(dias/7)} semana(s)`
        : dias >= 1   ? `🎖️ ${dias} día(s)`
        : '';

      const proximo = dias < 7 ? {label:'1 semana', meta:7}
        : dias < 30  ? {label:'1 mes',    meta:30}
        : dias < 90  ? {label:'3 meses',  meta:90}
        : dias < 180 ? {label:'6 meses',  meta:180}
        : dias < 365 ? {label:'1 año',    meta:365}
        : null;

      return (
        <div>
          <div className="motivacion-card">
            <p style={{margin:'0 0 6px', fontSize:'13px', opacity:0.75}}>💬 Reflexión del día</p>
            <p style={{margin:0, fontSize:'16px', lineHeight:1.6, fontStyle:'italic'}}>"{getReflexion()}"</p>
          </div>

          <div className="card" style={{textAlign:'center'}}>
            <p style={{margin:'0 0 4px', color:'var(--text-muted)', fontSize:'14px'}}>Días de sobriedad</p>
            <div className="dias-counter">{dias}</div>
            {medalla && <div style={{marginTop:'8px', fontSize:'20px', fontWeight:700}}>{medalla}</div>}
            <p style={{color:'var(--text-muted)', fontSize:'13px', margin:'8px 0 0'}}>
              {perfil?.fecha_sobriedadad ? `Desde el ${fmtFecha(perfil.fecha_sobriedadad)}` : 'Sin fecha de inicio registrada'}
            </p>
            {!editando
              ? <button className="btn btn-sm btn-secondary" style={{marginTop:'12px'}} onClick={()=>setEditando(true)}>✏️ Editar fecha de inicio</button>
              : <div style={{marginTop:'12px'}}>
                  <input type="date" className="input-field" value={nuevaFecha}
                    onChange={e=>setNuevaFecha(e.target.value)} max={new Date().toISOString().split('T')[0]} />
                  <div style={{display:'flex', gap:'8px'}}>
                    <button className="btn btn-sm btn-success" style={{flex:1}} onClick={guardarFecha} disabled={guardando}>
                      {guardando?'...':'✅ Guardar'}
                    </button>
                    <button className="btn btn-sm btn-secondary" style={{flex:1}} onClick={()=>setEditando(false)}>Cancelar</button>
                  </div>
                </div>
            }
          </div>

          {proximo && (
            <div className="card" style={{padding:'16px 22px'}}>
              <p style={{margin:'0 0 8px', fontSize:'14px', color:'var(--text-muted)'}}>
                Próximo hito: {proximo.label}
              </p>
              <div className="progress-bar-bg">
                <div className="progress-bar-fill" style={{width:`${Math.min(100,(dias/proximo.meta*100))}%`}} />
              </div>
              <p style={{margin:'6px 0 0', fontSize:'12px', color:'var(--text-muted)', textAlign:'right'}}>
                {proximo.meta - dias} días restantes
              </p>
            </div>
          )}

          <div className="card" style={{padding:'16px 22px'}}>
            <div style={{display:'flex', alignItems:'center', gap:'14px'}}>
              <div style={{
                width:'52px', height:'52px', borderRadius:'50%',
                background:'linear-gradient(135deg,var(--primary),var(--accent))',
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize:'22px', color:'white', fontWeight:'bold', flexShrink:0
              }}>
                {(perfil?.nombre || user.email || '?')[0].toUpperCase()}
              </div>
              <div>
                <div style={{fontWeight:700, fontSize:'17px'}}>{perfil?.nombre || 'Miembro AA'}</div>
                <div style={{color:'var(--text-muted)', fontSize:'13px'}}>{user.email}</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── PantallaPasos ─────────────────────────────────────────────────────────
    function PantallaPasos({ user }) {
      const [completados, setCompletados] = useState([]);
      const [detalle, setDetalle]         = useState(null);
      const [nota, setNota]               = useState('');
      const [guardando, setGuardando]     = useState(false);
      const [cargando, setCargando]       = useState(true);

      useEffect(() => {
        supabase.from('pasos_usuario').select('paso').eq('user_id', user.id)
          .then(({ data }) => { if(data) setCompletados(data.map(r=>r.paso)); setCargando(false); });
      }, [user.id]);

      const abrirPaso = async (paso) => {
        const { data } = await supabase.from('notas_pasos').select('nota').eq('user_id', user.id).eq('paso', paso.n).maybeSingle();
        setNota(data?.nota || '');
        setDetalle(paso);
      };

      const toggleCompletar = async (n) => {
        if (completados.includes(n)) {
          await supabase.from('pasos_usuario').delete().eq('user_id', user.id).eq('paso', n);
          setCompletados(c => c.filter(x=>x!==n));
        } else {
          await supabase.from('pasos_usuario').upsert({ user_id: user.id, paso: n });
          setCompletados(c => [...c, n]);
        }
      };

      const guardarNota = async () => {
        if (!detalle) return;
        setGuardando(true);
        await supabase.from('notas_pasos').upsert({ user_id: user.id, paso: detalle.n, nota });
        setGuardando(false);
      };

      return (
        <div>
          <div className="card" style={{padding:'14px 18px', marginBottom:'14px'}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
              <span style={{fontWeight:700}}>Mi progreso</span>
              <span style={{color:'var(--primary)', fontWeight:700, fontSize:'18px'}}>{completados.length} / 12</span>
            </div>
            <div className="progress-bar-bg" style={{marginTop:'8px'}}>
              <div className="progress-bar-fill" style={{width:`${completados.length/12*100}%`}} />
            </div>
          </div>

          {cargando && <div className="spinner" />}

          {!cargando && PASOS.map(p => (
            <div key={p.n} className="step-item" onClick={()=>abrirPaso(p)}>
              <div className={`step-number ${completados.includes(p.n)?'completed':''}`}>
                {completados.includes(p.n) ? '✓' : p.n}
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:600, fontSize:'15px'}}>{p.titulo}</div>
                <div style={{color:'var(--text-muted)', fontSize:'13px', marginTop:'2px'}}>{p.texto.slice(0,65)}…</div>
              </div>
              <span style={{color:'var(--text-muted)', fontSize:'20px'}}>›</span>
            </div>
          ))}

          {detalle && (
            <div className="overlay" onClick={()=>setDetalle(null)}>
              <div className="popup-card" onClick={e=>e.stopPropagation()}>
                <h3 style={{margin:'0 0 8px'}}>Paso {detalle.n}: {detalle.titulo}</h3>
                <p style={{color:'var(--text-secondary)', fontSize:'15px', lineHeight:1.65}}>{detalle.texto}</p>
                <hr className="divider" />
                <p style={{fontWeight:700, margin:'0 0 8px'}}>📝 Mis reflexiones</p>
                <textarea className="input-field" value={nota} onChange={e=>setNota(e.target.value)}
                  placeholder="Escribe aquí tus reflexiones sobre este paso..." style={{minHeight:'100px'}} />
                <div style={{display:'flex', gap:'8px', marginTop:'4px'}}>
                  <button className={`btn btn-sm ${completados.includes(detalle.n)?'btn-warning':'btn-success'}`} style={{flex:1}}
                    onClick={()=>toggleCompletar(detalle.n)}>
                    {completados.includes(detalle.n) ? '↩️ Marcar pendiente' : '✅ Completar'}
                  </button>
                  <button className="btn btn-sm btn-primary" style={{flex:1}} onClick={guardarNota} disabled={guardando}>
                    {guardando ? '...' : '💾 Guardar'}
                  </button>
                </div>
                <button className="btn btn-sm btn-secondary btn-block" style={{marginTop:'8px'}} onClick={()=>setDetalle(null)}>
                  Cerrar
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── PantallaEventos ───────────────────────────────────────────────────────
    function PantallaEventos({ user, perfil }) {
      const [eventos, setEventos]   = useState([]);
      const [cargando, setCargando] = useState(true);
      const [showForm, setShowForm] = useState(false);
      const [form, setForm] = useState({ titulo:'', descripcion:'', fecha:'', lugar:'' });
      const [guardando, setGuardando] = useState(false);

      const cargar = useCallback(async () => {
        setCargando(true);
        const { data } = await supabase.from('eventos').select('*').order('fecha', { ascending:true });
        setEventos(data || []);
        setCargando(false);
      }, []);

      useEffect(() => { cargar(); }, [cargar]);

      const crearEvento = async () => {
        if (!form.titulo || !form.fecha) return;
        setGuardando(true);
        await supabase.from('eventos').insert({
          ...form, creador_id: user.id, creador_nombre: perfil?.nombre || 'Miembro'
        });
        setForm({ titulo:'', descripcion:'', fecha:'', lugar:'' });
        setShowForm(false);
        await cargar();
        setGuardando(false);
      };

      const hoy = new Date().toISOString().split('T')[0];

      return (
        <div>
          <button className="btn btn-primary btn-block" style={{marginBottom:'14px'}}
            onClick={()=>setShowForm(s=>!s)}>
            {showForm ? '✕ Cancelar' : '+ Agregar evento'}
          </button>

          {showForm && (
            <div className="card">
              <p style={{fontWeight:700, margin:'0 0 12px'}}>📅 Nuevo Evento</p>
              <input className="input-field" placeholder="Título *" value={form.titulo} onChange={e=>setForm(f=>({...f,titulo:e.target.value}))} />
              <input className="input-field" placeholder="Lugar / dirección" value={form.lugar} onChange={e=>setForm(f=>({...f,lugar:e.target.value}))} />
              <input className="input-field" type="datetime-local" value={form.fecha} min={hoy+'T00:00'} onChange={e=>setForm(f=>({...f,fecha:e.target.value}))} />
              <textarea className="input-field" placeholder="Descripción (opcional)" value={form.descripcion} onChange={e=>setForm(f=>({...f,descripcion:e.target.value}))} />
              <button className="btn btn-success btn-block" onClick={crearEvento} disabled={guardando}>
                {guardando ? '⏳ Guardando...' : '✅ Publicar evento'}
              </button>
            </div>
          )}

          {cargando && <div className="spinner" />}

          {!cargando && eventos.length === 0 && (
            <div className="card" style={{textAlign:'center', color:'var(--text-muted)'}}>
              <p style={{fontSize:'42px', margin:'0 0 8px'}}>📅</p>
              <p>No hay eventos próximos.</p>
            </div>
          )}

          {!cargando && eventos.map(ev => {
            const pasado = ev.fecha && new Date(ev.fecha) < new Date();
            return (
              <div key={ev.id} className="card" style={{opacity:pasado?0.6:1}}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
                  <span style={{fontWeight:700, fontSize:'16px'}}>{ev.titulo}</span>
                  {pasado && <span className="badge badge-rechazado">Pasado</span>}
                </div>
                {ev.lugar      && <p style={{margin:'6px 0 0', color:'var(--text-muted)', fontSize:'14px'}}>📍 {ev.lugar}</p>}
                {ev.fecha      && <p style={{margin:'4px 0 0', color:'var(--text-muted)', fontSize:'14px'}}>🕐 {fmtFecha(ev.fecha)}</p>}
                {ev.descripcion && <p style={{margin:'8px 0 0', fontSize:'14px', color:'var(--text-secondary)'}}>{ev.descripcion}</p>}
                <p style={{margin:'8px 0 0', fontSize:'12px', color:'var(--text-muted)'}}>Publicado por: {ev.creador_nombre}</p>
              </div>
            );
          })}
        </div>
      );
    }

    // ── PantallaBiblioteca ────────────────────────────────────────────────────
    function PantallaBiblioteca() {
      const [tab, setTab] = useState('oraciones');

      const oraciones = [
        { titulo:'Oración de la Serenidad',  texto:'Dios, concédeme la serenidad para aceptar las cosas que no puedo cambiar, valor para cambiar las que sí puedo, y sabiduría para reconocer la diferencia.' },
        { titulo:'Oración de la Mañana',     texto:'Señor, otro día me concedes. Gracias por la sobriedad de hoy. Guíame en cada pensamiento, palabra y acción.' },
        { titulo:'Oración de la Noche',      texto:'Al cerrar este día, me entrego a Tu cuidado. Si me equivoqué, muéstrame cómo corregirlo. Te doy gracias por este día sobrio.' },
        { titulo:'Tercer Paso',              texto:'Dios, me ofrezco a Ti para que me construyas y hagas conmigo lo que Tú quieras. Quita de mí cada dificultad. Dame Tu poder al ir de aquí en adelante.' },
        { titulo:'Séptimo Paso',             texto:'Señor, estoy dispuesto/a a que tengas todo de mí — lo bueno y lo malo. Te pido que me libres de cada defecto de carácter que me impida ser útil a Ti y a mis semejantes.' },
        { titulo:'Oración de San Francisco', texto:'Señor, hazme un instrumento de Tu paz. Donde haya odio, siembre amor. Donde haya ofensa, perdón. Donde haya duda, fe. Donde haya desesperación, esperanza.' },
      ];

      const lecturas = [
        { titulo:'Las Doce Tradiciones',          desc:'Los principios que guían las relaciones entre grupos de AA y con el mundo exterior.' },
        { titulo:'Cómo lo ve Bill',               desc:'Reflexiones del cofundador sobre la espiritualidad y el programa de recuperación.' },
        { titulo:'Vivir en Sobriedad',            desc:'Técnicas y sugerencias prácticas para la vida cotidiana en recuperación.' },
        { titulo:'El Dr. Bob y los Buenos Veteranos', desc:'Historia del cofundador de AA y los primeros miembros de Akron, Ohio.' },
        { titulo:'Doce Pasos y Doce Tradiciones', desc:'Profundización en cada uno de los pasos y tradiciones del programa.' },
        { titulo:'Alcohólicos Anónimos (Libro Grande)', desc:'El texto fundamental del programa de AA, con historias de recuperación.' },
      ];

      return (
        <div>
          <div style={{display:'flex', gap:'8px', marginBottom:'14px'}}>
            <button className={`btn btn-sm ${tab==='oraciones'?'btn-primary':'btn-secondary'}`} style={{flex:1}} onClick={()=>setTab('oraciones')}>🙏 Oraciones</button>
            <button className={`btn btn-sm ${tab==='lecturas'?'btn-primary':'btn-secondary'}`}  style={{flex:1}} onClick={()=>setTab('lecturas')}>📚 Lecturas</button>
          </div>

          {tab === 'oraciones' && oraciones.map((o,i) => (
            <div key={i} className="card">
              <p style={{fontWeight:700, margin:'0 0 10px', fontSize:'16px'}}>🙏 {o.titulo}</p>
              <p style={{margin:0, lineHeight:1.75, color:'var(--text-secondary)', fontSize:'15px', fontStyle:'italic'}}>"{o.texto}"</p>
            </div>
          ))}

          {tab === 'lecturas' && lecturas.map((l,i) => (
            <div key={i} className="card">
              <p style={{fontWeight:700, margin:'0 0 6px', fontSize:'16px'}}>📖 {l.titulo}</p>
              <p style={{margin:0, color:'var(--text-muted)', fontSize:'14px', lineHeight:1.5}}>{l.desc}</p>
            </div>
          ))}
        </div>
      );
    }

    // ── PantallaPerfil ────────────────────────────────────────────────────────
    function PantallaPerfil({ user, perfil, setPerfil, theme, setTheme, cerrarSesion }) {
      const [editando, setEditando]   = useState(false);
      const [nombre, setNombre]       = useState(perfil?.nombre || '');
      const [guardando, setGuardando] = useState(false);

      const guardar = async () => {
        setGuardando(true);
        await supabase.from('perfiles').upsert({ id: user.id, nombre });
        setPerfil(p => ({ ...p, nombre }));
        setEditando(false);
        setGuardando(false);
      };

      const cambiarTema = (t) => {
        setTheme(t);
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
      };

      const dias = calcDias(perfil?.fecha_sobriedadad);

      return (
        <div>
          <div className="card" style={{textAlign:'center'}}>
            <div style={{
              width:'76px', height:'76px', borderRadius:'50%',
              background:'linear-gradient(135deg,var(--primary),var(--accent))',
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:'30px', color:'white', fontWeight:'bold', margin:'0 auto 14px'
            }}>
              {(perfil?.nombre || user.email || '?')[0].toUpperCase()}
            </div>
            <h2 style={{margin:'0 0 4px'}}>{perfil?.nombre || 'Miembro AA'}</h2>
            <p style={{color:'var(--text-muted)', fontSize:'14px', margin:'0 0 14px'}}>{user.email}</p>

            {!editando
              ? <button className="btn btn-sm btn-secondary" onClick={()=>setEditando(true)}>✏️ Editar nombre</button>
              : <div>
                  <input className="input-field" value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="Tu nombre" />
                  <div style={{display:'flex', gap:'8px'}}>
                    <button className="btn btn-sm btn-success" style={{flex:1}} onClick={guardar} disabled={guardando}>{guardando?'...':'✅ Guardar'}</button>
                    <button className="btn btn-sm btn-secondary" style={{flex:1}} onClick={()=>setEditando(false)}>Cancelar</button>
                  </div>
                </div>
            }
          </div>

          <div className="card">
            <p style={{fontWeight:700, margin:'0 0 14px'}}>📊 Estadísticas</p>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px'}}>
              {[
                {label:'Días sobrio',  valor:dias},
                {label:'Semanas',      valor:Math.floor(dias/7)},
                {label:'Meses',        valor:Math.floor(dias/30)},
                {label:'Años',         valor:Math.floor(dias/365)},
              ].map(s => (
                <div key={s.label} style={{
                  background:'var(--input-bg)', borderRadius:'14px',
                  padding:'16px', textAlign:'center'
                }}>
                  <div style={{fontSize:'30px', fontWeight:'bold', color:'var(--primary)'}}>{s.valor}</div>
                  <div style={{fontSize:'12px', color:'var(--text-muted)', marginTop:'4px'}}>{s.label}</div>
                </div>
              ))}
            </div>
          </div>

          <div className="card">
            <p style={{fontWeight:700, margin:'0 0 12px'}}>🎨 Tema visual</p>
            <div style={{display:'flex', gap:'8px', flexWrap:'wrap'}}>
              {[['dark','🌙 Oscuro'],['light','☀️ Claro'],['minimal','✦ Minimal']].map(([t,label]) => (
                <button key={t} className={`theme-btn ${theme===t?'active':''}`} onClick={()=>cambiarTema(t)}>{label}</button>
              ))}
            </div>
          </div>

          <button className="btn btn-danger btn-block" style={{marginTop:'4px'}} onClick={cerrarSesion}>
            🚪 Cerrar sesión
          </button>
        </div>
      );
    }

    // ── App ───────────────────────────────────────────────────────────────────
    function App() {
      const [user, setUser]       = useState(null);
      const [perfil, setPerfil]   = useState(null);
      const [loading, setLoading] = useState(true);
      const [tab, setTab]         = useState('inicio');
      const [theme, setTheme]     = useState('dark');

      useEffect(() => {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        setTheme(savedTheme);
        document.documentElement.setAttribute('data-theme', savedTheme);

        if ('serviceWorker' in navigator) {
          // Desregistrar cualquier SW viejo y limpiar cachés antes de registrar el nuevo
          navigator.serviceWorker.getRegistrations().then(regs => {
            regs.forEach(r => r.unregister());
          });
          caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
          // Pequeño delay para que limpie antes de registrar
          setTimeout(() => {
            navigator.serviceWorker.register('./sw.js').catch(()=>{});
          }, 500);
        }

        if (!supabase) { setLoading(false); return; }

        supabase.auth.getSession().then(async ({ data: { session } }) => {
          const u = session?.user || null;
          setUser(u);
          if (u) {
            const { data } = await supabase.from('perfiles').select('*').eq('id', u.id).maybeSingle();
            setPerfil(data || {});
          }
          setLoading(false);
        });

        const { data: { subscription } } = supabase.auth.onAuthStateChange(async (_, session) => {
          const u = session?.user || null;
          setUser(u);
          if (u) {
            const { data } = await supabase.from('perfiles').select('*').eq('id', u.id).maybeSingle();
            setPerfil(data || {});
          } else {
            setPerfil(null);
          }
        });

        return () => subscription?.unsubscribe();
      }, []);

      const cerrarSesion = async () => {
        await supabase.auth.signOut();
        setUser(null); setPerfil(null); setTab('inicio');
      };

      if (loading) {
        return (
          <div className="loading-screen">
            <div className="logo-aa">AA</div>
            <p style={{opacity:0.7}}>Cargando Nueva Vida…</p>
          </div>
        );
      }

      if (!supabase) {
        return (
          <div className="loading-screen">
            <div className="logo-aa">AA</div>
            <p style={{color:'#f87171', textAlign:'center', maxWidth:'280px'}}>
              Error de configuración. Por favor contacta al administrador.
            </p>
          </div>
        );
      }

      if (!user) return <AuthScreen />;

      const TABS = [
        {id:'inicio',     icon:'🏠', label:'Inicio'},
        {id:'pasos',      icon:'🪜', label:'12 Pasos'},
        {id:'eventos',    icon:'📅', label:'Eventos'},
        {id:'biblioteca', icon:'📚', label:'Biblioteca'},
        {id:'perfil',     icon:'👤', label:'Perfil'},
      ];

      return (
        <div className="app-container">
          <div className="header">
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
              <h1 style={{margin:0, fontSize:'20px'}}>Nueva Vida AA</h1>
              <span style={{color:'var(--text-muted)', fontSize:'14px', fontWeight:500}}>
                {TABS.find(t=>t.id===tab)?.label}
              </span>
            </div>
          </div>

          <div className="main-content">
            {tab==='inicio'     && <PantallaInicio     user={user} perfil={perfil} setPerfil={setPerfil} />}
            {tab==='pasos'      && <PantallaPasos       user={user} />}
            {tab==='eventos'    && <PantallaEventos     user={user} perfil={perfil} />}
            {tab==='biblioteca' && <PantallaBiblioteca />}
            {tab==='perfil'     && <PantallaPerfil      user={user} perfil={perfil} setPerfil={setPerfil}
                                      theme={theme} setTheme={setTheme} cerrarSesion={cerrarSesion} />}
          </div>

          <div className="navbar">
            {TABS.map(t => (
              <div key={t.id} className={`nav-item ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>
                <div className="nav-icon">{t.icon}</div>
                {t.label}
              </div>
            ))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
