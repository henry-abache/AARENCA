function calcularDias(fechaStr) {
  if (!fechaStr) return 0;
  const d = Math.floor((new Date() - new Date(fechaStr)) / (1000 * 60 * 60 * 24));
  return d < 0 ? 0 : d;
}
function formatFecha(dateStr) {
  if (!dateStr) return "";
  const [y, m, d] = dateStr.split("-");
  return `${d}/${m}/${y}`;
}
function formatHora(timeStr) {
  if (!timeStr) return "";
  const [h, m] = timeStr.split(":");
  const hh = parseInt(h);
  const ampm = hh >= 12 ? "PM" : "AM";
  const h12 = hh % 12 || 12;
  return `${h12}:${m} ${ampm}`;
}
function tiempoDesde(ts) {
  if (!ts) return "";
  const diff = Date.now() - new Date(ts).getTime();
  const min = Math.floor(diff / 60000);
  if (min < 1) return "Ahora";
  if (min < 60) return `Hace ${min} min`;
  const h = Math.floor(min / 60);
  if (h < 24) return `Hace ${h} h`;
  return `Hace ${Math.floor(h/24)} días`;
}

          alert("⚠️ ERROR DE SEGURIDAD (RLS) en Supabase\n\n" +
                "La tabla 'usuarios' tiene RLS activado pero sin políticas correctas.\n\n" +
                "SOLUCIÓN RÁPIDA:\n" +
                "1. Abre https://supabase.co → Tu Proyecto → SQL Editor\n" +
                "2. Ejecuta el código de SOLUCIONAR_RLS.md (Opción 1)\n\n" +
                "Eso deshabilita RLS y la app funcionará.");
        } else if (error.message.includes('duplicate')) {
          alert("❌ Este usuario ya existe. Intenta con otro nombre o ID.");
        } else {
          alert("❌ Error al registrar:\n\n" + error.message + "\n\nSi es sobre RLS, ve a SOLUCIONAR_RLS.md");

        const u = buildUser(nuevoUsr);
        setUser(u);
        setMisAdicciones(adiccionesConfig);
        localStorage.setItem("nuevavida_session", JSON.stringify(u));

    } catch(err) { alert("Error de conexión: " + err.message); }

  async function agregarSedeNueva() {
    if (!nuevaSedeNombre.trim()) return alert("Escribe el nombre de la sede.");
    const sid = nuevaSedeNombre.trim().toLowerCase().replace(/\s+/g, "-").replace(/[^a-z0-9-]/g, "");
    if (gruposDinamicos.find(g => g.id === sid)) return alert("Ya existe una sede con ese nombre.");
    try {
      const { error } = await supabase.from('sedes').insert([{ id: sid, nombre: nuevaSedeNombre.trim().toUpperCase() }]);
      if (!error) {
        const nueva = { id: sid, nombre: nuevaSedeNombre.trim().toUpperCase() };
        setGruposDinamicos(prev => [...prev, nueva]);
        setNuevaSedeNombre(""); setNuevaSedeId("");
        setMostrarAgregarSede(false);
        alert(`✅ Sede "${nueva.nombre}" creada correctamente.`);
        cargarDatos();
      } else {
        // Si la tabla no existe, agregar solo localmente
        const nueva = { id: sid, nombre: nuevaSedeNombre.trim().toUpperCase() };
        setGruposDinamicos(prev => [...prev, nueva]);
        setNuevaSedeNombre(""); setNuevaSedeId("");
        setMostrarAgregarSede(false);
        alert(`✅ Sede "${nueva.nombre}" creada (solo en esta sesión, requiere tabla 'sedes' en Supabase para persistir).`);

    } catch(e) { alert("Error: " + e.message); }
  }

    if (sedeDestinoMuda === usuarioAMudar.grupo_id) return alert("El usuario ya pertenece a esa sede.");

    try {
      const sedeDestObj = gruposDinamicos.find(g => g.id === sedeDestinoMuda);
      // Verificar si hay admin en la sede destino
      const { data: adminDestino } = await supabase.from('usuarios')
        .select('username').eq('grupo_id', sedeDestinoMuda)
        .in('rol', ['admin_principal', 'admin_adjunto']).limit(1);
      
      let nuevoRol = usuarioAMudar.rol === 'admin_principal' ? 'basico' : usuarioAMudar.rol === 'admin_adjunto' ? 'basico' : usuarioAMudar.rol;

  async function subirMaterial() {
    if (!nuevoTitulo) return alert("Escribe un título para el material.");
    let linkFinal = nuevoLink;
    
    if (modoSubida === 'archivo') {
      if (!archivoLocal) return alert("Selecciona un archivo.");
      setSubiendoArchivo(true);
      try {
        const nombreArchivo = `${user.grupoId}/${Date.now()}_${archivoLocal.name.replace(/\s+/g, '_')}`;
        const { error: upError, data: upData } = await supabase.storage
          .from('biblioteca-archivos')
          .upload(nombreArchivo, archivoLocal, { cacheControl: '3600', upsert: false });
        if (upError) {
          setSubiendoArchivo(false);
          return alert("Error al subir archivo: " + upError.message + "\n\nVerifica que el bucket 'biblioteca-archivos' existe en Supabase Storage con acceso público.");
        }
        const { data: urlData } = supabase.storage.from('biblioteca-archivos').getPublicUrl(nombreArchivo);
        linkFinal = urlData.publicUrl;
      } catch(err) {
        setSubiendoArchivo(false);
        return alert("Error al subir archivo: " + err.message);
      }
    } else {
      if (!nuevoLink) return alert("Pega un enlace válido.");
      linkFinal = nuevoLink;
    }

    const { error } = await supabase.from('biblioteca').insert([{
      grupo_id: user.grupoId, titulo: nuevoTitulo, tipo: nuevoTipo, link: linkFinal
    }]);
    setSubiendoArchivo(false);
    if (!error) {
      setNuevoTitulo(""); setNuevoLink(""); setArchivoLocal(null); setModoSubida('enlace');
      cargarDatos();
      alert("✅ Publicado en la biblioteca.");
    } else alert("Error: " + error.message);
  }

    if (!evTitulo || !evFecha || !evHora) return alert("Título, fecha y hora son obligatorios.");
    setGuardandoEvento(true);
    const grupoSel = GRUPOS.find(g => g.id === user.grupoId);
    const lugar = evDireccion.trim() || evLugar.trim() || grupoSel.nombre;
    const nuevoEv = {
      grupo_id: user.grupoId, titulo: evTitulo.trim(), descripcion: evDesc.trim(),
      fecha: evFecha, hora: evHora, lugar,
      direccion: evDireccion.trim(), imagen_url: evImagenUrl.trim(),
      creado_por: user.username, creado_por_nombre: user.nombreReal
    };
    const { data: evInserted, error } = await supabase.from('eventos').insert([nuevoEv]).select().single();
    if (error) { alert("Error al crear evento: " + error.message); setGuardandoEvento(false); return; }

    const { data: miembros } = await supabase.from('usuarios').select('username').eq('grupo_id', user.grupoId).eq('estado', 'aprobado');
    if (miembros && miembros.length > 0) {
      const notifs = miembros.map(m => ({
        grupo_id: user.grupoId, username_destinatario: m.username,
        tipo: 'evento', titulo: `📅 Nuevo Evento: ${evTitulo.trim()}`,
        mensaje: `${user.nombreReal} agregó un evento para el ${formatFecha(evFecha)} a las ${formatHora(evHora)} en ${lugar}.`,
        evento_id: evInserted.id, leida: false
      }));
      await supabase.from('notificaciones').insert(notifs);
    }
    setEvTitulo(""); setEvDesc(""); setEvFecha(""); setEvHora(""); setEvLugar(""); setEvDireccion(""); setEvImagenUrl("");
    setGuardandoEvento(false);
    alert("✅ Evento creado.");
    cargarDatos();
  }

  function directorioAgrupado() {
    const grupos = {};
    gruposDinamicos.forEach(g => { grupos[g.id] = { nombre: g.nombre, admins: [], miembros: [] }; });
    directorio.forEach(d => {
      if (!grupos[d.grupo_id]) grupos[d.grupo_id] = { nombre: d.grupo_nombre || d.grupo_id, admins: [], miembros: [] };
      if (d.rol === 'admin_principal' || d.rol === 'admin_adjunto') grupos[d.grupo_id].admins.push(d);
      else grupos[d.grupo_id].miembros.push(d);
    });
    return grupos;
  }

              if (dias < 7) {

                rangoLabel = "Semana 1";
                rangoActual = dias;
                rangoTotal = 7;
                porcentaje = Math.max((dias / 7) * 100, 3);

                rangoLabel = `${semanas} semana${semanas > 1 ? 's' : ''}`;
                rangoActual = dias % 7;
                rangoTotal = 7;
                porcentaje = Math.max((rangoActual / rangoTotal) * 100, 5);
                colorBarra = "linear-gradient(90deg, #f97316, #eab308)";
              } else if (dias < 365) {
                // Rango: meses (1-12)

                rangoLabel = `${meses} mes${meses > 1 ? 'es' : ''}`;
                rangoActual = dias % 30;
                rangoTotal = 30;
                porcentaje = Math.max((rangoActual / rangoTotal) * 100, 5);

                const anios = Math.floor(dias / 365);
                const diasEnAnio = dias % 365;
                rangoLabel = `${anios} año${anios > 1 ? 's' : ''}`;
                rangoActual = diasEnAnio;
                rangoTotal = 365;
                porcentaje = Math.max((rangoActual / rangoTotal) * 100, 5);

                          <div style={{display: 'flex', gap: '6px', flexShrink: 0}}>
                            <a href={b.link} target="_blank" rel="noreferrer" className="btn btn-sm">Abrir</a>
                            {esCualquierAdmin && <button className="btn btn-sm btn-danger" onClick={() => eliminarMaterial(b.id)}>🗑️</button>}
                          </div>
                        </div>
                      ))}
                      <div style={{borderLeft: '2px solid var(--border)', borderRight: '2px solid var(--border)', borderBottom: '2px solid var(--border)', borderRadius: '0 0 14px 14px', height: '6px'}}></div>
                    </div>
                  )}
                </>
              );
            })()}
          </div>
        )}

        {/* ==================== COMPARTIR ==================== */}
        {activeTab === "compartir" && (
          <div>
            <h3 className="section-title">📲 Compartir App</h3>
            <div className="share-card" style={{margin: '0 0 20px', padding: '28px'}}>
              <div style={{fontSize: '60px', marginBottom: '12px'}}>🌟</div>
              <h3 style={{color: '#60a5fa', margin: '0 0 10px'}}>Nueva Vida AA</h3>
              <p style={{color: 'var(--text-secondary)', fontSize: '16px', margin: '0 0 20px'}}>
                ¿Conoces a alguien que esté luchando contra una adicción? Comparte esta app y ayúdales a dar el primer paso.
              </p>
              <button className="btn" style={{marginBottom: '12px'}} onClick={compartirApp}>
                🔗 Compartir ahora
              </button>
            </div>
            <div className="card">
              <h4 style={{marginTop: 0, color: 'var(--text-main)'}}>¿Cómo funciona el registro?</h4>
              <p style={{color: 'var(--text-muted)', fontSize: '15px'}}>1. La persona abre el enlace de la app.</p>
              <p style={{color: 'var(--text-muted)', fontSize: '15px'}}>2. Se registra con su nombre y selecciona su sede.</p>
              <p style={{color: 'var(--text-muted)', fontSize: '15px'}}>3. El administrador de la sede aprueba su solicitud.</p>
              <p style={{color: 'var(--text-muted)', fontSize: '15px'}}>4. ¡Ya puede usar todas las funciones!</p>
            </div>
            <div className="card" style={{borderColor: 'var(--warning)'}}>
              <h4 style={{marginTop: 0, color: 'var(--warning)'}}>💡 Instalar como App</h4>
              <p style={{color: 'var(--text-muted)', fontSize: '15px'}}>
                <strong>Android:</strong> Al abrir en Chrome, toca el menú (⋮) y selecciona "Agregar a pantalla de inicio".
              </p>
              <p style={{color: 'var(--text-muted)', fontSize: '15px', marginBottom: 0}}>
                <strong>iPhone:</strong> Al abrir en Safari, toca el ícono de compartir (📤) y selecciona "Agregar a pantalla de inicio".
              </p>
            </div>
          </div>
        )}

        {/* ==================== ADMIN ==================== */}
        {activeTab === "admin" && esCualquierAdmin && (
          <div>
            <h3 className="section-title">⚙️ Control de Sede</h3>

            {/* AGREGAR USUARIO DIRECTAMENTE */}
            <div className="card" style={{borderColor: 'var(--accent)'}}>
              <h4 style={{marginTop: 0, color: 'var(--accent)'}}>➕ Agregar Usuario a una Sede</h4>
              <p style={{fontSize: '14px', color: 'var(--text-muted)', marginBottom: '12px'}}>Agrega un usuario directamente (sin esperar solicitud). Puede ser en cualquier sede.</p>
              {!mostrarAgregarUsuario ? (
                <button className="btn btn-success" onClick={() => setMostrarAgregarUsuario(true)}>👤 Agregar Usuario</button>
              ) : (
                <div>
                  <label>Nombre o alias del usuario</label>
                  <input type="text" className="input-field" placeholder="Ej: María González" value={nuevoUsuNombre} onChange={e => setNuevoUsuNombre(e.target.value)} />
                  <label>Teléfono (opcional)</label>
                  <input type="tel" className="input-field" placeholder="Ej: +56912345678" value={nuevoUsuTelefono} onChange={e => setNuevoUsuTelefono(e.target.value)} />
                  <label>Sede a la que pertenece</label>
                  <select className="select-field" value={nuevoUsuSedeId} onChange={e => setNuevoUsuSedeId(e.target.value)}>
                    <option value="">— Seleccionar Sede —</option>
                    {gruposDinamicos.map(g => <option key={g.id} value={g.id}>{g.nombre}</option>)}
                  </select>
                  <div style={{display: 'flex', gap: '10px'}}>
                    <button className="btn btn-success" style={{flex: 1}} onClick={agregarUsuarioDirecto} disabled={agregandoUsuario}>
                      {agregandoUsuario ? '⏳ Agregando...' : '✅ Confirmar'}
                    </button>
                    <button className="btn btn-secondary" style={{flex: 1}} onClick={() => { setMostrarAgregarUsuario(false); setNuevoUsuNombre(""); setNuevoUsuTelefono(""); setNuevoUsuSedeId(""); }}>
                      Cancelar
                    </button>
                  </div>
                </div>
              )}
            </div>

            {/* AGREGAR SEDE NUEVA */}
            <div className="card" style={{borderColor: 'var(--primary)'}}>
              <h4 style={{marginTop: 0, color: 'var(--primary)'}}>🏢 Agregar Nueva Sede</h4>
              {!mostrarAgregarSede ? (
                <button className="btn" onClick={() => setMostrarAgregarSede(true)}>🏢 Crear Nueva Sede</button>
              ) : (
                <div>
                  <label>Nombre de la nueva sede</label>
                  <input type="text" className="input-field" placeholder="Ej: GRUPO NUEVO AMANECER" value={nuevaSedeNombre} onChange={e => setNuevaSedeNombre(e.target.value)} />
                  <p style={{fontSize: '13px', color: 'var(--text-muted)', marginBottom: '12px'}}>
                    ID automático: <code>{nuevaSedeNombre.trim().toLowerCase().replace(/\s+/g, "-").replace(/[^a-z0-9-]/g, "") || "..."}</code>
                  </p>
                  <div style={{display: 'flex', gap: '10px'}}>
                    <button className="btn btn-success" style={{flex: 1}} onClick={agregarSedeNueva}>✅ Crear Sede</button>
                    <button className="btn btn-secondary" style={{flex: 1}} onClick={() => { setMostrarAgregarSede(false); setNuevaSedeNombre(""); }}>Cancelar</button>
                  </div>
                </div>
              )}
              <div style={{marginTop: '14px'}}>
                <p style={{fontSize: '13px', color: 'var(--text-muted)', margin: '0'}}>Sedes actuales: {gruposDinamicos.map(g => g.nombre).join(' · ')}</p>
              </div>
            </div>

            {/* MUDAR USUARIO DE SEDE */}
            <div className="card" style={{borderColor: 'var(--warning)'}}>
              <h4 style={{marginTop: 0, color: 'var(--warning)'}}>🔀 Mudar Usuario de Sede</h4>
              <p style={{fontSize: '14px', color: 'var(--text-muted)', marginBottom: '12px'}}>Traslada un usuario de tu sede a otra sede.</p>
              {!mostrarMudarUsuario ? (
                <button className="btn btn-warning" onClick={() => setMostrarMudarUsuario(true)}>🔀 Gestionar Mudanzas</button>
              ) : (
                <div>
                  <label>Seleccionar usuario a trasladar</label>
                  <select className="select-field" value={usuarioAMudar?.username || ""} onChange={e => {
                    const m = listaMiembrosSede.find(u => u.username === e.target.value);
                    setUsuarioAMudar(m || null); setSedeDestinoMuda("");
                  }}>
                    <option value="">— Seleccionar Usuario —</option>
                    {listaMiembrosSede.filter(m => m.username !== user.username).map(m => (
                      <option key={m.username} value={m.username}>{m.nombre_real}</option>
                    ))}
                  </select>
                  {usuarioAMudar && (
                    <div>
                      <label>Sede de destino</label>
                      <select className="select-field" value={sedeDestinoMuda} onChange={e => setSedeDestinoMuda(e.target.value)}>
                        <option value="">— Seleccionar Sede Destino —</option>
                        {gruposDinamicos.filter(g => g.id !== user.grupoId).map(g => (
                          <option key={g.id} value={g.id}>{g.nombre}</option>
                        ))}
                      </select>
                    </div>
                  )}
                  <div style={{display: 'flex', gap: '10px', marginTop: '10px'}}>
                    <button className="btn btn-warning" style={{flex: 1}} onClick={ejecutarMudanzaAdmin} disabled={!usuarioAMudar || !sedeDestinoMuda || procesandoMuda}>
                      {procesandoMuda ? '⏳...' : '🔀 Trasladar'}
                    </button>
                    <button className="btn btn-secondary" style={{flex: 1}} onClick={() => { setMostrarMudarUsuario(false); setUsuarioAMudar(null); setSedeDestinoMuda(""); }}>Cancelar</button>
                  </div>
                </div>
              )}
            </div>

            {/* SOLICITUDES DE CAMBIO DE SEDE */}
            {solicitudesCambioSede.length > 0 && (
              <div className="card" style={{borderColor: 'var(--primary)'}}>
                <h4 style={{marginTop: 0, color: 'var(--primary)'}}>🏠 Solicitudes de Cambio de Sede ({solicitudesCambioSede.length})</h4>
                {solicitudesCambioSede.map(sol => (
                  <div key={sol.id} style={{background: 'var(--input-bg)', padding: '12px', borderRadius: '12px', marginBottom: '10px', border: '1px solid var(--border)'}}>
                    <div style={{fontWeight: 'bold'}}>{sol.nombre_real}</div>
                    <div style={{fontSize: '13px', color: 'var(--text-muted)'}}>
                      {sol.grupo_nombre_origen} → {sol.grupo_nombre_destino}
                    </div>
                    <div style={{fontSize: '12px', color: 'var(--text-muted)', marginTop: '4px'}}>
                      {sol.estado === 'pendiente_origen' ? '⏳ Esperando aprobación de sede actual' : '⏳ Esperando aprobación de sede destino'}
                    </div>
                    {sol.sin_admin_destino && (
                      <div style={{fontSize: '12px', color: 'var(--warning)', marginTop: '4px'}}>⚠️ La sede destino no tiene administrador</div>
                    )}
                    <div style={{display: 'flex', gap: '8px', marginTop: '10px'}}>
                      {sol.estado === 'pendiente_origen' && sol.grupo_id_origen === user.grupoId && (
                        <>
                          <button className="btn btn-success btn-sm" onClick={() => aprobarCambioSedeOrigen(sol)}>✅ Aprobar</button>
                          <button className="btn btn-danger btn-sm" onClick={() => rechazarCambioSede(sol)}>❌ Rechazar</button>
                        </>
                      )}
                      {sol.estado === 'pendiente_destino' && sol.grupo_id_destino === user.grupoId && (
                        <>
                          <button className="btn btn-success btn-sm" onClick={() => aprobarCambioSedeDestino(sol)}>✅ Aceptar en mi sede</button>
                          <button className="btn btn-danger btn-sm" onClick={() => rechazarCambioSede(sol)}>❌ Rechazar</button>
                        </>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            )}
            <div className="card" style={{borderColor: 'var(--warning)'}}>
              <h4 style={{marginTop: 0, color: 'var(--warning)'}}>🧬 Catálogo de Padecimientos</h4>
              <label>Agregar nueva adicción/padecimiento:</label>
              <div style={{display: 'flex', gap: '8px', marginTop: '6px'}}>
                <input type="text" className="input-field" style={{marginBottom: 0}} placeholder="Ej: Ludopatía" value={nuevaAdiccionSede} onChange={e => setNuevaAdiccionSede(e.target.value)} />
                <button className="btn btn-success btn-sm" onClick={agregarAdiccionSede}>Añadir</button>
              </div>
              <div style={{marginTop: '16px'}}>
                <label>Lista Actual:</label>
                <div style={{display: 'flex', flexDirection: 'column', gap: '6px', marginTop: '8px'}}>
                  {adiccionesDisponibles.map((ad, i) => (
                    <div key={i} style={{background: 'var(--input-bg)', padding: '10px 14px', borderRadius: '10px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', border: '1px solid var(--border)'}}>
                      <span>{ad}</span>
                      <button className="btn btn-sm btn-danger" style={{padding: '4px 10px'}} onClick={() => eliminarAdiccionSede(ad)}>🗑️</button>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* SOLICITUDES DE ADICCIÓN PENDIENTES */}
            {solicitudesAdiccion.length > 0 && (
              <div className="card" style={{borderColor: 'var(--primary)'}}>
                <h4 style={{marginTop: 0, color: 'var(--primary)'}}>📨 Solicitudes de Adicción ({solicitudesAdiccion.length})</h4>
                {solicitudesAdiccion.map(sol => (
                  <div key={sol.id} style={{background: 'var(--input-bg)', padding: '12px', borderRadius: '12px', marginBottom: '10px', border: '1px solid var(--border)'}}>
                    <div style={{fontWeight: 'bold'}}>{sol.adiccion}</div>
                    <div style={{fontSize: '14px', color: 'var(--text-muted)'}}>Solicitado por: {sol.solicitante_nombre}</div>
                    <div style={{display: 'flex', gap: '8px', marginTop: '10px'}}>
                      <button className="btn btn-success btn-sm" onClick={() => aprobarSolicitudAdiccion(sol)}>✅ Aprobar</button>
                      <button className="btn btn-danger btn-sm" onClick={() => rechazarSolicitudAdiccion(sol.id)}>❌ Rechazar</button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* LISTA DE MIEMBROS DE LA SEDE */}
            <div className="card" style={{borderColor: 'var(--primary)'}}>
              <h4 style={{marginTop: 0, color: 'var(--primary)'}}>👥 Miembros de la Sede ({listaMiembrosSede.length})</h4>
              {listaMiembrosSede.map(m => (
                <div key={m.username} style={{background: 'var(--input-bg)', padding: '12px 14px', borderRadius: '12px', marginBottom: '10px', border: `2px solid ${m.rol === 'admin_principal' ? 'var(--danger)' : m.rol === 'admin_adjunto' ? 'var(--warning)' : 'var(--border)'}`}}>
                  <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: '8px'}}>
                    <div>
                      <div style={{fontWeight: 'bold', fontSize: '17px'}}>
                        {m.nombre_real}
                        {m.rol === 'admin_principal' && <span className="tag-admin-principal">PRIN.</span>}
                        {m.rol === 'admin_adjunto' && <span className="tag-admin">ADJ.</span>}
                      </div>
                      <div style={{fontSize: '13px', color: 'var(--text-muted)'}}>{m.telefono || "Sin teléfono"}</div>
                    </div>
                    <div style={{display: 'flex', gap: '6px', flexWrap: 'wrap'}}>
                      {/* Invitar a admin (si no es admin ya) */}
                      {m.rol === 'basico' && (
                        <button className="btn btn-sm btn-warning" style={{fontSize: '13px', padding: '6px 10px'}} onClick={() => promoverAAdjunto(m.username, m.nombre_real)}>
                          👑 Invitar Admin
                        </button>
                      )}
                      {/* Solo admin principal puede revocar a adjuntos */}
                      {user.rol === 'admin_principal' && m.rol === 'admin_adjunto' && (
                        <button className="btn btn-sm btn-danger" style={{fontSize: '13px', padding: '6px 10px'}} onClick={() => degradarAdminAdjunto(m.username, m.nombre_real)}>
                          ❌ Revocar
                        </button>
                      )}
                    </div>
                  </div>
                </div>
              ))}
            </div>

            {/* TRASPASO DE MANDO - solo admin principal */}
            {user.rol === 'admin_principal' && (
              <div className="card" style={{borderColor: 'var(--danger)', background: 'rgba(220, 38, 38, 0.05)'}}>
                <h4 style={{marginTop: 0, color: 'var(--danger)'}}>👑 Traspaso de Mando Principal</h4>
                <p style={{fontSize: '14px', color: 'var(--text-secondary)'}}>
                  Transfiere el rol de <strong>Administrador Principal</strong> a otro administrador adjunto. Tu rol pasará a ser Adjunto.
                </p>
                <label>Selecciona al nuevo Administrador Principal:</label>
                <select className="select-field" defaultValue="" onChange={e => {
                  if (e.target.value) {
                    const adjSel = listaMiembrosSede.find(m => m.username === e.target.value);
                    if (adjSel) cederAdministradorPrincipal(adjSel.username, adjSel.nombre_real);
                    e.target.value = "";
                  }
                }}>
                  <option value="">— Seleccionar Administrador Adjunto —</option>
                  {listaMiembrosSede.filter(m => m.rol === 'admin_adjunto').map(m => (
                    <option key={m.username} value={m.username}>{m.nombre_real}</option>
                  ))}
                </select>
              </div>
            )}

            {/* SOLICITUDES PENDIENTES */}
            <h4 style={{color: 'var(--warning)'}}>⏳ Solicitudes Pendientes ({solicitudesPendientes.length})</h4>
            {solicitudesPendientes.length === 0 && <p style={{color: 'var(--text-muted)', fontSize: '15px'}}>No hay solicitudes pendientes.</p>}
            {solicitudesPendientes.map(s => (
              <div key={s.username} className="solicitud-card">
                <span className="badge badge-pendiente">PENDIENTE</span>
                <div className="solicitud-nombre">{s.nombre_real}</div>
                <div className="solicitud-info">📞 {s.telefono || "Sin teléfono"}</div>
                <div className="solicitud-info">ID: <code style={{fontSize: '13px'}}>{s.username}</code></div>
                <div className="solicitud-actions">
                  <button className="btn btn-success btn-sm" onClick={() => aprobarUsuario(s.username)}>✅ Aprobar</button>
                  <button className="btn btn-danger btn-sm" onClick={() => rechazarUsuario(s.username, s.nombre_real)}>❌ Rechazar</button>
                </div>
              </div>
            ))}

            {/* SOLICITUDES RECHAZADAS */}
            {solicitudesRechazadas.length > 0 && (
              <div style={{marginTop: '16px'}}>
                <button className="btn btn-secondary btn-sm" onClick={() => setMostrarRechazados(!mostrarRechazados)}>
                  {mostrarRechazados ? 'Ocultar' : 'Ver'} Rechazados ({solicitudesRechazadas.length})
                </button>
                {mostrarRechazados && solicitudesRechazadas.map(s => (
                  <div key={s.username} className="solicitud-card rechazada" style={{marginTop: '10px'}}>
                    <span className="badge badge-rechazado">RECHAZADO</span>
                    <div className="solicitud-nombre">{s.nombre_real}</div>
                    <div className="solicitud-info">📞 {s.telefono || "Sin teléfono"}</div>
                    <div className="solicitud-actions">
                      <button className="btn btn-success btn-sm" onClick={() => aprobarUsuario(s.username)}>✅ Aprobar ahora</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

      </div>

      {/* NAVBAR */}
      <div className="navbar">
        <div className={`nav-item${activeTab === 'inicio' ? ' active' : ''}`} onClick={() => setActiveTab('inicio')}>
          <div className="nav-icon">🏠</div>Inicio
        </div>
        <div className={`nav-item${activeTab === 'pasos' ? ' active' : ''}`} onClick={() => setActiveTab('pasos')}>
          <div className="nav-icon">🪜</div>12 Pasos
        </div>
        <div className={`nav-item${activeTab === 'eventos' ? ' active' : ''}`} onClick={() => setActiveTab('eventos')}>
          <div className="nav-icon">📅</div>Eventos
        </div>
        <div className={`nav-item${activeTab === 'biblioteca' ? ' active' : ''}`} onClick={() => setActiveTab('biblioteca')}>
          <div className="nav-icon">📚</div>Biblioteca
        </div>
        <div className={`nav-item${activeTab === 'directorio' ? ' active' : ''}`} onClick={() => setActiveTab('directorio')}>
          <div className="nav-icon">📞</div>Directorio
        </div>
        <div className={`nav-item${activeTab === 'compartir' ? ' active' : ''}`} onClick={() => setActiveTab('compartir')}>
          <div className="nav-icon">📲</div>Compartir
        </div>
        {esCualquierAdmin && (
          <div className={`nav-item${activeTab === 'admin' ? ' active' : ''}`} onClick={() => setActiveTab('admin')}>
            <div className="nav-icon">⚙️</div>Admin
          </div>
        )}
        <div className="nav-item" onClick={cerrarSesion} style={{color: 'var(--danger)'}}>
          <div className="nav-icon">🚪</div>Cerrar Sesión
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
